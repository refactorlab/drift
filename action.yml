name: 'Andy — PR Handoff by Drift'
description: 'Andy — PR companion Handoff by Drift. Open-source performance & FinOps platform Zero-config for consumers.'
author: 'refactor-labs'

branding:
  icon: 'activity'
  color: 'purple'

inputs:
  greeter:
    description: 'Name shown in the hello-world line.'
    required: false
    default: 'andy'
  profiler-release-tag:
    description: |
      Pin to a specific release tag (e.g. drift-lab-v0.4.0). Default empty
      → auto-detect the latest non-prerelease release in profiler-repo
      whose tag matches drift-lab-v* OR drift-static-profiler-v* AND has
      our binary asset attached. Zero-config for most consumers.
    required: false
    default: ''
  profiler-repo:
    description: 'GitHub repo hosting the drift-static-profiler binary releases.'
    required: false
    default: 'refactorlab/drift'
  profiler-local-bin:
    description: 'Path to a prebuilt drift-static-profiler binary. When set + executable, skips the GitHub Release download. Used by `make hello-test` for local act runs.'
    required: false
    default: ''
  debug:
    description: 'When true, sets DRIFT_LOG=info,drift_static_profiler=debug so the scanner emits verbose tracing events to stderr.'
    required: false
    default: 'false'
  progress:
    description: 'When true (default), the scanner shows per-phase progress (CliProgress / indicatif). When false, sets DRIFT_PROGRESS=off.'
    required: false
    default: 'true'
  github-token:
    description: |
      Token used to authenticate the GitHub API call when auto-detecting
      the latest release. Default = the workflow's GITHUB_TOKEN, which
      consumers get automatically (no setup required). Raises the API
      rate limit from 60/hr (anonymous, shared) to 5000/hr per consumer.
      Public release downloads themselves work without a token.
    required: false
    default: ${{ github.token }}
  ai-suggestions:
    description: |
      When true (default), runs a second, AI-powered review pass via
      `actions/ai-inference@v1` and posts the resulting inline code
      suggestions to the PR. This is independent of the deterministic
      scanner review — if the AI step fails (no `models: read` perm,
      model unavailable, etc.) the scanner review still ships.

      Consumer workflow must grant:
        permissions:
          contents: read
          pull-requests: write
          models: read
    required: false
    default: 'true'
  ai-model:
    description: |
      GitHub Models model ID for the AI suggestion pass. Defaults to
      `openai/gpt-4.1` — broadly served on org inference endpoints and
      stronger at generating committable code than gpt-4o. The
      per-suggestion inference loop sends the correct token field
      automatically — `max_completion_tokens` for reasoning models
      (gpt-5, o-series), `max_tokens` for classic models (gpt-4.1,
      gpt-4o). If your org's Models *inference* endpoint does not serve
      the chosen model, the preflight below catches it and the AI pass
      skips fail-soft. `openai/gpt-5` is in the global catalog but is NOT
      served by every org endpoint until an org admin enables it under
      Settings → Copilot → Policies → Models — override to `openai/gpt-5`
      once that's done.
    required: false
    default: 'openai/gpt-4.1'
  ai-endpoint:
    description: |
      GitHub Models inference endpoint. Default `auto` resolves it from
      the repo owner: ORG-owned repos get the org-scoped endpoint
        https://models.github.ai/orgs/<org>/inference
      and user-owned repos get https://models.github.ai/inference.
      This matters because the built-in GITHUB_TOKEN has no personal
      identity — in an org repo the user-scoped endpoint returns 403.
      Set an explicit URL to override. The org must still have GitHub
      Models enabled under Settings → Copilot → Models, and the
      workflow must grant `permissions: models: read`.
      (see docs.github.com/en/rest/models/inference)
    required: false
    default: 'auto'
  ai-max-files:
    description: |
      DEPRECATED / unused since the per-suggestion loop landed. Each AI
      call now diffs exactly ONE focal file, so there is no multi-file
      context bundle to cap. Kept for backward compatibility; setting it
      has no effect. Loop size is governed by `ai-max-suggestions`.
    required: false
    default: '20'
  ai-max-suggestions:
    description: |
      Hard cap on the number of AI code suggestions, end-to-end. Used
      in TWO places to keep the model's prompt inside its token budget:
        - INPUT: the top-N highest-confidence scanner findings handed to
          the model as focal points (→ AI_MAX_FOCAL_POINTS). Capping
          this is what keeps the request body under the 8000-token
          gpt-4o input limit on GitHub Models.
        - OUTPUT: suggestions actually posted to the PR, applied AFTER
          the quality bar (confidence, reference, category).
      Defaults to 3 — small + noticeable beats large + ignored.
    required: false
    default: '3'
  fail-threshold:
    description: |
      Optional. The number of product-correctness (category B) issues —
      those that clear the quality bar — ABOVE WHICH the check fails (red ✗).
        <empty> — never fail the PR (default). Drift is advisory: issues
                  post as ⚠️ warnings in the sticky comment and as
                  ::warning:: annotations, and the PR stays green.
        0       — fail if there is ANY product-correctness issue.
        3       — fail only if there are MORE THAN 3 such issues.
      Left empty by default so Drift NEVER fails a consumer's PR. A
      non-numeric value is ignored (treated as empty) and never raises —
      the action is fail-soft on its own errors too.
    required: false
    default: ''
  audio-summary:
    description: |
      When true (default), synthesize a spoken WAV of the PR's
      `pr_review.business_logic.summary` with Piper (offline neural TTS),
      upload it as a workflow artifact, and link it at the END of the Drift
      sticky comment (posted via Octokit in dist/index.js). Fully fail-soft:
      any TTS / download / upload error is a ::warning:: and never breaks the
      review. The Piper binary AND the voice model are cached across runs, so
      a warm run adds only the synthesis time.
    required: false
    default: 'true'
  piper-voice:
    description: |
      Piper voice id from the HF `rhasspy/piper-voices` catalog, formatted
      `<lang>-<name>-<quality>` (e.g. en_US-amy-medium, en_GB-alba-medium).
      The download path is derived from the id.
    required: false
    default: 'en_US-amy-medium'
  piper-version:
    description: |
      rhasspy/piper release TAG for the prebuilt Linux TTS binary (default
      2023.11.14-2, the last classic release; assets piper_linux_x86_64 /
      piper_linux_aarch64). If this tag/asset can't be fetched the install
      falls back to the older v1.2.0 piper_amd64 / piper_arm64 tarball.
    required: false
    default: '2023.11.14-2'

runs:
  using: 'composite'
  steps:
    # ─── 1. Say hello (always) ───────────────────────────────────────
    - name: Say hello
      shell: bash
      env:
        GREETER: ${{ inputs.greeter }}
      run: |
        echo "👋 hello world by ${GREETER}"
        echo "🛠️  runner: ${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}"
        echo "📂 repo:   ${GITHUB_REPOSITORY:-<unset>}"
        echo "🌿 event:  ${GITHUB_EVENT_NAME:-<unset>}"
        echo "🔁 PR:     #${{ github.event.pull_request.number || 'n/a' }} (${{ github.event.pull_request.head.ref || 'n/a' }} → ${{ github.event.pull_request.base.ref || 'n/a' }})"
        echo "🔖 sha:    ${{ github.event.pull_request.head.sha || github.sha }}"

    # ─── 2. Resolve the release tag (auto-detect or pinned) ──────────
    # We resolve the tag HERE (before the cache step) because the cache
    # key includes the tag. Auto-detect: most-recent published release
    # in profiler-repo whose tag matches drift-lab-v* or
    # drift-static-profiler-v* AND has the binary asset attached.
    - name: Resolve release tag
      id: resolve
      shell: bash
      env:
        DRIFT_PROFILER_REPO:         ${{ inputs.profiler-repo }}
        DRIFT_PROFILER_RELEASE_TAG:  ${{ inputs.profiler-release-tag }}
        DRIFT_PROFILER_LOCAL_BIN:    ${{ inputs.profiler-local-bin }}
        GITHUB_TOKEN:                ${{ inputs.github-token }}
      run: |
        # Local-bin override: skip the API call entirely. install-profiler.sh
        # also short-circuits when this env is set + executable.
        if [ -n "${DRIFT_PROFILER_LOCAL_BIN:-}" ] && [ -x "${DRIFT_PROFILER_LOCAL_BIN}" ]; then
          echo "tag=local" >> "$GITHUB_OUTPUT"
          echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"
          echo "🧪 Using local binary; cache step will be skipped."
          exit 0
        fi
        # Pinned tag: use as-is.
        if [ -n "${DRIFT_PROFILER_RELEASE_TAG:-}" ]; then
          echo "tag=${DRIFT_PROFILER_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"
          echo "📌 Pinned tag: ${DRIFT_PROFILER_RELEASE_TAG}"
          exit 0
        fi
        # Auto-detect.
        case "${RUNNER_OS}" in
          Linux)   target="${RUNNER_ARCH}-unknown-linux-gnu" ; ext="tar.gz" ;;
          macOS)   target="${RUNNER_ARCH}-apple-darwin"      ; ext="tar.gz" ;;
          Windows) target="${RUNNER_ARCH}-pc-windows-msvc"   ; ext="zip"    ;;
        esac
        # Normalize arch name to what the release assets use.
        target=$(echo "$target" | sed -e 's/X64/x86_64/' -e 's/ARM64/aarch64/')
        asset="drift-static-profiler-${target}.${ext}"
        auth=()
        [ -n "${GITHUB_TOKEN:-}" ] && auth=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
        echo "🔍 Auto-detecting latest release in ${DRIFT_PROFILER_REPO} containing ${asset}"
        releases=$(curl --fail --silent --location "${auth[@]}" \
          "https://api.github.com/repos/${DRIFT_PROFILER_REPO}/releases?per_page=30" 2>/dev/null || echo '[]')
        tag=$(echo "$releases" | jq -r --arg asset "$asset" '
          [.[]
            | select(.draft == false)
            | select(.prerelease == false)
            | select(.tag_name | test("^(drift-lab-v|drift-static-profiler-v)"))
            | select(any(.assets[]?; .name == $asset))
          ][0].tag_name // empty
        ')
        if [ -z "$tag" ]; then
          echo "⚠️  No release in ${DRIFT_PROFILER_REPO} has ${asset} yet — install + scan will skip."
          echo "tag=none" >> "$GITHUB_OUTPUT"
        else
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "📌 Resolved to: $tag"
        fi
        echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"

    # ─── 3. Compute install path + cache key (tag-aware) ─────────────
    # Cache layout mirrors $RUNNER_TOOL_CACHE/<tool>/<version>/<arch>.
    # Suffix "-v1" is a SCHEMA version we bump if we ever change the
    # on-disk layout — busts every old cache without touching the tag.
    - name: Compute install path + cache key
      id: paths
      shell: bash
      run: |
        tag="${{ steps.resolve.outputs.tag }}"
        install_dir="${RUNNER_TEMP}/drift-static-profiler/${tag}/${RUNNER_ARCH}"
        cache_key="drift-static-profiler-${tag}-${RUNNER_OS}-${RUNNER_ARCH}-v1"
        echo "install_dir=$install_dir" >> "$GITHUB_OUTPUT"
        echo "cache_key=$cache_key"     >> "$GITHUB_OUTPUT"
        echo "🔑 cache key:   $cache_key"
        echo "📁 install dir: $install_dir"

    # ─── 4. Restore drift-static-profiler from cache (if resolvable) ─
    # Skip the cache layer entirely when tag=local (act dev path) or
    # tag=none (no release found — nothing to cache).
    - name: Restore drift-static-profiler from cache
      id: cache
      if: steps.resolve.outputs.tag != 'local' && steps.resolve.outputs.tag != 'none'
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.paths.outputs.install_dir }}
        key: ${{ steps.paths.outputs.cache_key }}

    # ─── 5. Install (no-op on cache hit; downloads on miss) ──────────
    - name: Install drift-static-profiler
      id: install
      shell: bash
      env:
        DRIFT_PROFILER_REPO:         ${{ inputs.profiler-repo }}
        DRIFT_PROFILER_RELEASE_TAG:  ${{ steps.resolve.outputs.tag == 'local' && '' || steps.resolve.outputs.tag }}
        DRIFT_PROFILER_LOCAL_BIN:    ${{ inputs.profiler-local-bin }}
        DRIFT_PROFILER_INSTALL_DIR:  ${{ steps.paths.outputs.install_dir }}
        GITHUB_TOKEN:                ${{ inputs.github-token }}
      run: |
        if [ "${{ steps.resolve.outputs.tag }}" = "none" ]; then
          echo "⚠️  No release tag resolved — skipping install."
          echo "installed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        ${{ github.action_path }}/action/scripts/install-profiler.sh
        # Gate the cache-save step: only persist when the binary actually
        # landed on disk (prevents the empty-dir-cache footgun).
        bin="${{ steps.paths.outputs.install_dir }}/drift-static-profiler"
        [ "${RUNNER_OS:-}" = "Windows" ] && bin="${bin}.exe"
        if [ -x "$bin" ]; then
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    # ─── 6. Save to cache (cache MISS + verified install only) ───────
    - name: Save drift-static-profiler to cache
      if: >-
        steps.resolve.outputs.tag != 'local' &&
        steps.resolve.outputs.tag != 'none' &&
        steps.cache.outputs.cache-hit != 'true' &&
        steps.install.outputs.installed == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.paths.outputs.install_dir }}
        key: ${{ steps.paths.outputs.cache_key }}

    # ─── 6b. Compute the real PR diff (changed files + LOC + commits) ─
    # Replaces the old hardcoded demo file list. The set of files a PR
    # touched is derived from git — NOT pinned in this YAML — together
    # with per-file LOC (numstat → value_money) and commit messages
    # (→ counts / feat|fix|perf signals). We diff against the merge-base
    # (three-dot semantics) so only what the PR actually introduced is
    # scanned.
    #
    # `has_source` decides whether ANY changed file is in a language the
    # scanner can analyze. The extension set MIRRORS Language::from_path
    # in drift-static-profiler/src/lib.rs — keep the two in sync. When
    # has_source=false (config/docs/non-code only) the scan and every
    # downstream comment/AI step is skipped, so such PRs get an EMPTY
    # result instead of a misleading negative-money "Drift ▼" verdict.
    - name: Compute PR diff
      id: diff
      if: github.event.pull_request != null
      shell: bash
      env:
        BASE_SHA:     ${{ github.event.pull_request.base.sha }}
        HEAD_SHA:     ${{ github.event.pull_request.head.sha }}
        CHANGED_PATH: ${{ runner.temp }}/drift-changed.txt
        STATS_PATH:   ${{ runner.temp }}/drift-diff-stats.tsv
        COMMITS_PATH: ${{ runner.temp }}/drift-commits.txt
      run: |
        # Both endpoints may be missing if the consumer shallow-cloned.
        # actions/checkout with fetch-depth: 0 (the README workflow's
        # default) already has them; these fetches are a best-effort top-up.
        git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
        git fetch --no-tags --depth=1 origin "$HEAD_SHA" 2>/dev/null || true
        # GitHub's PR "Files changed" diff is THREE-DOT — computed from the
        # merge-base of (base, head), NOT from the base-branch tip. A depth-1
        # dual-SHA fetch shares no common ancestor, so `git merge-base` fails
        # and we'd fall back to BASE_SHA (the tip). On any PR whose base branch
        # advanced past the fork point, diffing from the tip flags lines that
        # AREN'T in GitHub's PR diff — so every finding anchors off-diff (the
        # inline review 422s + the AI pass has no `+` line to put after_code
        # on). Deepen in bounded steps until the merge-base is reachable, so
        # our diff range matches GitHub's exactly. Purely additive: if the
        # clone is already full (fetch-depth: 0) the first check passes and we
        # never deepen; if deepening can't reach it we keep the old fallback.
        deepen=200
        for _ in 1 2 3 4 5; do
          git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1 && break
          git fetch --no-tags --deepen="$deepen" origin "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true
          deepen=$((deepen * 2))
        done
        base="$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")"
        if [ -n "$base" ]; then
          echo "✅ merge-base resolved ($base) — diff range matches GitHub's PR view"
        else
          base="$BASE_SHA"
          echo "⚠️  merge-base unreachable after deepening — diffing from base tip; anchors may fall off-diff"
        fi
        echo "📐 diff base: ${base} → head: ${HEAD_SHA}"
        # --diff-filter=ACMRT: added/copied/modified/renamed/type-changed
        # (drops pure deletions — there's no HEAD content to analyze).
        git diff --name-only --diff-filter=ACMRT "$base" "$HEAD_SHA" > "$CHANGED_PATH" || true
        # numstat is `adds<TAB>dels<TAB>path`; read_diff_stats auto-detects
        # that ordering and skips binary (`-`) rows, so pipe it raw.
        git diff --numstat                       "$base" "$HEAD_SHA" > "$STATS_PATH"   || true
        # NUL-separated commit bodies (read_commit_messages splits on \0).
        git log  --format=%B%x00                 "${base}..${HEAD_SHA}" > "$COMMITS_PATH" || true

        n=$(wc -l < "$CHANGED_PATH" | tr -d ' ')
        echo "📄 ${n} changed file(s):"
        sed 's/^/    /' "$CHANGED_PATH"

        # has_source: did the PR touch a file in a supported language?
        # MIRRORS Language::from_path (drift-static-profiler/src/lib.rs).
        has_source=false
        while IFS= read -r f; do
          [ -z "$f" ] && continue
          case "${f##*.}" in
            py|java|ts|tsx|js|jsx|mjs|cjs|go|rs|scala|sc|kt|kts)
              has_source=true; break ;;
          esac
        done < "$CHANGED_PATH"

        {
          echo "changed_path=$CHANGED_PATH"
          echo "stats_path=$STATS_PATH"
          echo "commits_path=$COMMITS_PATH"
          echo "base_sha=$base"
          echo "has_source=$has_source"
        } >> "$GITHUB_OUTPUT"

        if [ "$has_source" = "true" ]; then
          echo "✅ Supported source files changed — Drift will scan."
        else
          echo "⏭️  No supported source files changed (config/docs/non-code only) — skipping scan + comment."
        fi

    # ─── 7. Run scan-pr (skips if binary missing OR no supported source) ─
    - name: Run scan-pr
      id: scan
      if: >-
        github.event.pull_request != null &&
        steps.diff.outputs.has_source == 'true'
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DRIFT_LOG: ${{ inputs.debug == 'true' && 'info,drift_static_profiler=debug' || '' }}
        DRIFT_PROGRESS: ${{ inputs.progress == 'true' && '' || 'off' }}
        CHANGED_PATH: ${{ steps.diff.outputs.changed_path }}
        STATS_PATH:   ${{ steps.diff.outputs.stats_path }}
        COMMITS_PATH: ${{ steps.diff.outputs.commits_path }}
        BASE_SHA:     ${{ steps.diff.outputs.base_sha }}
        PR_TITLE:     ${{ github.event.pull_request.title }}
        PR_BODY:      ${{ github.event.pull_request.body }}
      run: |
        if ! command -v drift-static-profiler > /dev/null 2>&1; then
          echo "⚠️  drift-static-profiler not on PATH — skipping scan."
          echo "scan_ran=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "scan_ran=true" >> "$GITHUB_OUTPUT"
        echo "🔬 scan-pr over $(wc -l < "$CHANGED_PATH" | tr -d ' ') changed file(s):"
        sed 's/^/    /' "$CHANGED_PATH"
        echo ""
        echo "🪵 debug mode:    ${{ inputs.debug }}     (DRIFT_LOG=${DRIFT_LOG:-<unset>})"
        echo "📊 progress:      ${{ inputs.progress }}  (DRIFT_PROGRESS=${DRIFT_PROGRESS:-<default-on>})"
        echo ""
        # NOTE: --pr-title / --pr-body use the `--flag=value` form on purpose.
        # PR titles/bodies are raw user text that routinely starts with `-`
        # (markdown bullet `- item`, `---` rule). With the space form
        # (`--pr-title "$X"`), clap reads that leading `-` as an unknown flag
        # and aborts with `unexpected argument '- '` (exit 2) before scanning.
        # The `=` form is hyphen-immune and works with any released binary.
        drift-static-profiler scan-pr . \
          --changed-files "$CHANGED_PATH" \
          --diff-stats    "$STATS_PATH" \
          --commits       "$COMMITS_PATH" \
          --base-sha      "$BASE_SHA" \
          --pr-title="$PR_TITLE" \
          --pr-body="$PR_BODY" \
          --pretty \
          --output "$DRIFT_REPORT_PATH"

    # ─── 8. Print scan summary (+ full debug dump when debug=true) ───
    - name: Print scan summary
      if: steps.scan.outputs.scan_ran == 'true'
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DEBUG:             ${{ inputs.debug }}
      run: |
        if [ ! -s "$DRIFT_REPORT_PATH" ]; then
          echo "⚠️  no report at $DRIFT_REPORT_PATH"
          exit 0
        fi
        size=$(wc -c < "$DRIFT_REPORT_PATH" | tr -d ' ')
        echo "📊 Scan complete — ${size} bytes at $DRIFT_REPORT_PATH"
        sugg=0
        if command -v jq >/dev/null 2>&1; then
          # Defensive: `// []` handles a missing pr_review/code_suggestions;
          # `2>/dev/null || echo 0` keeps the summary alive on malformed JSON.
          sugg=$(jq -r '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)
          echo "  schema:      $(jq -r '.schema_version // "?"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  mode:        $(jq -r '.mode // "?"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  tool:        $(jq -r '"\(.generator.tool // "?") v\(.generator.version // "?")"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  changed:     $(jq -r '(.pr_scope.changed_files // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0) file(s)"
          echo "  roots:       $(jq -r '(.pr_scope.affected_roots // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
          echo "  unreachable: $(jq -r '(.pr_scope.unreachable_changes // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
          echo "  pr_review?:  $(jq -r 'has("pr_review")' "$DRIFT_REPORT_PATH" 2>/dev/null || echo false)"
          echo "  suggestions: ${sugg}"
        else
          echo "  (jq not on PATH; install with apt/brew to see the summary)"
        fi

        # ── Debug dump (only when the `debug` input is true) ───────────
        # Surfaces the ENTIRE scan JSON, its byte size, and the
        # code_suggestions array (only when non-empty) so you can see
        # exactly what the scanner produced and why the AI step did or
        # didn't have focal points to enrich. All blocks are defensive:
        # they never fail the step on missing keys or malformed JSON.
        if [ "${DEBUG:-false}" = "true" ]; then
          echo "::group::🐛 debug — full scan report (${size} bytes)"
          if command -v jq >/dev/null 2>&1 && jq -e . "$DRIFT_REPORT_PATH" >/dev/null 2>&1; then
            jq '.' "$DRIFT_REPORT_PATH"
          else
            echo "(jq unavailable or report not valid JSON — raw dump follows)"
            cat "$DRIFT_REPORT_PATH"
          fi
          echo "::endgroup::"

          if command -v jq >/dev/null 2>&1; then
            if [ "${sugg:-0}" -gt 0 ] 2>/dev/null; then
              echo "::group::🐛 debug — ${sugg} code_suggestion(s)"
              jq '.pr_review.code_suggestions' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '(failed to extract code_suggestions)'
              echo "::endgroup::"
            else
              echo "🐛 debug — code_suggestions is EMPTY → AI step will run in diff-fallback (no focal points)."
            fi
          fi
        fi

    # ─── 8b. Audio summary — cache + install Piper binary ────────────
    # Offline neural TTS. We cache the binary (keyed by version + arch) so
    # only the first run on a given key pays the download. Installed under
    # RUNNER_TEMP (never the consumer's workspace) like the profiler.
    - name: Cache Piper binary
      id: piper-bin-cache
      if: >-
        inputs.audio-summary == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/piper
        key: piper-${{ runner.arch }}-${{ inputs.piper-version }}-v1

    - name: Install Piper binary
      if: >-
        inputs.audio-summary == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null &&
        steps.piper-bin-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        PIPER_VERSION: ${{ inputs.piper-version }}
        PIPER_PARENT:  ${{ runner.temp }}
      run: |
        # rhasspy/piper ships exactly two Linux arch tarballs, each expanding
        # to a top-level `piper/` dir (binary + bundled libs + espeak-ng-data).
        # We extract into RUNNER_TEMP → ${RUNNER_TEMP}/piper/piper.
        #
        # PRIMARY: the canonical 2023.11.14-2 release uses the
        #   piper_linux_<x86_64|aarch64>.tar.gz naming.
        # FALLBACK: the older v1.2.0 release uses piper_<amd64|arm64>.tar.gz.
        # Both layouts are identical, so the fallback is drop-in. If both
        # fail the synth step detects the missing binary and skips (fail-soft).
        case "${RUNNER_ARCH}" in
          ARM64) new=aarch64 ; old=arm64 ;;
          *)     new=x86_64  ; old=amd64 ;;   # X64 (GitHub-hosted) + default
        esac
        primary="https://github.com/rhasspy/piper/releases/download/${PIPER_VERSION}/piper_linux_${new}.tar.gz"
        fallback="https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_${old}.tar.gz"
        installed=false
        for url in "$primary" "$fallback"; do
          echo "⬇️  ${url}"
          if curl -fSL -o /tmp/piper.tar.gz "$url" && tar -xzf /tmp/piper.tar.gz -C "$PIPER_PARENT"; then
            rm -f /tmp/piper.tar.gz
            echo "✅ installed to ${PIPER_PARENT}/piper"
            installed=true
            break
          fi
          echo "   ↳ failed; trying next URL…"
        done
        [ "$installed" = "true" ] || \
          echo "⚠️  Piper download failed (primary + fallback) — audio summary will be skipped (fail-soft)."

    # ─── 8c. Audio summary — cache + download the voice model ────────
    - name: Cache Piper voice
      id: piper-voice-cache
      if: >-
        inputs.audio-summary == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/piper-voices
        key: piper-voice-${{ inputs.piper-voice }}-v1

    - name: Download Piper voice
      if: >-
        inputs.audio-summary == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null &&
        steps.piper-voice-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        PIPER_VOICE: ${{ inputs.piper-voice }}
        VOICE_DIR:   ${{ runner.temp }}/piper-voices
      run: |
        # Derive the HF path from the voice id `<lang>-<name>-<quality>`:
        #   en_US-amy-medium → top=en lang=en_US name=amy quality=medium
        lang="${PIPER_VOICE%%-*}"          # en_US
        rest="${PIPER_VOICE#*-}"           # amy-medium
        name="${rest%%-*}"                 # amy
        quality="${rest#*-}"               # medium
        top="${lang%%_*}"                  # en
        # HF canonical ref is `main` (the rhasspy/piper-voices README links
        # resolve/main/...). Both main and the v1.0.0 tag serve the same
        # files; main matches the documented download URL.
        base="https://huggingface.co/rhasspy/piper-voices/resolve/main/${top}/${lang}/${name}/${quality}"
        mkdir -p "$VOICE_DIR"
        echo "⬇️  voice ${PIPER_VOICE} ← ${base}"
        curl -fSL -o "${VOICE_DIR}/${PIPER_VOICE}.onnx"      "${base}/${PIPER_VOICE}.onnx?download=true"      || echo "⚠️  voice .onnx download failed"
        curl -fSL -o "${VOICE_DIR}/${PIPER_VOICE}.onnx.json" "${base}/${PIPER_VOICE}.onnx.json?download=true" || echo "⚠️  voice config download failed"

    # ─── 8d. Synthesize the WAV from pr_review.business_logic.summary ─
    # Continue-on-error: a TTS failure must never break the deterministic
    # review. The text is the scan's business-logic summary (PR-title fallback).
    - name: Synthesize audio summary
      id: audio
      if: >-
        inputs.audio-summary == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null
      continue-on-error: true
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        PIPER_DIR:   ${{ runner.temp }}/piper
        VOICE_DIR:   ${{ runner.temp }}/piper-voices
        PIPER_VOICE: ${{ inputs.piper-voice }}
        WAV_PATH:    ${{ runner.temp }}/drift-pr-summary.wav
        PR_TITLE:    ${{ github.event.pull_request.title }}
      run: |
        bin="${PIPER_DIR}/piper"
        model="${VOICE_DIR}/${PIPER_VOICE}.onnx"
        if [ ! -x "$bin" ] || [ ! -f "$model" ]; then
          echo "⚠️  Piper binary or voice model missing — skipping audio summary."
          echo "synthesized=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Prefer the scan's business-logic summary; fall back to the PR title.
        summary="$(jq -r '.pr_review.business_logic.summary // ""' "$DRIFT_REPORT_PATH" 2>/dev/null || echo "")"
        if [ -z "$summary" ]; then
          summary="${PR_TITLE:-This pull request}. See the Drift review for details."
        fi
        text="Drift pull request summary. ${summary}"
        echo "🗣️  synthesizing $(printf '%s' "$text" | wc -c | tr -d ' ') chars → ${WAV_PATH}"
        # Run from the Piper dir so it resolves its bundled espeak-ng-data
        # + shared libs ($ORIGIN rpath). Model + output use absolute paths.
        if ( cd "$PIPER_DIR" && printf '%s' "$text" | ./piper --model "$model" --output_file "$WAV_PATH" ) 2>/tmp/piper-synth.log; then
          echo "✅ wrote $(wc -c < "$WAV_PATH" | tr -d ' ') bytes"
          echo "synthesized=true" >> "$GITHUB_OUTPUT"
          echo "wav_path=${WAV_PATH}" >> "$GITHUB_OUTPUT"
        else
          echo "⚠️  Piper synthesis failed (audio summary skipped):"
          sed 's/^/    /' /tmp/piper-synth.log 2>/dev/null || true
          echo "synthesized=false" >> "$GITHUB_OUTPUT"
        fi

    # ─── 8e. Upload the WAV as a workflow artifact (host for the link) ─
    - name: Upload audio summary artifact
      id: audio-upload
      if: >-
        inputs.audio-summary == 'true' &&
        steps.audio.outputs.synthesized == 'true' &&
        github.event.pull_request != null
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: drift-pr-audio-summary
        path: ${{ steps.audio.outputs.wav_path }}
        retention-days: 14

    # ─── 9. Post sticky PR comment + inline suggestions + check run ──
    # Runs the compiled bundle at dist/index.js. The bundle reads the
    # JSON report at DRIFT_REPORT_PATH and uses GITHUB_TOKEN to:
    #   - upsert a sticky overview comment (idempotent via marker)
    #   - post inline review comments for code suggestions above the
    #     quality bar (confidence ≥ 0.75, category A/B/C, has ref link)
    #   - create a check run summarising the report
    # Skips when there's no PR context (push events, manual dispatch).
    - name: Post Drift PR review
      if: steps.scan.outputs.scan_ran == 'true' && github.event.pull_request != null
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DRIFT_COMMENT:     'true'
        DRIFT_FAIL_THRESHOLD: ${{ inputs.fail-threshold }}
        # Artifact URL of the synthesized WAV (empty when audio is disabled or
        # synthesis failed → dist/index.js omits the "🔊 Listen" footer).
        DRIFT_AUDIO_URL:   ${{ steps.audio-upload.outputs.artifact-url }}
        GITHUB_TOKEN:      ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/dist/index.js"

    # ─── 10. Prep AI diff (fetch both PR SHAs) ───────────────────────
    # The per-suggestion inference loop (step 12) runs `git diff` once
    # per focal file, so it needs BOTH commit endpoints present.
    # actions/checkout with fetch-depth: 0 already has them; these are a
    # best-effort top-up for shallow consumer clones. (The old monolithic
    # context builder is gone: each loop iteration now builds its own
    # tiny one-finding prompt — see src/ai/focal-prompt.ts.)
    - name: Prep AI diff
      id: ai-prep
      if: >-
        inputs.ai-suggestions == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        github.event.pull_request != null
      shell: bash
      env:
        AI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        AI_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        git fetch --no-tags --depth=1 origin "$AI_BASE_SHA" 2>/dev/null || true
        git fetch --no-tags --depth=1 origin "$AI_HEAD_SHA" 2>/dev/null || true

    # ─── 11. Resolve endpoint + PREFLIGHT GitHub Models access ───────
    # Resolves the right inference endpoint (org repos need
    # …/orgs/<org>/inference), then does a real POST to capture the
    # status + BODY that actions/ai-inference swallows ("403 no body").
    # The body is the only reliable way to distinguish the failure
    # modes — so we surface it and decode it here, BEFORE the opaque
    # inference step runs. See docs.github.com/en/rest/models/inference.
    - name: Resolve Models endpoint + preflight
      id: ai-ep
      if: >-
        inputs.ai-suggestions == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        github.event.pull_request != null
      shell: bash
      env:
        AI_ENDPOINT_INPUT: ${{ inputs.ai-endpoint }}
        OWNER:             ${{ github.repository_owner }}
        OWNER_TYPE:        ${{ github.event.repository.owner.type }}
        AI_MODEL:          ${{ inputs.ai-model }}
        GITHUB_TOKEN:      ${{ inputs.github-token }}
      run: |
        if [ -n "${AI_ENDPOINT_INPUT}" ] && [ "${AI_ENDPOINT_INPUT}" != "auto" ]; then
          resolved="${AI_ENDPOINT_INPUT}"
          echo "🔌 Using pinned endpoint."
        elif [ "${OWNER_TYPE}" = "Organization" ]; then
          resolved="https://models.github.ai/orgs/${OWNER}/inference"
          echo "🔌 Org-owned repo (${OWNER}) → org-scoped endpoint."
        else
          resolved="https://models.github.ai/inference"
          echo "🔌 User-owned repo → user-scoped endpoint."
        fi
        echo "endpoint=${resolved}" >> "$GITHUB_OUTPUT"
        echo "🔌 Resolved Models endpoint: ${resolved}"

        # ── Preflight: hit the REAL chat/completions path so we see the
        #    body that the inference action hides. 1-token probe. ──────
        # gpt-5 / o-series are reasoning models: they REQUIRE
        # max_completion_tokens and reject max_tokens, so pick the field
        # that matches the model — otherwise the probe itself 400s on a
        # param error and we'd misread it as "model unavailable".
        case "${AI_MODEL}" in
          *gpt-5*|*o1*|*o2*|*o3*|*o4*) tok='"max_completion_tokens":16' ;;
          *)                            tok='"max_tokens":1' ;;
        esac
        body="$(mktemp)"
        status="$(curl -s -o "$body" -w '%{http_code}' \
          -X POST "${resolved}/chat/completions" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "{\"model\":\"${AI_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],${tok}}" \
          2>/dev/null || echo "000")"
        snippet="$(tr -d '\n' < "$body" | head -c 400)"
        echo "🔎 preflight POST ${resolved}/chat/completions → HTTP ${status}"
        [ -n "${snippet}" ] && echo "🔎 preflight body: ${snippet}"
        echo "preflight_status=${status}" >> "$GITHUB_OUTPUT"

        # ── Decode the result so the log says exactly what to fix ─────
        case "${status}" in
          200)
            echo "✅ GitHub Models reachable — inference should succeed." ;;
          401|403)
            if echo "${snippet}" | grep -qiE 'model|not enabled|not allowed'; then
              echo "❌ Token HAS models access but the model/org policy blocks it."
              echo "   → Org owner: Settings → Copilot → Policies → Models → enable + allow ${AI_MODEL}."
            else
              echo "❌ ${status} with no model-level message → the GITHUB_TOKEN is MISSING the 'models: read' scope."
              echo "   → Add 'models: read' to the CONSUMER workflow's permissions: block."
              echo "     (It is NEVER granted by default — even when pull-requests/checks write are.)"
            fi ;;
          404)
            echo "❌ 404 — endpoint or model id not found. Check ai-model / ai-endpoint." ;;
          000)
            echo "⚠️  preflight curl failed to connect (network) — inference may still try." ;;
          *)
            echo "⚠️  Unexpected preflight status ${status}." ;;
        esac
        rm -f "$body"

    # ─── 12. AI inference LOOP — one model call per scanner finding ──
    # A composite action CANNOT loop a `uses:` step, so we replace
    # actions/ai-inference@v1 with our own bash `for` loop that POSTs one
    # request per focal point (≤ ai-max-suggestions). Each call sees a
    # single finding + that file's numbered diff, BUDGETED to the GitHub
    # Models input cap: dist/ai-infer-one.js counts tokens BEFORE the POST
    # (gpt-tokenizer, o200k_base) and shrinks the diff to the hunk around
    # the focal line until system+user fit under AI_MAX_INPUT_TOKENS.
    # Without that budget one large or newly-added file's full diff blows
    # the 8000-token cap → HTTP 413 ("Request body too large") and ZERO
    # suggestions — exactly the failure this replaced. The call uses
    # max_completion_tokens for gpt-5, max_tokens for gpt-4o, parses the
    # reply, and APPENDS the passing suggestion to AI_OUT. Only runs on a
    # green preflight; continue-on-error keeps the rest of the action green
    # on any residual failure.
    - name: AI inference (per-suggestion loop)
      id: ai-loop
      if: >-
        inputs.ai-suggestions == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        steps.ai-ep.outputs.preflight_status == '200' &&
        github.event.pull_request != null
      continue-on-error: true
      shell: bash
      env:
        AI_OUT:               ${{ runner.temp }}/ai-suggestions.json
        DRIFT_REPORT_PATH:    ${{ runner.temp }}/drift-report.json
        AI_ENDPOINT:          ${{ steps.ai-ep.outputs.endpoint }}
        AI_MODEL:             ${{ inputs.ai-model }}
        AI_MAX:               ${{ inputs.ai-max-suggestions }}
        # Per-call INPUT budget (system + user, in tokens). The diff for the
        # focal file is trimmed to fit under this BEFORE the POST, so a large
        # or newly-added file can't 413 the request. Set below the 8000-token
        # Free/low-tier cap to leave headroom for the chat envelope the server
        # also counts. Raise on a higher tier (Enterprise High input = 16000).
        AI_MAX_INPUT_TOKENS:  '7000'
        # Per-call OUTPUT budget. Reasoning models (gpt-5) also spend
        # hidden reasoning tokens out of this, so keep it generous — one
        # suggestion's visible JSON is small. Lower it only if a classic
        # model (gpt-4o) rejects it against a smaller output cap.
        AI_MAX_OUTPUT_TOKENS: '8000'
        AI_BASE_SHA:          ${{ github.event.pull_request.base.sha }}
        AI_HEAD_SHA:          ${{ github.event.pull_request.head.sha }}
        GITHUB_TOKEN:         ${{ inputs.github-token }}
      run: |
        # Fresh envelope; each iteration appends one suggestion (if any).
        echo '{"suggestions":[]}' > "$AI_OUT"
        total="$(jq '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
        limit="$total"
        [ "$total" -gt "$AI_MAX" ] 2>/dev/null && limit="$AI_MAX"
        echo "🔁 ${limit} of ${total} scanner finding(s) → one inference call each (model: ${AI_MODEL})"
        i=0
        while [ "$i" -lt "$limit" ]; do
          echo "──── inference $((i + 1))/${limit} ────"
          node "${{ github.action_path }}/dist/ai-infer-one.js" "$i"
          i=$((i + 1))
        done
        n="$(jq '(.suggestions // []) | length' "$AI_OUT" 2>/dev/null || echo 0)"
        echo "✅ loop done — ${n} suggestion(s) cleared the bar → $AI_OUT"

    # ─── 11b. Decode an inference failure into actionable guidance ───
    # The ai-inference action surfaces GitHub Models errors as opaque
    # one-liners (e.g. "403 status code (no body)"). This step maps the
    # common failures to their fix so the log is self-explaining.
    - name: AI inference troubleshooting
      # Fires when the preflight blocked us (inference was skipped) OR
      # when inference itself failed despite a green preflight.
      if: >-
        inputs.ai-suggestions == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        github.event.pull_request != null &&
        (steps.ai-ep.outputs.preflight_status != '200' || steps.ai-loop.outcome == 'failure')
      shell: bash
      env:
        AI_MODEL:    ${{ inputs.ai-model }}
        AI_ENDPOINT: ${{ steps.ai-ep.outputs.endpoint }}
        OWNER:       ${{ github.repository_owner }}
        OWNER_TYPE:  ${{ github.event.repository.owner.type }}
      run: |
        echo "::warning title=Drift AI suggestions skipped::GitHub Models inference failed — see decoded checklist in the step log."
        cat <<EOF
        ────────────────────────────────────────────────────────────
        🤖 GitHub Models inference FAILED. Decoded checklist:

          model:    ${AI_MODEL}
          endpoint: ${AI_ENDPOINT}
          owner:    ${OWNER} (type: ${OWNER_TYPE:-unknown})

        A "403 status code (no body)" almost always means ONE of:

          1. Missing permission. The CONSUMER workflow that calls this
             action must grant:
               permissions:
                 models: read          # ← required for GitHub Models
                 pull-requests: write  # post the review
                 checks: write         # scanner check run
                 contents: read        # checkout
             Note: declaring a permissions block sets every UNLISTED
             scope to 'none', so all four must be present.

          2. Org hasn't enabled GitHub Models. An org owner must turn it
             on: Org → Settings → Copilot → Models, and allow the model
             for the relevant teams/users.

          3. Wrong endpoint for an org repo. The built-in GITHUB_TOKEN
             has no personal identity, so org repos MUST use the
             org-scoped endpoint (this step resolved: ${AI_ENDPOINT}).
             If that still 403s, the org likely hasn't enabled Models.

        A "400 Unavailable model: ${AI_MODEL}" means the model is not
        served by the inference endpoint yet (gpt-5 commonly is not even
        when it shows "enabled" in the web UI). Switch ai-model to
        openai/gpt-4o, or confirm availability:
          curl -H "Authorization: Bearer \$PAT_WITH_models_read" \\
            ${AI_ENDPOINT}/models
        ────────────────────────────────────────────────────────────
        EOF

    # ─── 12. Post AI suggestions as a PR review (Octokit) ────────────
    # Runs the compiled bundle at dist/ai-suggest.js. It reads the
    # GPT-5 response file at AI_SUGGESTIONS_PATH, validates against
    # the AI envelope schema (src/ai/schema.ts), applies the quality
    # bar, caps at DRIFT_MAX_AI_SUGGESTIONS, and POSTs ONE
    # pulls.createReview via Octokit. Call shape is covered by the
    # tests in src/__tests__/ai-post.test.ts. Fail-soft: a non-fatal
    # error here will not break the deterministic review from step 9.
    - name: Post AI suggestions
      if: >-
        inputs.ai-suggestions == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-loop.outcome == 'success' &&
        github.event.pull_request != null
      shell: bash
      env:
        # The per-suggestion loop wrote every passing suggestion into one
        # envelope at this fixed path. The post bundle validates it
        # against the schema, re-applies the quality bar + diff anchoring,
        # caps at DRIFT_MAX_AI_SUGGESTIONS, and POSTs one createReview.
        AI_SUGGESTIONS_PATH:      ${{ runner.temp }}/ai-suggestions.json
        DRIFT_MAX_AI_SUGGESTIONS: ${{ inputs.ai-max-suggestions }}
        DRIFT_AI_MODEL:           ${{ inputs.ai-model }}
        GITHUB_TOKEN:             ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/dist/ai-suggest.js"
