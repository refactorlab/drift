name: 'Andy — PR Handoff by Drift'
description: 'Andy — PR companion Handoff by Drift. Open-source performance & FinOps platform Zero-config for consumers.'
author: 'refactor-labs'

branding:
  icon: 'activity'
  color: 'purple'

inputs:
  greeter:
    description: 'Name shown in the hello-world line.'
    required: false
    default: 'andy'
  profiler-release-tag:
    description: |
      Pin to a specific release tag (e.g. drift-lab-v0.4.0). Default empty
      → auto-detect the latest non-prerelease release in profiler-repo
      whose tag matches drift-lab-v* OR drift-static-profiler-v* AND has
      our binary asset attached. Zero-config for most consumers.
    required: false
    default: ''
  profiler-repo:
    description: 'GitHub repo hosting the drift-static-profiler binary releases.'
    required: false
    default: 'refactorlab/drift'
  profiler-local-bin:
    description: 'Path to a prebuilt drift-static-profiler binary. When set + executable, skips the GitHub Release download. Used by `make hello-test` for local act runs.'
    required: false
    default: ''
  debug:
    description: 'When true, sets DRIFT_LOG=info,drift_static_profiler=debug so the scanner emits verbose tracing events to stderr.'
    required: false
    default: 'false'
  progress:
    description: 'When true (default), the scanner shows per-phase progress (CliProgress / indicatif). When false, sets DRIFT_PROGRESS=off.'
    required: false
    default: 'true'
  github-token:
    description: |
      Token used to authenticate the GitHub API call when auto-detecting
      the latest release. Default = the workflow's GITHUB_TOKEN, which
      consumers get automatically (no setup required). Raises the API
      rate limit from 60/hr (anonymous, shared) to 5000/hr per consumer.
      Public release downloads themselves work without a token.
    required: false
    default: ${{ github.token }}
  ai-suggestions:
    description: |
      When true (default), runs a second, AI-powered review pass via
      `actions/ai-inference@v1` and posts the resulting inline code
      suggestions to the PR. This is independent of the deterministic
      scanner review — if the AI step fails (no `models: read` perm,
      model unavailable, etc.) the scanner review still ships.

      Consumer workflow must grant:
        permissions:
          contents: read
          pull-requests: write
          models: read
    required: false
    default: 'true'
  ai-model:
    description: |
      GitHub Models model ID for the AI suggestion pass. Defaults to
      `openai/gpt-4.1` — broadly served on org inference endpoints and
      stronger at generating committable code than gpt-4o. The
      per-suggestion inference loop sends the correct token field
      automatically — `max_completion_tokens` for reasoning models
      (gpt-5, o-series), `max_tokens` for classic models (gpt-4.1,
      gpt-4o). If your org's Models *inference* endpoint does not serve
      the chosen model, the preflight below catches it and the AI pass
      skips fail-soft. `openai/gpt-5` is in the global catalog but is NOT
      served by every org endpoint until an org admin enables it under
      Settings → Copilot → Policies → Models — override to `openai/gpt-5`
      once that's done.
    required: false
    default: 'openai/gpt-4.1'
  ai-endpoint:
    description: |
      GitHub Models inference endpoint. Default `auto` resolves it from
      the repo owner: ORG-owned repos get the org-scoped endpoint
        https://models.github.ai/orgs/<org>/inference
      and user-owned repos get https://models.github.ai/inference.
      This matters because the built-in GITHUB_TOKEN has no personal
      identity — in an org repo the user-scoped endpoint returns 403.
      Set an explicit URL to override. The org must still have GitHub
      Models enabled under Settings → Copilot → Models, and the
      workflow must grant `permissions: models: read`.
      (see docs.github.com/en/rest/models/inference)
    required: false
    default: 'auto'
  ai-max-files:
    description: |
      DEPRECATED / unused since the per-suggestion loop landed. Each AI
      call now diffs exactly ONE focal file, so there is no multi-file
      context bundle to cap. Kept for backward compatibility; setting it
      has no effect. Loop size is governed by `ai-max-suggestions`.
    required: false
    default: '20'
  ai-max-suggestions:
    description: |
      Hard cap on the number of AI code suggestions, end-to-end. Used
      in TWO places to keep the model's prompt inside its token budget:
        - INPUT: the top-N highest-confidence scanner findings handed to
          the model as focal points (→ AI_MAX_FOCAL_POINTS). Capping
          this is what keeps the request body under the 8000-token
          gpt-4o input limit on GitHub Models.
        - OUTPUT: suggestions actually posted to the PR, applied AFTER
          the quality bar (confidence, reference, category).
      Defaults to 3 — small + noticeable beats large + ignored.
    required: false
    default: '3'
  max-code-suggestions:
    description: |
      Hard cap on the number of SCANNER code suggestions kept in the
      report BEFORE any consumer (sticky PR comment, inline review, AI
      focal-point picker) reads it. The scanner itself emits suggestions
      uncapped (severity_rank DESC + confidence DESC), and 500-entry
      reports are common on large refactors. Without this cap the sticky
      PR comment overflows GitHub's 65 536-byte limit and the size guard
      collapses sections / hard-cuts the body with a "report truncated"
      footer — losing information silently.
      Defaults to '10' — the top-10 highest-priority suggestions fit
      under the sticky comment's 60 KB budget with room for the value
      card, risks, architecture, and the call-graph diagram. Applied via
      `jq` in a dedicated cap step right after the scan, so every
      downstream consumer (sticky comment, deterministic + AI inline
      review, AI focal-point picker) reads the SAME capped list.
    required: false
    default: '10'
  fail-threshold:
    description: |
      NOTE (current): failing is GLOBALLY DISABLED — Drift NEVER fails a PR
      regardless of this value (DRIFT_FAILS_PR=false in the action bundle), so
      this input is inert for now. The semantics below apply only once that
      switch is flipped back on.

      Optional. The number of product-correctness (category B) issues —
      those that clear the quality bar — ABOVE WHICH the check fails (red ✗).
        <empty> — never fail the PR (default). Drift is advisory: issues
                  post as ⚠️ warnings in the sticky comment and as
                  ::warning:: annotations, and the PR stays green.
        0       — fail if there is ANY product-correctness issue.
        3       — fail only if there are MORE THAN 3 such issues.
      Left empty by default so Drift NEVER fails a consumer's PR. A
      non-numeric value is ignored (treated as empty) and never raises —
      the action is fail-soft on its own errors too.
    required: false
    default: ''
  open-issue:
    description: |
      When 'true', Drift opens — or updates — a single GitHub Issue
      summarising THIS PR's findings, deduplicated per-PR via a hidden
      marker so repeated runs refresh the same issue instead of spamming
      new ones. Default 'false'.

      Primarily driven by the `/drift issue` comment command (see
      examples/drift-on-comment.yml), which sets this to 'true'.

      REQUIRES the consumer workflow to grant `permissions: issues: write`.
      Without it the issues.create/update call returns 403 ("Resource not
      accessible by integration") — which Drift swallows fail-soft, so the
      sticky comment, inline review, and check run still ship.
    required: false
    default: 'false'
  audio-summary:
    description: |
      When true (default), synthesize a spoken WAV summary of the PR with
      Piper (offline neural TTS), upload it as a NON-ZIPPED workflow artifact
      (actions/upload-artifact@v7 with `archive: false`), and link that raw
      .wav at the END of the Drift sticky comment (posted via Octokit in
      dist/index.js). The link is the .wav file itself — NOT a zip; on a
      browser that plays audio/wav natively it streams in-tab, otherwise it
      downloads the bare .wav (no unzip step). Needs no extra permissions.

      The spoken TEXT is an AI-written handover briefing: a < 300-word,
      read-aloud script covering the PR's story, its main code locations,
      risks, and follow-up work. It is generated by one inline GitHub Models
      call (curl + jq in the briefing step) over the PR title, description,
      commit history, and diff — so it reuses `ai-model` / `ai-endpoint` and
      needs the same `models: read` permission as `ai-suggestions`. When Models is
      unreachable (no `models: read`, model unavailable, network), the script
      falls back to the scanner's deterministic
      `pr_review.business_logic.summary`, then to the PR title.

      Fully fail-soft: any briefing / TTS / download / upload error is a
      ::warning:: and never breaks the review. The Piper binary AND the voice
      model are cached across runs, so a warm run adds only the synthesis time.
    required: false
    default: 'true'
  piper-voice:
    description: |
      Piper voice id from the HF `rhasspy/piper-voices` catalog, formatted
      `<lang>-<name>-<quality>` (e.g. en_US-ryan-medium, en_GB-alba-medium).
      The download path is derived from the id.
    required: false
    default: 'en_US-ryan-medium'
  piper-version:
    description: |
      rhasspy/piper release TAG for the prebuilt Linux TTS binary (default
      2023.11.14-2, the last classic release; assets piper_linux_x86_64 /
      piper_linux_aarch64). If this tag/asset can't be fetched the install
      falls back to the older v1.2.0 piper_amd64 / piper_arm64 tarball.
    required: false
    default: '2023.11.14-2'
  # ─── PR context overrides (event-agnostic invocation) ──────────────
  # These are empty by default. On `pull_request` events the derivation
  # step (see `Resolve PR context`) fills them from github.event.pull_request.
  # On `issue_comment` events a consumer workflow can either pass these
  # explicitly OR leave them empty — the derivation step then resolves
  # everything via a single REST GET /pulls/{number} call.
  #
  # WHY 5 SEPARATE INPUTS, NOT ONE JSON BLOB: each maps 1:1 to the value
  # callers already have on hand. Empty default is required because GitHub
  # Actions evaluates an empty expression as "value present, empty" — NOT
  # "use default" — so we cannot use `default: ${{ github.event.pull_request.number }}`
  # (see github/docs#31513). The derivation step is the single point of fallback.
  pr-number:
    description: 'PR number. Empty → derived from the event payload (pull_request or issue_comment).'
    required: false
    default: ''
  base-sha:
    description: 'Base SHA of the PR diff. Empty → derived from the event payload (or a REST call on issue_comment).'
    required: false
    default: ''
  head-sha:
    description: 'Head SHA of the PR diff. Same fallback chain as base-sha.'
    required: false
    default: ''
  pr-title:
    description: 'PR title (used by the AI briefing + permalink line). Same fallback chain.'
    required: false
    default: ''
  pr-body:
    description: 'PR body (used by the AI briefing). Same fallback chain.'
    required: false
    default: ''
  # ─── /drift comment-trigger mode ───────────────────────────────────
  start-on-pr-comment:
    description: |
      When 'true', ENABLES the `/drift` PR-comment trigger ON TOP OF the
      normal pull_request flow. The flag is ADDITIVE — turning it on does
      NOT disable scans on push / PR opened / synchronize / reopened. On a
      `/drift` comment the action also:
        • Reacts 👀 to acknowledge the command.
        • Parses /drift overrides from the comment body (debug, ai-model, …).
        • Resolves PR SHAs via REST; reacts 😕 and exits on closed/merged PRs.
        • Checks out the PR head by IMMUTABLE SHA (fork-safe).
        • Runs the scan + posts the review.
        • Reacts 🚀 on success / 👎 on failure.
      Recommended wiring: a SINGLE workflow file with both `on: pull_request`
      and `on: issue_comment`, setting `start-on-pr-comment: true`. The
      action handles each event correctly (comment-only steps stay gated
      behind the /drift gate; pull_request events skip them and scan
      directly). When 'false' (default) the action runs only on
      pull_request events as it always has.
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    # ─── /drift gate ────────────────────────────────────────────────
    # Single source of truth for "is the comment-trigger flow ACTIVE?".
    # Active iff: start-on-pr-comment=true AND we're on an issue_comment
    # event attached to a PR AND the comment body begins with /drift AND
    # the commenter isn't a bot. Every step that exists only for comment
    # mode (react 👀, parse args, checkout, react 🚀/👎) keys off this
    # output, so the rest of the action remains untouched for
    # pull_request consumers.
    - name: /drift comment trigger gate
      id: comment-gate
      shell: bash
      env:
        START_ON_PR_COMMENT: ${{ inputs.start-on-pr-comment }}
        EVENT_NAME:          ${{ github.event_name }}
        IS_PR_COMMENT:       ${{ github.event.issue.pull_request != null }}
        COMMENT_BODY:        ${{ github.event.comment.body }}
        COMMENTER_TYPE:      ${{ github.event.comment.user.type }}
      run: |
        # Match the workflow-level gate's startsWith() semantics EXACTLY:
        # the comment body must literally begin with /drift. Parse-comment
        # is more lenient (it finds /drift anywhere) — but that's parsing,
        # not gating. Identical gate logic at both layers means a comment
        # that passes the workflow `if:` will reliably activate this step,
        # with no surprise mismatches. Glob match in `case` is exact, has
        # no expansion of $COMMENT_BODY against the pattern, and avoids
        # the heredoc/read-loop dance entirely.
        active="false"
        # Strip a leading CR — Windows webhook bodies occasionally carry
        # one and would defeat both the workflow startsWith and this case.
        body="${COMMENT_BODY#$'\r'}"
        if [ "$START_ON_PR_COMMENT" = "true" ] \
           && [ "$EVENT_NAME" = "issue_comment" ] \
           && [ "$IS_PR_COMMENT" = "true" ] \
           && [ "${COMMENTER_TYPE:-User}" != "Bot" ]; then
          case "$body" in /drift*) active="true" ;; esac
        fi
        echo "active=${active}" >> "$GITHUB_OUTPUT"
        if [ "$active" = "true" ]; then
          echo "👁  /drift comment-trigger ACTIVE"
        else
          echo "⏭️  /drift comment-trigger inactive (start-on-pr-comment=${START_ON_PR_COMMENT}, event=${EVENT_NAME})"
        fi

    # ─── React 👀 ─────────────────────────────────────────────────
    # Immediate ack so the user knows we picked the command up. Fail-soft:
    # if the reactions endpoint hiccups, the scan still ships. The 👀
    # is the durable receipt — 🚀 / 👎 below add the terminal status.
    - name: React 👀 on /drift
      if: steps.comment-gate.outputs.active == 'true'
      continue-on-error: true
      shell: bash
      env:
        GH_OWNER: ${{ github.repository_owner }}
        GH_REPO:  ${{ github.event.repository.name }}
        CID:      ${{ github.event.comment.id }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        curl -sS -X POST \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/comments/${CID}/reactions" \
          -d '{"content":"eyes"}' >/dev/null || true

    # ─── Parse /drift args ────────────────────────────────────────
    # Reuses action/scripts/parse-comment.mjs (zero deps, runnable with
    # bare `node`). We read it straight off the action's own filesystem
    # via $GITHUB_ACTION_PATH — no sparse-checkout dance needed because
    # we ARE the action repo on disk. COMMENT_BODY flows via env (NEVER
    # inlined into shell) so a crafted comment can't escape. Unknown
    # keys log ::warning:: and are dropped. Outputs are line-sanitized.
    - name: Parse /drift args
      id: args
      if: steps.comment-gate.outputs.active == 'true'
      # Fail-soft: a parser crash on a pathological comment should NOT
      # take down the whole run with 👎. If parse exits non-zero,
      # steps.args.outputs.* stay empty and every downstream
      # `steps.args.outputs.X || inputs.X` fallback resolves to inputs.X.
      # The scan still ships with the workflow's defaults.
      continue-on-error: true
      shell: bash
      env:
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: node "${{ github.action_path }}/action/scripts/parse-comment.mjs"

    # ─── 0. Resolve PR context (event-agnostic) ──────────────────────
    # Single source of truth for PR metadata. Used by every later step + by
    # dist/index.js and dist/ai-suggest.js (via the DRIFT_PR_* env vars we
    # write to $GITHUB_ENV). Resolution priority:
    #   1. Explicit inputs (pr-number, base-sha, head-sha, pr-title, pr-body).
    #   2. github.event.pull_request.* (the canonical `pull_request` event).
    #   3. github.event.issue.pull_request.url + REST GET /pulls/{number}
    #      (the `issue_comment` flow — the issue payload has the PR number
    #      but no base/head SHAs).
    #   4. Empty → every later step's `if:` short-circuits and Drift skips.
    #
    # Why this layer exists: GitHub Actions evaluates an empty input
    # expression as "value present, empty" (NOT "use default"), so we
    # cannot make inputs default to event fields. This step is the single
    # branch where that fallback happens — everywhere else just reads
    # steps.pr-ctx.outputs.* or process.env.DRIFT_PR_*.
    - name: Resolve PR context
      id: pr-ctx
      shell: bash
      env:
        INPUT_PR_NUMBER:    ${{ inputs.pr-number }}
        INPUT_BASE_SHA:     ${{ inputs.base-sha }}
        INPUT_HEAD_SHA:     ${{ inputs.head-sha }}
        INPUT_PR_TITLE:     ${{ inputs.pr-title }}
        INPUT_PR_BODY:      ${{ inputs.pr-body }}
        EVENT_PR_NUMBER:    ${{ github.event.pull_request.number || github.event.issue.number }}
        EVENT_BASE_SHA:     ${{ github.event.pull_request.base.sha }}
        EVENT_HEAD_SHA:     ${{ github.event.pull_request.head.sha }}
        EVENT_BASE_REF:     ${{ github.event.pull_request.base.ref }}
        EVENT_HEAD_REF:     ${{ github.event.pull_request.head.ref }}
        EVENT_PR_TITLE:     ${{ github.event.pull_request.title }}
        EVENT_PR_BODY:      ${{ github.event.pull_request.body }}
        EVENT_PR_HTML_URL:  ${{ github.event.pull_request.html_url }}
        EVENT_PR_AUTHOR:    ${{ github.event.pull_request.user.login }}
        EVENT_ISSUE_PR_URL: ${{ github.event.issue.pull_request.url }}
        # Comment-mode extra: used to react 😕 on a closed PR before any
        # downstream step (scan, AI, post review) wastes time. start-on-pr-comment
        # itself is NOT consulted here — the flag is additive, so a
        # pull_request event with the flag set scans exactly like a flag-off run.
        COMMENT_MODE_ACTIVE:       ${{ steps.comment-gate.outputs.active }}
        GH_OWNER:                  ${{ github.repository_owner }}
        GH_REPO:                   ${{ github.event.repository.name }}
        CID:                       ${{ github.event.comment.id }}
        GITHUB_TOKEN:              ${{ inputs.github-token }}
      run: |
        # Priority chain: explicit input > pull_request event > REST fallback.
        pr_number="${INPUT_PR_NUMBER:-${EVENT_PR_NUMBER:-}}"
        base_sha="${INPUT_BASE_SHA:-${EVENT_BASE_SHA:-}}"
        head_sha="${INPUT_HEAD_SHA:-${EVENT_HEAD_SHA:-}}"
        base_ref="${EVENT_BASE_REF:-}"
        head_ref="${EVENT_HEAD_REF:-}"
        pr_title="${INPUT_PR_TITLE:-${EVENT_PR_TITLE:-}}"
        pr_body="${INPUT_PR_BODY:-${EVENT_PR_BODY:-}}"
        pr_html_url="${EVENT_PR_HTML_URL:-}"
        pr_author="${EVENT_PR_AUTHOR:-}"

        # issue_comment branch: the issue payload has the PR # but NOT the
        # SHAs, title, body, or refs. One REST call fills in whatever the
        # caller didn't pass explicitly. We fire it whenever we're in
        # issue_comment mode (EVENT_ISSUE_PR_URL set) AND something is still
        # missing — the SHAs OR the title. The title check matters because a
        # consumer that resolves the SHAs itself (needed for its own checkout)
        # still leaves title/body empty; without this they'd never populate
        # and the AI briefing + permalink line would silently lose them.
        # On a pull_request event EVENT_ISSUE_PR_URL is empty, so this never
        # fires there. The `${x:-$(...)}` guards below only fill empties, so
        # explicitly-passed values always win.
        pr_state=""
        if [ -n "$pr_number" ] && [ -n "${EVENT_ISSUE_PR_URL:-}" ] && { [ -z "${base_sha}${head_sha}" ] || [ -z "$pr_title" ]; }; then
          if command -v jq >/dev/null 2>&1; then
            resp="$(curl -sS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${EVENT_ISSUE_PR_URL}" 2>/dev/null || echo '{}')"
            base_sha="${base_sha:-$(printf '%s' "$resp" | jq -r '.base.sha // empty')}"
            head_sha="${head_sha:-$(printf '%s' "$resp" | jq -r '.head.sha // empty')}"
            base_ref="${base_ref:-$(printf '%s' "$resp" | jq -r '.base.ref // empty')}"
            head_ref="${head_ref:-$(printf '%s' "$resp" | jq -r '.head.ref // empty')}"
            pr_title="${pr_title:-$(printf '%s' "$resp" | jq -r '.title // empty')}"
            pr_body="${pr_body:-$(printf '%s' "$resp"  | jq -r '.body  // empty')}"
            pr_html_url="${pr_html_url:-$(printf '%s' "$resp" | jq -r '.html_url // empty')}"
            pr_author="${pr_author:-$(printf '%s' "$resp" | jq -r '.user.login // empty')}"
            pr_state="$(printf '%s' "$resp" | jq -r '.state // empty')"
            echo "🪝 Resolved PR context via REST: ${EVENT_ISSUE_PR_URL} (state=${pr_state:-?})"
          else
            echo "⚠️  issue_comment fallback needs jq — install it on the runner. Continuing without."
          fi
        fi

        # start-on-pr-comment is ADDITIVE, not exclusive: setting it true
        # ENABLES the /drift comment trigger, but does NOT disable the
        # normal pull_request flow. A single workflow file that listens to
        # both `pull_request` and `issue_comment` can therefore set
        # `start-on-pr-comment: true` and get auto-scans on push AND
        # manual re-runs via /drift, with no duplicate jobs and no
        # silently-skipped events. Comment-mode-only steps (👀, parse-args,
        # fork-safe head checkout, 🚀/👎 terminal reactions) remain gated
        # on the comment-gate `active` flag below, so a pull_request event
        # never trips them.

        # Comment-trigger mode: short-circuit on a closed/merged PR by
        # CLEARING the SHAs so every downstream `head_sha != ''` gate
        # naturally skips. We also drop a 😕 reaction so the commenter
        # sees we noticed and chose not to scan. The closed-PR check is
        # ONLY done in comment mode — a pull_request event firing on a
        # closed PR (rare but legal: synchronize after close) still gets
        # scanned as today.
        if [ "${COMMENT_MODE_ACTIVE:-false}" = "true" ] \
           && [ -n "$pr_state" ] && [ "$pr_state" != "open" ]; then
          if [ -n "${CID:-}" ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/comments/${CID}/reactions" \
              -d '{"content":"confused"}' >/dev/null || true
          fi
          echo "::notice::Drift skipped — PR state is ${pr_state} (only 'open' PRs are eligible)."
          pr_number=""; head_sha=""; base_sha=""; base_ref=""; head_ref=""
          pr_title=""; pr_body=""; pr_html_url=""; pr_author=""
        fi

        # Step outputs (single-line scalars).
        {
          echo "pr_number=$pr_number"
          echo "base_sha=$base_sha"
          echo "head_sha=$head_sha"
          echo "base_ref=$base_ref"
          echo "head_ref=$head_ref"
          echo "pr_html_url=$pr_html_url"
          echo "pr_author=$pr_author"
          echo "pr_state=$pr_state"
        } >> "$GITHUB_OUTPUT"
        # Multi-line outputs use the heredoc form — title and body can
        # contain newlines and arbitrary punctuation. The delimiter is
        # randomized so it can't collide with user content.
        delim="DRIFT_EOF_$RANDOM$RANDOM"
        {
          printf 'pr_title<<%s\n%s\n%s\n' "$delim" "$pr_title" "$delim"
          printf 'pr_body<<%s\n%s\n%s\n'  "$delim" "$pr_body"  "$delim"
        } >> "$GITHUB_OUTPUT"

        # Job-wide env vars for the bundled JS (dist/index.js, dist/ai-suggest.js).
        # These let the TS code be event-agnostic: it reads context.payload.pull_request
        # first and falls back to these. Empty values are tolerated (the TS
        # helper short-circuits when head_sha is empty).
        {
          echo "DRIFT_PR_NUMBER=$pr_number"
          echo "DRIFT_HEAD_SHA=$head_sha"
          echo "DRIFT_BASE_SHA=$base_sha"
          echo "DRIFT_BASE_REF=$base_ref"
          echo "DRIFT_HEAD_REF=$head_ref"
          echo "DRIFT_PR_HTML_URL=$pr_html_url"
          echo "DRIFT_PR_AUTHOR=$pr_author"
          printf 'DRIFT_PR_TITLE<<%s\n%s\n%s\n' "$delim" "$pr_title" "$delim"
          printf 'DRIFT_PR_BODY<<%s\n%s\n%s\n'  "$delim" "$pr_body"  "$delim"
        } >> "$GITHUB_ENV"

        if [ -n "$head_sha" ] && [ -n "$base_sha" ]; then
          echo "✅ PR #${pr_number}  base=${base_sha:0:12}  head=${head_sha:0:12}"
        else
          echo "⏭️  No PR context resolved — Drift will skip downstream steps."
        fi

    # ─── /drift checkout (BASE repo) ────────────────────────────────
    # In `pull_request` mode the consumer's workflow already did the
    # checkout BEFORE invoking the action. In comment-trigger mode we're
    # mid-step on a `issue_comment` event with a bare workspace, so we
    # do the checkout ourselves — fetch-depth: 0 because pr-ctx already
    # resolved the SHAs and the diff step deepens until merge-base.
    - name: Checkout base repo (comment mode)
      if: >-
        steps.comment-gate.outputs.active == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ─── /drift checkout (PR HEAD by IMMUTABLE SHA) ─────────────────
    # Fork-safe: refs/pull/<n>/head is the ONLY ref the BASE repo can
    # use to reach a fork PR's head commit. Checking out by SHA (not by
    # ref) defeats the force-push race between our 👀 ack and this
    # checkout — if HEAD moved, the SHA either still names the exact
    # code we vetted, or `git checkout` fails (👎). Drift only READS
    # source (tree-sitter), never executes fork code, so this is safe.
    - name: Check out PR head by SHA (comment mode, fork-safe)
      if: >-
        steps.comment-gate.outputs.active == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        PR_NUMBER: ${{ steps.pr-ctx.outputs.pr_number }}
        HEAD_SHA:  ${{ steps.pr-ctx.outputs.head_sha }}
      run: |
        git fetch --no-tags origin "refs/pull/${PR_NUMBER}/head"
        git checkout --detach "$HEAD_SHA"

    # ─── 1. Say hello (always) ───────────────────────────────────────
    - name: Say hello
      shell: bash
      env:
        GREETER:     ${{ inputs.greeter }}
        PR_NUMBER:   ${{ steps.pr-ctx.outputs.pr_number }}
        PR_HEAD_REF: ${{ steps.pr-ctx.outputs.head_ref }}
        PR_BASE_REF: ${{ steps.pr-ctx.outputs.base_ref }}
        PR_HEAD_SHA: ${{ steps.pr-ctx.outputs.head_sha }}
      run: |
        echo "👋 hello world by ${GREETER}"
        echo "🛠️  runner: ${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}"
        echo "📂 repo:   ${GITHUB_REPOSITORY:-<unset>}"
        echo "🌿 event:  ${GITHUB_EVENT_NAME:-<unset>}"
        echo "🔁 PR:     #${PR_NUMBER:-n/a} (${PR_HEAD_REF:-n/a} → ${PR_BASE_REF:-n/a})"
        echo "🔖 sha:    ${PR_HEAD_SHA:-${GITHUB_SHA:-<unset>}}"

    # ─── 2. Resolve the release tag (auto-detect or pinned) ──────────
    # We resolve the tag HERE (before the cache step) because the cache
    # key includes the tag. Auto-detect: most-recent published release
    # in profiler-repo whose tag matches drift-lab-v* or
    # drift-static-profiler-v* AND has the binary asset attached.
    - name: Resolve release tag
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: resolve
      shell: bash
      env:
        DRIFT_PROFILER_REPO:         ${{ inputs.profiler-repo }}
        DRIFT_PROFILER_RELEASE_TAG:  ${{ (steps.args.outputs.profiler-release-tag || inputs.profiler-release-tag) }}
        DRIFT_PROFILER_LOCAL_BIN:    ${{ inputs.profiler-local-bin }}
        GITHUB_TOKEN:                ${{ inputs.github-token }}
      run: |
        # Local-bin override: skip the API call entirely. install-profiler.sh
        # also short-circuits when this env is set + executable.
        if [ -n "${DRIFT_PROFILER_LOCAL_BIN:-}" ] && [ -x "${DRIFT_PROFILER_LOCAL_BIN}" ]; then
          echo "tag=local" >> "$GITHUB_OUTPUT"
          echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"
          echo "🧪 Using local binary; cache step will be skipped."
          exit 0
        fi
        # Pinned tag: use as-is.
        if [ -n "${DRIFT_PROFILER_RELEASE_TAG:-}" ]; then
          echo "tag=${DRIFT_PROFILER_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"
          echo "📌 Pinned tag: ${DRIFT_PROFILER_RELEASE_TAG}"
          exit 0
        fi
        # Auto-detect.
        case "${RUNNER_OS}" in
          Linux)   target="${RUNNER_ARCH}-unknown-linux-gnu" ; ext="tar.gz" ;;
          macOS)   target="${RUNNER_ARCH}-apple-darwin"      ; ext="tar.gz" ;;
          Windows) target="${RUNNER_ARCH}-pc-windows-msvc"   ; ext="zip"    ;;
        esac
        # Normalize arch name to what the release assets use.
        target=$(echo "$target" | sed -e 's/X64/x86_64/' -e 's/ARM64/aarch64/')
        asset="drift-static-profiler-${target}.${ext}"
        auth=()
        [ -n "${GITHUB_TOKEN:-}" ] && auth=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
        echo "🔍 Auto-detecting latest release in ${DRIFT_PROFILER_REPO} containing ${asset}"
        releases=$(curl --fail --silent --location "${auth[@]}" \
          "https://api.github.com/repos/${DRIFT_PROFILER_REPO}/releases?per_page=30" 2>/dev/null || echo '[]')
        tag=$(echo "$releases" | jq -r --arg asset "$asset" '
          [.[]
            | select(.draft == false)
            | select(.prerelease == false)
            | select(.tag_name | test("^(drift-lab-v|drift-static-profiler-v)"))
            | select(any(.assets[]?; .name == $asset))
          ][0].tag_name // empty
        ')
        if [ -z "$tag" ]; then
          echo "⚠️  No release in ${DRIFT_PROFILER_REPO} has ${asset} yet — install + scan will skip."
          echo "tag=none" >> "$GITHUB_OUTPUT"
        else
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "📌 Resolved to: $tag"
        fi
        echo "arch=${RUNNER_ARCH}" >> "$GITHUB_OUTPUT"

    # ─── 3. Compute install path + cache key (tag-aware) ─────────────
    # Cache layout mirrors $RUNNER_TOOL_CACHE/<tool>/<version>/<arch>.
    # Suffix "-v1" is a SCHEMA version we bump if we ever change the
    # on-disk layout — busts every old cache without touching the tag.
    - name: Compute install path + cache key
      id: paths
      shell: bash
      run: |
        tag="${{ steps.resolve.outputs.tag }}"
        install_dir="${RUNNER_TEMP}/drift-static-profiler/${tag}/${RUNNER_ARCH}"
        cache_key="drift-static-profiler-${tag}-${RUNNER_OS}-${RUNNER_ARCH}-v1"
        echo "install_dir=$install_dir" >> "$GITHUB_OUTPUT"
        echo "cache_key=$cache_key"     >> "$GITHUB_OUTPUT"
        echo "🔑 cache key:   $cache_key"
        echo "📁 install dir: $install_dir"

    # ─── 4. Restore drift-static-profiler from cache (if resolvable) ─
    # Skip the cache layer entirely when tag=local (act dev path) or
    # tag=none (no release found — nothing to cache).
    - name: Restore drift-static-profiler from cache
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: cache
      if: steps.resolve.outputs.tag != 'local' && steps.resolve.outputs.tag != 'none'
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.paths.outputs.install_dir }}
        key: ${{ steps.paths.outputs.cache_key }}

    # ─── 5. Install (no-op on cache hit; downloads on miss) ──────────
    - name: Install drift-static-profiler
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: install
      shell: bash
      env:
        DRIFT_PROFILER_REPO:         ${{ inputs.profiler-repo }}
        DRIFT_PROFILER_RELEASE_TAG:  ${{ steps.resolve.outputs.tag == 'local' && '' || steps.resolve.outputs.tag }}
        DRIFT_PROFILER_LOCAL_BIN:    ${{ inputs.profiler-local-bin }}
        DRIFT_PROFILER_INSTALL_DIR:  ${{ steps.paths.outputs.install_dir }}
        GITHUB_TOKEN:                ${{ inputs.github-token }}
      run: |
        if [ "${{ steps.resolve.outputs.tag }}" = "none" ]; then
          echo "⚠️  No release tag resolved — skipping install."
          echo "installed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        ${{ github.action_path }}/action/scripts/install-profiler.sh
        # Gate the cache-save step: only persist when the binary actually
        # landed on disk (prevents the empty-dir-cache footgun).
        bin="${{ steps.paths.outputs.install_dir }}/drift-static-profiler"
        [ "${RUNNER_OS:-}" = "Windows" ] && bin="${bin}.exe"
        if [ -x "$bin" ]; then
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    # ─── 6. Save to cache (cache MISS + verified install only) ───────
    - name: Save drift-static-profiler to cache
      continue-on-error: true   # advisory: never fail the PR on our own error
      if: >-
        steps.resolve.outputs.tag != 'local' &&
        steps.resolve.outputs.tag != 'none' &&
        steps.cache.outputs.cache-hit != 'true' &&
        steps.install.outputs.installed == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.paths.outputs.install_dir }}
        key: ${{ steps.paths.outputs.cache_key }}

    # ─── 6b. Compute the real PR diff (changed files + LOC + commits) ─
    # Replaces the old hardcoded demo file list. The set of files a PR
    # touched is derived from git — NOT pinned in this YAML — together
    # with per-file LOC (numstat → value_money) and commit messages
    # (→ counts / feat|fix|perf signals). We diff against the merge-base
    # (three-dot semantics) so only what the PR actually introduced is
    # scanned.
    #
    # `has_source` decides whether ANY changed file is in a language the
    # scanner can analyze. The extension set MIRRORS Language::from_path
    # in drift-static-profiler/src/lib.rs — keep the two in sync. When
    # has_source=false (config/docs/non-code only) the scan and every
    # downstream comment/AI step is skipped, so such PRs get an EMPTY
    # result instead of a misleading negative-money "Drift ▼" verdict.
    - name: Compute PR diff
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: diff
      if: steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        BASE_SHA:     ${{ steps.pr-ctx.outputs.base_sha }}
        HEAD_SHA:     ${{ steps.pr-ctx.outputs.head_sha }}
        CHANGED_PATH: ${{ runner.temp }}/drift-changed.txt
        STATS_PATH:   ${{ runner.temp }}/drift-diff-stats.tsv
        COMMITS_PATH: ${{ runner.temp }}/drift-commits.txt
      run: |
        # Both endpoints may be missing if the consumer shallow-cloned.
        # actions/checkout with fetch-depth: 0 (the README workflow's
        # default) already has them; these fetches are a best-effort top-up.
        git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
        git fetch --no-tags --depth=1 origin "$HEAD_SHA" 2>/dev/null || true
        # GitHub's PR "Files changed" diff is THREE-DOT — computed from the
        # merge-base of (base, head), NOT from the base-branch tip. A depth-1
        # dual-SHA fetch shares no common ancestor, so `git merge-base` fails
        # and we'd fall back to BASE_SHA (the tip). On any PR whose base branch
        # advanced past the fork point, diffing from the tip flags lines that
        # AREN'T in GitHub's PR diff — so every finding anchors off-diff (the
        # inline review 422s + the AI pass has no `+` line to put after_code
        # on). Deepen in bounded steps until the merge-base is reachable, so
        # our diff range matches GitHub's exactly. Purely additive: if the
        # clone is already full (fetch-depth: 0) the first check passes and we
        # never deepen; if deepening can't reach it we keep the old fallback.
        deepen=200
        for _ in 1 2 3 4 5; do
          git merge-base "$BASE_SHA" "$HEAD_SHA" >/dev/null 2>&1 && break
          git fetch --no-tags --deepen="$deepen" origin "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true
          deepen=$((deepen * 2))
        done
        base="$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")"
        if [ -n "$base" ]; then
          echo "✅ merge-base resolved ($base) — diff range matches GitHub's PR view"
        else
          base="$BASE_SHA"
          echo "⚠️  merge-base unreachable after deepening — diffing from base tip; anchors may fall off-diff"
        fi
        echo "📐 diff base: ${base} → head: ${HEAD_SHA}"
        # --diff-filter=ACMRT: added/copied/modified/renamed/type-changed
        # (drops pure deletions — there's no HEAD content to analyze).
        git diff --name-only --diff-filter=ACMRT "$base" "$HEAD_SHA" > "$CHANGED_PATH" || true
        # numstat is `adds<TAB>dels<TAB>path`; read_diff_stats auto-detects
        # that ordering and skips binary (`-`) rows, so pipe it raw.
        git diff --numstat                       "$base" "$HEAD_SHA" > "$STATS_PATH"   || true
        # NUL-separated commit bodies (read_commit_messages splits on \0).
        git log  --format=%B%x00                 "${base}..${HEAD_SHA}" > "$COMMITS_PATH" || true

        n=$(wc -l < "$CHANGED_PATH" | tr -d ' ')
        echo "📄 ${n} changed file(s):"
        sed 's/^/    /' "$CHANGED_PATH"

        # has_source: did the PR touch a file in a supported language?
        # MIRRORS Language::from_path (drift-static-profiler/src/lib.rs).
        has_source=false
        while IFS= read -r f; do
          [ -z "$f" ] && continue
          case "${f##*.}" in
            py|java|ts|tsx|js|jsx|mjs|cjs|go|rs|scala|sc|kt|kts)
              has_source=true; break ;;
          esac
        done < "$CHANGED_PATH"

        {
          echo "changed_path=$CHANGED_PATH"
          echo "stats_path=$STATS_PATH"
          echo "commits_path=$COMMITS_PATH"
          echo "base_sha=$base"
          echo "has_source=$has_source"
        } >> "$GITHUB_OUTPUT"

        if [ "$has_source" = "true" ]; then
          echo "✅ Supported source files changed — Drift will scan."
        else
          echo "⏭️  No supported source files changed (config/docs/non-code only) — skipping scan + comment."
        fi

    # ─── 7. Run scan-pr (skips if binary missing OR no supported source) ─
    - name: Run scan-pr
      continue-on-error: true   # advisory: a scanner crash must NOT fail the PR
      id: scan
      if: >-
        steps.pr-ctx.outputs.head_sha != '' &&
        steps.diff.outputs.has_source == 'true'
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DRIFT_LOG: ${{ (steps.args.outputs.debug || inputs.debug) == 'true' && 'info,drift_static_profiler=debug' || '' }}
        DRIFT_PROGRESS: ${{ (steps.args.outputs.progress || inputs.progress) == 'true' && '' || 'off' }}
        # Raw input values, threaded as env vars (NOT `${{ }}`-interpolated into
        # the bash body below). The `${{ }}` substitution happens BEFORE bash
        # parses the script — a malicious caller passing
        # `debug: 'true"; rm -rf $HOME #'` would otherwise inject arbitrary
        # commands. Passing through env: makes them inert string data.
        DEBUG_INPUT:    ${{ (steps.args.outputs.debug || inputs.debug) }}
        PROGRESS_INPUT: ${{ (steps.args.outputs.progress || inputs.progress) }}
        CHANGED_PATH: ${{ steps.diff.outputs.changed_path }}
        STATS_PATH:   ${{ steps.diff.outputs.stats_path }}
        COMMITS_PATH: ${{ steps.diff.outputs.commits_path }}
        BASE_SHA:     ${{ steps.diff.outputs.base_sha }}
        PR_TITLE:     ${{ steps.pr-ctx.outputs.pr_title }}
        PR_BODY:      ${{ steps.pr-ctx.outputs.pr_body }}
      run: |
        if ! command -v drift-static-profiler > /dev/null 2>&1; then
          echo "⚠️  drift-static-profiler not on PATH — skipping scan."
          echo "scan_ran=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "scan_ran=true" >> "$GITHUB_OUTPUT"
        echo "🔬 scan-pr over $(wc -l < "$CHANGED_PATH" | tr -d ' ') changed file(s):"
        sed 's/^/    /' "$CHANGED_PATH"
        echo ""
        echo "🪵 debug mode:    ${DEBUG_INPUT}     (DRIFT_LOG=${DRIFT_LOG:-<unset>})"
        echo "📊 progress:      ${PROGRESS_INPUT}  (DRIFT_PROGRESS=${DRIFT_PROGRESS:-<default-on>})"
        echo ""
        # NOTE: --pr-title / --pr-body use the `--flag=value` form on purpose.
        # PR titles/bodies are raw user text that routinely starts with `-`
        # (markdown bullet `- item`, `---` rule). With the space form
        # (`--pr-title "$X"`), clap reads that leading `-` as an unknown flag
        # and aborts with `unexpected argument '- '` (exit 2) before scanning.
        # The `=` form is hyphen-immune and works with any released binary.
        #
        # Pass the byte-aware memory backstop ONLY if this binary supports
        # it. Consumers may pin an older release that predates --max-rss-mb,
        # and an unknown flag aborts clap (exit 2) before scanning. Probe
        # --help once and gate the flag on it so we never break old pins.
        rss_guard=()
        if drift-static-profiler scan-pr --help 2>/dev/null | grep -q -- '--max-rss-mb'; then
          rss_guard=(--max-rss-mb "${DRIFT_MAX_RSS_MB:-5000}")
          echo "🧠 memory backstop: --max-rss-mb ${DRIFT_MAX_RSS_MB:-5000}"
        else
          echo "🧠 memory backstop: not supported by this binary — relying on node budgets"
        fi

        # Defense-in-depth: `continue-on-error` only neutralizes a non-zero
        # EXIT, never a signal/cancel. Two such modes can otherwise kill the
        # whole job (including the PR-comment step):
        #   • runaway memory → kernel OOM-killer SIGKILLs us, which GitHub
        #     surfaces as the opaque "The operation was canceled." The
        #     binary self-limits (--max-rss-mb above, with a WARN) and the
        #     node budgets bound it; `timeout` is the final wall.
        #   • a true hang → `timeout` SIGTERMs at the deadline, SIGKILLs 15s
        #     later. A self-inflicted timeout exits 124 (catchable here).
        # `set +e` so the exit-code switch runs under the default `-e` shell.
        set +e
        timeout --signal=TERM --kill-after=15s "${DRIFT_SCAN_TIMEOUT:-240}s" \
          drift-static-profiler scan-pr . \
            --changed-files "$CHANGED_PATH" \
            --diff-stats    "$STATS_PATH" \
            --commits       "$COMMITS_PATH" \
            --base-sha      "$BASE_SHA" \
            --pr-title="$PR_TITLE" \
            --pr-body="$PR_BODY" \
            "${rss_guard[@]}" \
            --pretty \
            --output "$DRIFT_REPORT_PATH"
        scan_rc=$?
        set -e
        echo "scan_rc=${scan_rc}" >> "$GITHUB_OUTPUT"
        # Name the failure mode in the log instead of leaving a bare cancel.
        case "$scan_rc" in
          0)   echo "✅ scan-pr completed (rc=0)";;
          124) echo "::warning::scan-pr hit the ${DRIFT_SCAN_TIMEOUT:-240}s wall-clock timeout (rc=124). Serving whatever report exists; the PR is NOT failed. Tighten --max-affected / --max-nodes-per-tree if this recurs.";;
          137) echo "::warning::scan-pr was SIGKILLed (rc=137) — almost always OOM. The --max-rss-mb backstop should pre-empt this; if you still see it, lower DRIFT_MAX_RSS_MB / the node budgets, or use a larger runner. The PR is NOT failed.";;
          139) echo "::warning::scan-pr segfaulted (rc=139). The PR is NOT failed.";;
          *)   echo "::warning::scan-pr exited rc=${scan_rc} — see the scanner log above. The PR is NOT failed.";;
        esac

    # ─── 7b. Cap code_suggestions in the scan report ────────────────
    # The scanner emits suggestions UNCAPPED — a single PR can produce
    # 500+ entries on a large refactor. The sticky PR comment renderer
    # has a 60 KB body budget (GitHub's hard cap is 65 536 bytes); past
    # that, guardSize collapses <details> blocks and finally hard-cuts
    # with "…report truncated" — losing information silently. The
    # deterministic inline review would also try to anchor 500 inline
    # comments. So we cap the report's code_suggestions array right
    # here, BEFORE any consumer reads it. The scanner's ordering
    # (severity_rank DESC, confidence DESC) is already canonical
    # priority order — taking the first N preserves the most
    # important findings. Fail-soft: if jq is missing or the report
    # isn't valid JSON, leave the file untouched and let downstream
    # steps handle it (the size guard is still a safety net).
    - name: Cap code suggestions
      continue-on-error: true
      id: cap-suggestions
      if: steps.scan.outputs.scan_ran == 'true'
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        MAX_CODE_SUGGESTIONS: ${{ (steps.args.outputs.max-code-suggestions || inputs.max-code-suggestions) }}
      run: |
        if [ ! -s "$DRIFT_REPORT_PATH" ]; then
          echo "⏭️  no report at $DRIFT_REPORT_PATH — nothing to cap"
          exit 0
        fi
        if ! command -v jq >/dev/null 2>&1; then
          echo "⚠️  jq unavailable — leaving report uncapped (size guard is the final fallback)"
          exit 0
        fi
        # Coerce to a positive integer; on garbage fall back to 10.
        case "${MAX_CODE_SUGGESTIONS}" in
          ''|*[!0-9]*) max=10 ;;
          0)           max=10 ;;
          *)           max="${MAX_CODE_SUGGESTIONS}" ;;
        esac
        before="$(jq -r '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
        if ! [ "$before" -gt "$max" ] 2>/dev/null; then
          echo "✅ ${before} suggestion(s) — already ≤ cap (${max}); no change"
          echo "before=${before}" >> "$GITHUB_OUTPUT"
          echo "after=${before}"  >> "$GITHUB_OUTPUT"
          exit 0
        fi
        tmp="$(mktemp)"
        if jq --argjson max "$max" \
             '.pr_review.code_suggestions = ((.pr_review.code_suggestions // [])[0:$max])' \
             "$DRIFT_REPORT_PATH" > "$tmp" 2>/dev/null && [ -s "$tmp" ]; then
          mv "$tmp" "$DRIFT_REPORT_PATH"
          after="$(jq -r '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
          echo "✂️  capped ${before} → ${after} suggestion(s) (max=${max}); kept the highest-priority entries (scanner order)"
          echo "before=${before}" >> "$GITHUB_OUTPUT"
          echo "after=${after}"   >> "$GITHUB_OUTPUT"
        else
          rm -f "$tmp"
          echo "⚠️  jq edit failed — leaving report uncapped"
        fi

    # ─── 8. Print scan summary (+ full debug dump when debug=true) ───
    - name: Print scan summary
      continue-on-error: true   # advisory: never fail the PR on our own error
      if: steps.scan.outputs.scan_ran == 'true'
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DEBUG:             ${{ (steps.args.outputs.debug || inputs.debug) }}
      run: |
        if [ ! -s "$DRIFT_REPORT_PATH" ]; then
          echo "⚠️  no report at $DRIFT_REPORT_PATH"
          exit 0
        fi
        size=$(wc -c < "$DRIFT_REPORT_PATH" | tr -d ' ')
        echo "📊 Scan complete — ${size} bytes at $DRIFT_REPORT_PATH"
        sugg=0
        if command -v jq >/dev/null 2>&1; then
          # Defensive: `// []` handles a missing pr_review/code_suggestions;
          # `2>/dev/null || echo 0` keeps the summary alive on malformed JSON.
          sugg=$(jq -r '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)
          echo "  schema:      $(jq -r '.schema_version // "?"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  mode:        $(jq -r '.mode // "?"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  tool:        $(jq -r '"\(.generator.tool // "?") v\(.generator.version // "?")"' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '?')"
          echo "  changed:     $(jq -r '(.pr_scope.changed_files // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0) file(s)"
          echo "  roots:       $(jq -r '(.pr_scope.affected_roots // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
          echo "  unreachable: $(jq -r '(.pr_scope.unreachable_changes // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
          echo "  pr_review?:  $(jq -r 'has("pr_review")' "$DRIFT_REPORT_PATH" 2>/dev/null || echo false)"
          echo "  suggestions: ${sugg}"
        else
          echo "  (jq not on PATH; install with apt/brew to see the summary)"
        fi

        # ── Debug dump (only when the `debug` input is true) ───────────
        # Surfaces the ENTIRE scan JSON, its byte size, and the
        # code_suggestions array (only when non-empty) so you can see
        # exactly what the scanner produced and why the AI step did or
        # didn't have focal points to enrich. All blocks are defensive:
        # they never fail the step on missing keys or malformed JSON.
        if [ "${DEBUG:-false}" = "true" ]; then
          echo "::group::🐛 debug — full scan report (${size} bytes)"
          if command -v jq >/dev/null 2>&1 && jq -e . "$DRIFT_REPORT_PATH" >/dev/null 2>&1; then
            jq '.' "$DRIFT_REPORT_PATH"
          else
            echo "(jq unavailable or report not valid JSON — raw dump follows)"
            cat "$DRIFT_REPORT_PATH"
          fi
          echo "::endgroup::"

          if command -v jq >/dev/null 2>&1; then
            if [ "${sugg:-0}" -gt 0 ] 2>/dev/null; then
              echo "::group::🐛 debug — ${sugg} code_suggestion(s)"
              jq '.pr_review.code_suggestions' "$DRIFT_REPORT_PATH" 2>/dev/null || echo '(failed to extract code_suggestions)'
              echo "::endgroup::"
            else
              echo "🐛 debug — code_suggestions is EMPTY → AI step will run in diff-fallback (no focal points)."
            fi
          fi
        fi

    # ─── 8a. Prep AI diff (fetch both PR SHAs) ───────────────────────
    # Shared by the two GitHub Models consumers: the spoken-briefing call
    # (audio summary, step 8d-pre) and the per-suggestion loop (step 12).
    # Both run `git diff` over the PR, so they need BOTH commit endpoints
    # present. actions/checkout with fetch-depth: 0 already has them; these
    # are a best-effort top-up for shallow consumer clones.
    - name: Prep AI diff
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: ai-prep
      if: >-
        ((steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' || (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true') &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        AI_BASE_SHA: ${{ steps.pr-ctx.outputs.base_sha }}
        AI_HEAD_SHA: ${{ steps.pr-ctx.outputs.head_sha }}
      run: |
        git fetch --no-tags --depth=1 origin "$AI_BASE_SHA" 2>/dev/null || true
        git fetch --no-tags --depth=1 origin "$AI_HEAD_SHA" 2>/dev/null || true

    # ─── 8a. Resolve endpoint + PREFLIGHT GitHub Models access ───────
    # Resolved ONCE here and shared by BOTH Models consumers (the audio
    # briefing below + the per-suggestion loop in step 12). It runs BEFORE
    # the audio block on purpose: the briefing script must be ready before
    # synthesis, and synthesis must finish before the sticky comment
    # (step 9) links the audio. Resolves the right inference endpoint (org
    # repos need …/orgs/<org>/inference), then does a real POST to capture
    # the status + BODY that actions/ai-inference swallows ("403 no body").
    # The body is the only reliable way to distinguish the failure modes —
    # so we surface it and decode it here, BEFORE the opaque inference step
    # runs. See docs.github.com/en/rest/models/inference.
    - name: Resolve Models endpoint + preflight
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: ai-ep
      if: >-
        ((steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' || (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true') &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        AI_ENDPOINT_INPUT: ${{ inputs.ai-endpoint }}
        OWNER:             ${{ github.repository_owner }}
        OWNER_TYPE:        ${{ github.event.repository.owner.type }}
        AI_MODEL:          ${{ (steps.args.outputs.ai-model || inputs.ai-model) }}
        GITHUB_TOKEN:      ${{ inputs.github-token }}
      run: |
        if [ -n "${AI_ENDPOINT_INPUT}" ] && [ "${AI_ENDPOINT_INPUT}" != "auto" ]; then
          resolved="${AI_ENDPOINT_INPUT}"
          echo "🔌 Using pinned endpoint."
        elif [ "${OWNER_TYPE}" = "Organization" ]; then
          resolved="https://models.github.ai/orgs/${OWNER}/inference"
          echo "🔌 Org-owned repo (${OWNER}) → org-scoped endpoint."
        else
          resolved="https://models.github.ai/inference"
          echo "🔌 User-owned repo → user-scoped endpoint."
        fi
        echo "endpoint=${resolved}" >> "$GITHUB_OUTPUT"
        echo "🔌 Resolved Models endpoint: ${resolved}"

        # ── Preflight: hit the REAL chat/completions path so we see the
        #    body that the inference action hides. 1-token probe. ──────
        # gpt-5 / o-series are reasoning models: they REQUIRE
        # max_completion_tokens and reject max_tokens, so pick the field
        # that matches the model — otherwise the probe itself 400s on a
        # param error and we'd misread it as "model unavailable".
        case "${AI_MODEL}" in
          *gpt-5*|*o1*|*o2*|*o3*|*o4*) tok='"max_completion_tokens":16' ;;
          *)                            tok='"max_tokens":1' ;;
        esac
        body="$(mktemp)"
        status="$(curl -s -o "$body" -w '%{http_code}' \
          -X POST "${resolved}/chat/completions" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "{\"model\":\"${AI_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],${tok}}" \
          2>/dev/null || echo "000")"
        snippet="$(tr -d '\n' < "$body" | head -c 400)"
        echo "🔎 preflight POST ${resolved}/chat/completions → HTTP ${status}"
        [ -n "${snippet}" ] && echo "🔎 preflight body: ${snippet}"
        echo "preflight_status=${status}" >> "$GITHUB_OUTPUT"

        # ── Decode the result so the log says exactly what to fix ─────
        case "${status}" in
          200)
            echo "✅ GitHub Models reachable — inference should succeed." ;;
          401|403)
            if echo "${snippet}" | grep -qiE 'model|not enabled|not allowed'; then
              echo "❌ Token HAS models access but the model/org policy blocks it."
              echo "   → Org owner: Settings → Copilot → Policies → Models → enable + allow ${AI_MODEL}."
            else
              echo "❌ ${status} with no model-level message → the GITHUB_TOKEN is MISSING the 'models: read' scope."
              echo "   → Add 'models: read' to the CONSUMER workflow's permissions: block."
              echo "     (It is NEVER granted by default — even when pull-requests/checks write are.)"
            fi ;;
          404)
            echo "❌ 404 — endpoint or model id not found. Check ai-model / ai-endpoint." ;;
          000)
            echo "⚠️  preflight curl failed to connect (network) — inference may still try." ;;
          *)
            echo "⚠️  Unexpected preflight status ${status}." ;;
        esac
        rm -f "$body"

    # ─── 8b. Audio summary — cache + install Piper binary ────────────
    # Offline neural TTS. We cache the binary (keyed by version + arch) so
    # only the first run on a given key pays the download. Installed under
    # RUNNER_TEMP (never the consumer's workspace) like the profiler.
    - name: Cache Piper binary
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: piper-bin-cache
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/piper
        key: piper-${{ runner.arch }}-${{ inputs.piper-version }}-v1

    - name: Install Piper binary
      continue-on-error: true   # advisory: never fail the PR on our own error
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != '' &&
        steps.piper-bin-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        PIPER_VERSION: ${{ inputs.piper-version }}
        PIPER_PARENT:  ${{ runner.temp }}
      run: |
        # rhasspy/piper ships exactly two Linux arch tarballs, each expanding
        # to a top-level `piper/` dir (binary + bundled libs + espeak-ng-data).
        # We extract into RUNNER_TEMP → ${RUNNER_TEMP}/piper/piper.
        #
        # PRIMARY: the canonical 2023.11.14-2 release uses the
        #   piper_linux_<x86_64|aarch64>.tar.gz naming.
        # FALLBACK: the older v1.2.0 release uses piper_<amd64|arm64>.tar.gz.
        # Both layouts are identical, so the fallback is drop-in. If both
        # fail the synth step detects the missing binary and skips (fail-soft).
        case "${RUNNER_ARCH}" in
          ARM64) new=aarch64 ; old=arm64 ;;
          *)     new=x86_64  ; old=amd64 ;;   # X64 (GitHub-hosted) + default
        esac
        primary="https://github.com/rhasspy/piper/releases/download/${PIPER_VERSION}/piper_linux_${new}.tar.gz"
        fallback="https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_${old}.tar.gz"
        installed=false
        for url in "$primary" "$fallback"; do
          echo "⬇️  ${url}"
          if curl -fSL -o /tmp/piper.tar.gz "$url" && tar -xzf /tmp/piper.tar.gz -C "$PIPER_PARENT"; then
            rm -f /tmp/piper.tar.gz
            echo "✅ installed to ${PIPER_PARENT}/piper"
            installed=true
            break
          fi
          echo "   ↳ failed; trying next URL…"
        done
        [ "$installed" = "true" ] || \
          echo "⚠️  Piper download failed (primary + fallback) — audio summary will be skipped (fail-soft)."

    # ─── 8c. Audio summary — cache + download the voice model ────────
    - name: Cache Piper voice
      continue-on-error: true   # advisory: never fail the PR on our own error
      id: piper-voice-cache
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/piper-voices
        key: piper-voice-${{ (steps.args.outputs.piper-voice || inputs.piper-voice) }}-v1

    - name: Download Piper voice
      continue-on-error: true   # advisory: never fail the PR on our own error
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != '' &&
        steps.piper-voice-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        PIPER_VOICE: ${{ (steps.args.outputs.piper-voice || inputs.piper-voice) }}
        VOICE_DIR:   ${{ runner.temp }}/piper-voices
      run: |
        # Derive the HF path from the voice id `<lang>-<name>-<quality>`:
        #   en_US-ryan-medium → top=en lang=en_US name=ryan quality=medium
        lang="${PIPER_VOICE%%-*}"          # en_US
        rest="${PIPER_VOICE#*-}"           # ryan-medium
        name="${rest%%-*}"                 # ryan
        quality="${rest#*-}"               # medium
        top="${lang%%_*}"                  # en
        # HF canonical ref is `main` (the rhasspy/piper-voices README links
        # resolve/main/...). Both main and the v1.0.0 tag serve the same
        # files; main matches the documented download URL.
        base="https://huggingface.co/rhasspy/piper-voices/resolve/main/${top}/${lang}/${name}/${quality}"
        mkdir -p "$VOICE_DIR"
        echo "⬇️  voice ${PIPER_VOICE} ← ${base}"
        curl -fSL -o "${VOICE_DIR}/${PIPER_VOICE}.onnx"      "${base}/${PIPER_VOICE}.onnx?download=true"      || echo "⚠️  voice .onnx download failed"
        curl -fSL -o "${VOICE_DIR}/${PIPER_VOICE}.onnx.json" "${base}/${PIPER_VOICE}.onnx.json?download=true" || echo "⚠️  voice config download failed"

    # ─── 8d-pre. Generate the spoken-briefing SCRIPT (GitHub Models) ─
    # One inline model call (curl) over the PR title / description / commits /
    # business-logic graph → a < 300-word, read-aloud handover script, to BRIEFING_PATH
    # for the synth step below to feed to Piper. No bundle / no TypeScript: jq
    # builds the request body (handling ALL JSON escaping) and parses the
    # reply. Gated on a GREEN preflight (ai-ep); continue-on-error + writing
    # ONLY on a non-empty reply mean any failure just leaves no file, and synth
    # falls back to the scanner's deterministic summary. The Mermaid graph and
    # commit list are byte-capped so the request stays under the GitHub Models
    # input cap (~8000 tokens). Reuses the resolved ai-ep endpoint + the ai-model.
    - name: Generate spoken PR briefing (AI)
      id: briefing
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        steps.ai-ep.outputs.preflight_status == '200' &&
        steps.pr-ctx.outputs.head_sha != ''
      continue-on-error: true
      shell: bash
      env:
        BRIEFING_PATH: ${{ runner.temp }}/drift-pr-briefing.txt
        COMMITS_PATH:  ${{ steps.diff.outputs.commits_path }}
        AI_ENDPOINT:   ${{ steps.ai-ep.outputs.endpoint }}
        AI_MODEL:      ${{ (steps.args.outputs.ai-model || inputs.ai-model) }}
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        PR_TITLE:      ${{ steps.pr-ctx.outputs.pr_title }}
        PR_BODY:       ${{ steps.pr-ctx.outputs.pr_body }}
        GITHUB_TOKEN:  ${{ inputs.github-token }}
      run: |
        command -v jq >/dev/null 2>&1 || { echo "⚠️  jq unavailable — skipping AI briefing (audio falls back)."; exit 0; }

        # PR context for the model = the scanner's business-logic call-graph
        # (Mermaid) from the scan report, NOT a raw diff: a compact, semantically
        # rich view of what the PR's code actually does. Byte-capped for safety
        # (it's normally small) so the request stays under the Models input cap.
        mermaid="$(jq -r '.pr_review.business_logic.mermaid // ""' "$DRIFT_REPORT_PATH" 2>/dev/null | head -c 8000 || true)"
        # Commit bodies the diff step wrote NUL-separated → a newline list.
        commits="$(tr '\0' '\n' < "$COMMITS_PATH" 2>/dev/null | head -c 3000 || true)"

        # Instruction half of the prompt (static). cat-heredoc into a var
        # avoids the non-zero exit `read -d ''` returns at EOF.
        sys="$(cat <<'PROMPT'
        You are an expert tech lead and an automated Pull Request handover assistant. Your goal is to review the raw data of a Pull Request and generate a concise, conversational briefing script.
        This script is meant to be read aloud to another engineer who is completely unfamiliar with the work. The entire briefing must take under 2 minutes to speak (maximum 250-300 words).
        Generate a clear, spoken-style briefing that covers the following four areas, using conversational transitions between the points rather than rigid bullet points:
        1. The Story (the "what" and "why"): the core purpose of this PR — the problem it solves or the feature it adds. Strip away deep technical jargon and focus on the business or architectural value.
        2. Main Code Locations: the 2 or 3 most important files or modules that changed, and what logic was added or modified there. Ignore minor config tweaks or boilerplate.
        3. Risks & Edge Cases: the biggest potential point of failure based on the change — a performance concern, a potential false positive, or an edge case to watch in production.
        4. Future Work: based on the code (TODO comments, hardcoded temporary values, obvious next steps), what should be tackled next sprint.
        Constraints:
        - Do not greet the user or include introductory or concluding AI fluff.
        - Write in the first-person plural ("we") or third-person ("the PR"), professional yet casual.
        - Keep the language natural and easy to read aloud. Avoid raw code snippets, long variable names, and exact line numbers.
        - Do not exceed 300 words.
        - Output ONLY the briefing script as plain spoken prose — no markdown, headings, bullet points, or code fences. It is sent verbatim to a text-to-speech engine.
        PROMPT
        )"

        # Data half — the PR context: title, description, commits, and the
        # scanner's business-logic diagram (Mermaid) in place of a raw diff.
        user="$(printf 'Analyze the following Pull Request data:\n- Title: %s\n- Description: %s\n- Commits:\n%s\n- Business-logic diagram (Mermaid, from a static scan of the changed call-graph):\n%s\n' \
          "${PR_TITLE:-(none provided)}" "${PR_BODY:-(none provided)}" "${commits:-(none provided)}" "${mermaid:-(none provided)}")"

        # Reasoning models (gpt-5 / o-series) require max_completion_tokens and
        # reject max_tokens; classic chat models (gpt-4.1 / gpt-4o) use max_tokens.
        case "${AI_MODEL}" in
          *gpt-5*|*o1*|*o2*|*o3*|*o4*) tokfield='max_completion_tokens' ;;
          *)                            tokfield='max_tokens' ;;
        esac

        # jq builds the request body (handles ALL JSON escaping) so no raw PR
        # text is string-stuffed into JSON; it also parses the reply below.
        req="$(jq -n --arg model "$AI_MODEL" --arg sys "$sys" --arg user "$user" \
          --arg tokfield "$tokfield" --argjson toks 2000 \
          '{model: $model, messages: [{role: "system", content: $sys}, {role: "user", content: $user}], ($tokfield): $toks}')"

        resp="$(curl -s -X POST "${AI_ENDPOINT}/chat/completions" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "$req" 2>/dev/null || true)"

        script="$(printf '%s' "$resp" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)"
        if [ -n "$script" ]; then
          printf '%s' "$script" > "$BRIEFING_PATH"
          echo "🧠 AI briefing: wrote $(wc -c < "$BRIEFING_PATH" | tr -d ' ') chars → $BRIEFING_PATH"
        else
          echo "⚠️  AI briefing: empty or failed reply — audio falls back to the scanner summary."
          echo "    reply head: $(printf '%s' "$resp" | tr -d '\n' | head -c 200)"
        fi

    # ─── 8d. Synthesize the WAV from the spoken-briefing script ──────
    # Continue-on-error: a TTS failure must never break the deterministic
    # review. Text source priority: (1) the AI briefing at BRIEFING_PATH,
    # (2) the scanner's business_logic.summary, (3) the PR title.
    - name: Synthesize audio summary
      id: audio
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      continue-on-error: true
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        BRIEFING_PATH: ${{ runner.temp }}/drift-pr-briefing.txt
        PIPER_DIR:   ${{ runner.temp }}/piper
        VOICE_DIR:   ${{ runner.temp }}/piper-voices
        PIPER_VOICE: ${{ (steps.args.outputs.piper-voice || inputs.piper-voice) }}
        WAV_DIR:     ${{ runner.temp }}
        REPO_NAME:   ${{ github.event.repository.name }}
        PR_BRANCH:   ${{ steps.pr-ctx.outputs.head_ref }}
        PR_TITLE:    ${{ steps.pr-ctx.outputs.pr_title }}
      run: |
        # Artifact filename = "{repo}-{branch}.wav". upload-artifact@v7 with
        # archive:false promotes the FILE BASENAME to the artifact NAME
        # (action.yml: "The name of the file will be used as the artifact
        # name (ignoring the `name` parameter)"), and artifact names are
        # validated against a forbidden charset that includes ':', '/', '\',
        # '*', '?', '<', '>', '|', '"' (see actions/toolkit
        # path-and-artifact-name-validation). So we MUST avoid ':' in the
        # basename — using it would 422 the upload, the step would
        # continue-on-error swallow it, and the sticky comment would
        # silently lose the 🔊 Listen footer. A plain '-' is in the
        # allowed set, URL-safe, and CLI-friendly when downloaded.
        # Branches can contain '/' (feature/foo) which would also create
        # a subdir under RUNNER_TEMP; strip them, and replace anything
        # outside [A-Za-z0-9._-] with '_' so the filename stays portable.
        # GitHub repo names are already restricted to that charset, so
        # REPO_NAME is used verbatim.
        #
        # The sanitised branch is capped at 120 bytes so the final basename
        # (REPO_NAME[≤100] + '-' + branch + '.wav') stays under the 255-byte
        # ext4/NAME_MAX ceiling even for pathological branch names (GitHub
        # allows refs up to ~244 chars). branch_safe is pure ASCII after
        # the tr, so bytes == chars and `head -c` can never split a
        # multi-byte sequence.
        branch_safe="$(printf '%s' "${PR_BRANCH:-pr}" | tr '/' '-' | LC_ALL=C tr -c 'A-Za-z0-9._-' '_' | head -c 120)"
        WAV_PATH="${WAV_DIR}/${REPO_NAME}-${branch_safe}.wav"
        bin="${PIPER_DIR}/piper"
        model="${VOICE_DIR}/${PIPER_VOICE}.onnx"
        if [ ! -x "$bin" ] || [ ! -f "$model" ]; then
          echo "⚠️  Piper binary or voice model missing — skipping audio summary."
          echo "synthesized=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Text source, in priority order:
        #   1. The AI handover briefing (BRIEFING_PATH) — a self-contained,
        #      spoken-style script. Used VERBATIM: the prompt already forbids
        #      intros/outros, so no "Drift pull request summary." lead-in.
        #   2. The scanner's deterministic business_logic.summary.
        #   3. The PR title.
        # (2)/(3) keep the lead-in so a bare summary still sounds framed.
        if [ -s "$BRIEFING_PATH" ]; then
          text="$(cat "$BRIEFING_PATH")"
          echo "🧠 using AI handover briefing ($(wc -c < "$BRIEFING_PATH" | tr -d ' ') chars)"
        else
          summary="$(jq -r '.pr_review.business_logic.summary // ""' "$DRIFT_REPORT_PATH" 2>/dev/null || echo "")"
          if [ -z "$summary" ]; then
            summary="${PR_TITLE:-This pull request}. See the Drift review for details."
          fi
          text="Drift pull request summary. ${summary}"
          echo "📄 using deterministic scanner summary (no AI briefing present)"
        fi
        # ── Sanitize for TTS ───────────────────────────────────────────
        # Piper synthesises raw text; non-prose symbols (arrows, em-dashes,
        # emoji, smart quotes, code fragments, brackets) produce awkward
        # verbalisations or silence. Strip the input to a spoken-prose
        # alphabet: ASCII letters, digits, spaces, periods (sentence
        # boundaries + numerals like 3.14 + abbreviations like Mr.), and
        # newlines. Everything else becomes a space so word boundaries
        # survive ("foo-bar" → "foo bar"), then runs of spaces collapse.
        # LC_ALL=C makes `tr` byte-oriented: each byte of a multi-byte
        # UTF-8 character (em-dash, arrow, emoji, smart quote) decomposes
        # to a space and they squash down to one — the desired result for
        # an en_US voice. Note: this also strips ASCII apostrophes by
        # design ("don't" → "don t") to honour the strict spec; flip the
        # tr keep-set to add `'` back if contraction prosody matters.
        sanitized="$(printf '%s' "$text" \
          | LC_ALL=C tr -c 'A-Za-z0-9. \n' ' ' \
          | LC_ALL=C tr -s ' .' \
          | LC_ALL=C sed -e 's/^ //' -e 's/ $//')"
        before=$(printf '%s' "$text"      | wc -c | tr -d ' ')
        after=$(printf '%s'  "$sanitized" | wc -c | tr -d ' ')
        echo "🧹 TTS sanitize: ${before} → ${after} chars"
        # Empty after sanitisation (all symbols / blank) → fall back to the
        # PR title so Piper never receives an empty stdin. The fallback is
        # itself sanitised so a symbol-only title can't sneak through.
        if [ -z "$sanitized" ]; then
          sanitized="$(printf '%s' "${PR_TITLE:-This pull request}" \
            | LC_ALL=C tr -c 'A-Za-z0-9. \n' ' ' \
            | LC_ALL=C tr -s ' .' \
            | LC_ALL=C sed -e 's/^ //' -e 's/ $//')"
          [ -z "$sanitized" ] && sanitized="See the Drift review for details."
          echo "⚠️  sanitised text was empty; using PR title fallback (${sanitized})"
          # Refresh `after` — it was 0 (from the empty primary sanitize)
          # but the fallback replaced $sanitized, so without this the
          # preview line below would mis-report "0 chars" and the
          # ellipsis-vs-no-ellipsis decision would use the wrong length.
          after=$(printf '%s' "$sanitized" | wc -c | tr -d ' ')
        fi
        text="$sanitized"
        # ── Log the exact text Piper will speak ────────────────────────
        # Diagnostic for "the audio sounded wrong" — without this you'd
        # have to re-run with debug to see what was fed to TTS. We log
        # POST-sanitisation only, because the PRE-sanitised string could
        # contain GitHub Actions log-command sequences (`::error::`,
        # `::add-mask::`, `::set-output::`) which the runner interprets
        # when they appear at the start of a line — a log-injection vector
        # from PR titles / commit bodies / AI prompt-injection. The
        # sanitiser strips ':' so post-sanitisation '::' becomes '  ' and
        # every injection pattern is broken. A 120-char single-line
        # preview surfaces in the collapsed log; the full text sits in a
        # ::group:: so long briefings don't dominate the step view.
        preview="$(printf '%s' "$text" | tr '\n' ' ' | LC_ALL=C tr -s ' ' | head -c 120)"
        [ "${after}" -gt 120 ] && preview="${preview}..."
        echo "🎙️  Piper input (${after} chars): ${preview}"
        echo "::group::🎙️  Piper input — full text"
        printf '%s\n' "$text"
        echo "::endgroup::"
        echo "🗣️  synthesizing ${after} chars → ${WAV_PATH}"
        # Run from the Piper dir so it resolves its bundled espeak-ng-data
        # + shared libs ($ORIGIN rpath). Model + output use absolute paths.
        if ( cd "$PIPER_DIR" && printf '%s' "$text" | ./piper --model "$model" --output_file "$WAV_PATH" ) 2>/tmp/piper-synth.log; then
          echo "✅ wrote $(wc -c < "$WAV_PATH" | tr -d ' ') bytes"
          echo "synthesized=true" >> "$GITHUB_OUTPUT"
          echo "wav_path=${WAV_PATH}" >> "$GITHUB_OUTPUT"
        else
          echo "⚠️  Piper synthesis failed (audio summary skipped):"
          sed 's/^/    /' /tmp/piper-synth.log 2>/dev/null || true
          echo "synthesized=false" >> "$GITHUB_OUTPUT"
        fi

    # ─── 8e. Upload the WAV as a NON-ZIPPED artifact (host for the link) ─
    # actions/upload-artifact USED to always zip — an artifact link downloaded
    # a .zip, not the playable WAV. Since the v7 `archive: false` option (GA
    # 2026-02-26) a single-file upload is served RAW at the artifact URL: the
    # link is the bare .wav (browsers that handle audio/wav play it in-tab;
    # others download just the .wav — no unzip). With archive:false the `name`
    # input is ignored and the artifact takes the file's own name
    # ("{repo}-{branch}.wav", built in step 8d — see that step for why ':'
    # in the basename would have 422-d the upload). Needs no extra
    # permissions. Fail-soft.
    # See https://github.blog/changelog/2026-02-26-github-actions-now-supports-uploading-and-downloading-non-zipped-artifacts/
    - name: Upload audio summary artifact
      id: audio-upload
      if: >-
        (steps.args.outputs.audio-summary || inputs.audio-summary) == 'true' &&
        steps.audio.outputs.synthesized == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      continue-on-error: true
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.audio.outputs.wav_path }}
        archive: false          # serve the raw .wav at the artifact URL (no zip)
        retention-days: 14
        # Required for workflow RE-RUNS. The artifact namespace is shared
        # across attempts of the same workflow run, and v7 defaults
        # `overwrite: false` → a re-run would 409 on the duplicate name,
        # continue-on-error would swallow it, and the sticky comment
        # would lose the 🔊 Listen footer silently. Different PRs / new
        # pushes are already isolated by run-id, so this only affects
        # the literal "Re-run jobs" button case.
        overwrite: true

    # ─── 9. Post sticky PR comment + check run (+ inline review when AI off) ─
    # Runs the compiled bundle at dist/index.js. The bundle reads the
    # JSON report at DRIFT_REPORT_PATH and uses GITHUB_TOKEN to:
    #   - upsert a sticky overview comment (idempotent via marker)
    #   - create a check run summarising the report
    #   - post inline review comments for code suggestions above the
    #     quality bar (confidence ≥ 0.75, category A/B/C, has ref link)
    # When ai-suggestions is enabled, the inline-review surface is HANDED
    # OFF to the combined poster (step 12: dist/ai-suggest.js) so the PR
    # conversation shows ONE review thread with both deterministic and AI
    # suggestions, not two. DRIFT_DEFER_INLINE_REVIEW=true tells main.ts
    # to skip its own postReview in that case; the sticky comment and
    # check run still ship from this step.
    # Skips when there's no PR context (push events, manual dispatch).
    - name: Post Drift PR review
      continue-on-error: true   # advisory: never fail the PR on our own error
      if: steps.scan.outputs.scan_ran == 'true' && steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        DRIFT_REPORT_PATH: ${{ runner.temp }}/drift-report.json
        DRIFT_COMMENT:     'true'
        DRIFT_OPEN_ISSUE:  ${{ (steps.args.outputs.open-issue || inputs.open-issue) }}
        DRIFT_FAIL_THRESHOLD: ${{ (steps.args.outputs.fail-threshold || inputs.fail-threshold) }}
        # Defer the inline review to step 12 (combined poster) when AI is on,
        # so reviewers see one review thread instead of two. When AI is off
        # we leave this empty and main.ts posts the deterministic inline
        # review here as before.
        DRIFT_DEFER_INLINE_REVIEW: ${{ (steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' && 'true' || '' }}
        # Artifact URL of the non-zipped WAV (empty when audio is disabled or
        # synthesis failed → dist/index.js omits the "🔊 Listen" footer). With
        # archive:false this URL serves the raw .wav, not a zip.
        DRIFT_AUDIO_URL:   ${{ steps.audio-upload.outputs.artifact-url }}
        GITHUB_TOKEN:      ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/dist/index.js"

    # ─── 12. AI inference LOOP — one model call per scanner finding ──
    # A composite action CANNOT loop a `uses:` step, so we replace
    # actions/ai-inference@v1 with our own bash `for` loop that POSTs one
    # request per focal point (≤ ai-max-suggestions). Each call sees a
    # single finding + that file's numbered diff, BUDGETED to the GitHub
    # Models input cap: dist/ai-infer-one.js counts tokens BEFORE the POST
    # (gpt-tokenizer, o200k_base) and shrinks the diff to the hunk around
    # the focal line until system+user fit under AI_MAX_INPUT_TOKENS.
    # Without that budget one large or newly-added file's full diff blows
    # the 8000-token cap → HTTP 413 ("Request body too large") and ZERO
    # suggestions — exactly the failure this replaced. The call uses
    # max_completion_tokens for gpt-5, max_tokens for gpt-4o, parses the
    # reply, and APPENDS the passing suggestion to AI_OUT. Only runs on a
    # green preflight; continue-on-error keeps the rest of the action green
    # on any residual failure.
    - name: AI inference (per-suggestion loop)
      id: ai-loop
      if: >-
        (steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        steps.ai-ep.outputs.preflight_status == '200' &&
        steps.pr-ctx.outputs.head_sha != ''
      continue-on-error: true
      shell: bash
      env:
        AI_OUT:               ${{ runner.temp }}/ai-suggestions.json
        DRIFT_REPORT_PATH:    ${{ runner.temp }}/drift-report.json
        AI_ENDPOINT:          ${{ steps.ai-ep.outputs.endpoint }}
        AI_MODEL:             ${{ (steps.args.outputs.ai-model || inputs.ai-model) }}
        AI_MAX:               ${{ (steps.args.outputs.ai-max-suggestions || inputs.ai-max-suggestions) }}
        # Per-call INPUT budget (system + user, in tokens). The diff for the
        # focal file is trimmed to fit under this BEFORE the POST, so a large
        # or newly-added file can't 413 the request. Set below the 8000-token
        # Free/low-tier cap to leave headroom for the chat envelope the server
        # also counts. Raise on a higher tier (Enterprise High input = 16000).
        AI_MAX_INPUT_TOKENS:  '7000'
        # Per-call OUTPUT budget. Reasoning models (gpt-5) also spend
        # hidden reasoning tokens out of this, so keep it generous — one
        # suggestion's visible JSON is small. Lower it only if a classic
        # model (gpt-4o) rejects it against a smaller output cap.
        AI_MAX_OUTPUT_TOKENS: '8000'
        AI_BASE_SHA:          ${{ steps.pr-ctx.outputs.base_sha }}
        AI_HEAD_SHA:          ${{ steps.pr-ctx.outputs.head_sha }}
        GITHUB_TOKEN:         ${{ inputs.github-token }}
      run: |
        # Fresh envelope; each iteration appends one suggestion (if any).
        echo '{"suggestions":[]}' > "$AI_OUT"
        total="$(jq '(.pr_review.code_suggestions // []) | length' "$DRIFT_REPORT_PATH" 2>/dev/null || echo 0)"
        limit="$total"
        [ "$total" -gt "$AI_MAX" ] 2>/dev/null && limit="$AI_MAX"
        echo "🔁 ${limit} of ${total} scanner finding(s) → one inference call each (model: ${AI_MODEL})"
        i=0
        while [ "$i" -lt "$limit" ]; do
          echo "──── inference $((i + 1))/${limit} ────"
          node "${{ github.action_path }}/dist/ai-infer-one.js" "$i"
          i=$((i + 1))
        done
        n="$(jq '(.suggestions // []) | length' "$AI_OUT" 2>/dev/null || echo 0)"
        echo "✅ loop done — ${n} suggestion(s) cleared the bar → $AI_OUT"

    # ─── 11b. Decode an inference failure into actionable guidance ───
    # The ai-inference action surfaces GitHub Models errors as opaque
    # one-liners (e.g. "403 status code (no body)"). This step maps the
    # common failures to their fix so the log is self-explaining.
    - name: AI inference troubleshooting
      # Fires when the preflight blocked us (inference was skipped) OR
      # when inference itself failed despite a green preflight.
      if: >-
        (steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.ai-prep.outcome == 'success' &&
        steps.pr-ctx.outputs.head_sha != '' &&
        (steps.ai-ep.outputs.preflight_status != '200' || steps.ai-loop.outcome == 'failure')
      shell: bash
      env:
        AI_MODEL:    ${{ (steps.args.outputs.ai-model || inputs.ai-model) }}
        AI_ENDPOINT: ${{ steps.ai-ep.outputs.endpoint }}
        OWNER:       ${{ github.repository_owner }}
        OWNER_TYPE:  ${{ github.event.repository.owner.type }}
      run: |
        echo "::warning title=Drift AI suggestions skipped::GitHub Models inference failed — see decoded checklist in the step log."
        cat <<EOF
        ────────────────────────────────────────────────────────────
        🤖 GitHub Models inference FAILED. Decoded checklist:

          model:    ${AI_MODEL}
          endpoint: ${AI_ENDPOINT}
          owner:    ${OWNER} (type: ${OWNER_TYPE:-unknown})

        A "403 status code (no body)" almost always means ONE of:

          1. Missing permission. The CONSUMER workflow that calls this
             action must grant:
               permissions:
                 models: read          # ← required for GitHub Models
                 pull-requests: write  # post the review
                 checks: write         # scanner check run
                 contents: read        # checkout
             Note: declaring a permissions block sets every UNLISTED
             scope to 'none', so all four must be present.

          2. Org hasn't enabled GitHub Models. An org owner must turn it
             on: Org → Settings → Copilot → Models, and allow the model
             for the relevant teams/users.

          3. Wrong endpoint for an org repo. The built-in GITHUB_TOKEN
             has no personal identity, so org repos MUST use the
             org-scoped endpoint (this step resolved: ${AI_ENDPOINT}).
             If that still 403s, the org likely hasn't enabled Models.

        A "400 Unavailable model: ${AI_MODEL}" means the model is not
        served by the inference endpoint yet (gpt-5 commonly is not even
        when it shows "enabled" in the web UI). Switch ai-model to
        openai/gpt-4o, or confirm availability:
          curl -H "Authorization: Bearer \$PAT_WITH_models_read" \\
            ${AI_ENDPOINT}/models
        ────────────────────────────────────────────────────────────
        EOF

    # ─── 12. Post combined inline review (deterministic + AI) ────────
    # Runs the compiled bundle at dist/ai-suggest.js. The bundle reads
    # BOTH the deterministic scan report (DRIFT_REPORT_PATH) AND the AI
    # envelope (AI_SUGGESTIONS_PATH), filters each set against the PR's
    # diff lines, dedupes any path:line collisions (AI wins on overlap),
    # and POSTs ONE pulls.createReview via Octokit — so the PR
    # conversation shows a SINGLE review thread instead of two.
    #
    # Gate: runs whenever the scan produced a report AND we have PR
    # context. NOT gated on ai-loop succeeding — when the AI loop fails
    # (no models permission, model unavailable, …) the envelope is
    # empty/missing and we still post the deterministic review, so the
    # reviewer is never left without inline comments.
    #
    # Fail-soft: a non-fatal error here doesn't break the sticky
    # overview comment or check run from step 9.
    - name: Post combined inline review
      continue-on-error: true   # advisory: never fail the PR on our own error
      # Runs when AI is ENABLED: main.ts has already deferred to us, so we
      # own the inline-review surface. NOT gated on ai-loop succeeding —
      # a failed AI loop just leaves an empty envelope and we post
      # deterministic only. When AI is disabled, main.ts already posted
      # the deterministic review and we'd otherwise create a duplicate.
      if: >-
        (steps.args.outputs.ai-suggestions || inputs.ai-suggestions) == 'true' &&
        steps.scan.outputs.scan_ran == 'true' &&
        steps.pr-ctx.outputs.head_sha != ''
      shell: bash
      env:
        # The deterministic source: the cap step already capped this to
        # max-code-suggestions (default 10) so the worst-case is bounded.
        DRIFT_REPORT_PATH:        ${{ runner.temp }}/drift-report.json
        # The AI envelope: optional. Missing/empty when ai-suggestions is
        # off or the AI loop failed; the bundle then posts deterministic-only.
        AI_SUGGESTIONS_PATH:      ${{ runner.temp }}/ai-suggestions.json
        DRIFT_MAX_AI_SUGGESTIONS: ${{ (steps.args.outputs.ai-max-suggestions || inputs.ai-max-suggestions) }}
        DRIFT_AI_MODEL:           ${{ (steps.args.outputs.ai-model || inputs.ai-model) }}
        GITHUB_TOKEN:             ${{ inputs.github-token }}
      run: node "${{ github.action_path }}/dist/ai-suggest.js"

    # ─── /drift terminal reactions ──────────────────────────────────
    # 👀 from the start stays as the durable receipt. 🚀 or 👎 add the
    # terminal status. Most Drift steps use continue-on-error: true, so
    # `failure()` only fires on early-stage explosions (the bare checkout
    # / head-checkout, the pr-ctx step itself, the parse-comment script,
    # or a hard cancel). In every other case the run ends 🚀 — the
    # sticky PR-overview comment is the authoritative outcome surface.
    - name: React 🚀 on /drift success
      if: steps.comment-gate.outputs.active == 'true' && success()
      continue-on-error: true
      shell: bash
      env:
        GH_OWNER: ${{ github.repository_owner }}
        GH_REPO:  ${{ github.event.repository.name }}
        CID:      ${{ github.event.comment.id }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        curl -sS -X POST \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/comments/${CID}/reactions" \
          -d '{"content":"rocket"}' >/dev/null || true

    - name: React 👎 on /drift failure
      if: steps.comment-gate.outputs.active == 'true' && failure()
      continue-on-error: true
      shell: bash
      env:
        GH_OWNER: ${{ github.repository_owner }}
        GH_REPO:  ${{ github.event.repository.name }}
        CID:      ${{ github.event.comment.id }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        curl -sS -X POST \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/comments/${CID}/reactions" \
          -d '{"content":"-1"}' >/dev/null || true
