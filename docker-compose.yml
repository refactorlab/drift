services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift
      POSTGRES_DB: drift
    ports:
      - "5432:5432"
    volumes:
      - drift-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift -d drift"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - drift-pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  migrations:
    build: ./web-app
    image: drift:latest
    command: bun run src/migrate.ts
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://drift:drift@postgres:5432/drift
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@drift.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-1234}
    depends_on:
      postgres:
        condition: service_healthy

  web-app:
    image: drift:latest
    command: bun run src/index.ts
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - DATABASE_URL=postgres://drift:drift@postgres:5432/drift
      - JWT_SECRET=${JWT_SECRET:-dev-only-insecure-secret-change-me-please-32chars}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  drift-pg-data:
  drift-pgadmin-data:
