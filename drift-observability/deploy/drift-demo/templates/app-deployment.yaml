apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drift-demo.appName" . }}
  labels:
    {{- include "drift-demo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          env:
            - name: DRIFT_CONFIG
              value: /app/trace-config.yaml
          volumeMounts:
            - name: trace
              mountPath: {{ .Values.sharedVolume.mountPath }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      volumes:
        - name: trace
          hostPath:
            path: {{ .Values.sharedVolume.hostPath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drift-demo.appName" . }}
  labels:
    {{- include "drift-demo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: app
