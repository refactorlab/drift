app:
  replicaCount: 1
  image:
    repository: test-python-web-server
    tag: dev
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

observability:
  replicaCount: 1
  image:
    repository: observability-server
    tag: dev
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests: { cpu: 50m,  memory: 64Mi  }
    limits:   { cpu: 200m, memory: 128Mi }

# hostPath on the minikube node that both pods mount at mountPath.
# DirectoryOrCreate ensures the directory is created automatically.
sharedVolume:
  hostPath: /tmp/drift-trace
  mountPath: /trace
