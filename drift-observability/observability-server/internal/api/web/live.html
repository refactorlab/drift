<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>drift — live logs</title>
  <style>
    body { font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0; padding: 0; background: #0d1117; color: #e6edf3; }
    header { padding: 10px 14px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    header a { color: #58a6ff; text-decoration: none; font-size: 12px; }
    #status { font-size: 11px; color: #8b949e; }
    main { padding: 8px 14px; }
    .ev { padding: 4px 8px; margin-bottom: 4px; border-left: 3px solid #30363d; border-radius: 2px; background: #0d1117; }
    .ev.start { border-color: #58a6ff; }
    .ev.end-ok { border-color: #3fb950; }
    .ev.end-error { border-color: #f85149; }
    .meta { color: #8b949e; }
    .method { color: #d2a8ff; }
    .caller { color: #7ee787; }
    .json { color: #a5d6ff; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <header>
    <h1>drift — live logs</h1>
    <span id="status">connecting…</span>
    <a href="/docs/">API docs</a>
    <a href="/events">snapshot</a>
  </header>
  <main id="log"></main>

  <script>
    const $log = document.getElementById('log');
    const $status = document.getElementById('status');
    const MAX = 500;

    const es = new EventSource('/live_logs');
    es.onopen = () => $status.textContent = 'streaming';
    es.onerror = () => $status.textContent = 'disconnected (retrying)';
    es.onmessage = (msg) => {
      let ev;
      try { ev = JSON.parse(msg.data); }
      catch { return; }

      let summary;
      const name = ev.qualname ?? ev.method ?? '?';        // tolerate legacy field
      // No `phase` field on the wire — derive: params → start, duration_ms → end.
      const isStart = 'params' in ev;

      const div = document.createElement('div');
      const cls = isStart
        ? 'start'
        : (ev.status === 'error' ? 'end-error' : 'end-ok');
      div.className = 'ev ' + cls;
      const callerStr = ev.file
        ? `${ev.file}:${ev.line ?? '?'}`
        : (ev.caller_file ? `${ev.caller_file}:${ev.caller_line}` : ev.caller);
      const callerSpan = callerStr
        ? `  <span class="caller">${escape(callerStr)}</span>` : '';
      if (isStart) {
        summary = `▶ <span class="method">${escape(name)}</span>${callerSpan}` +
                  `  <span class="meta">${escape(ev.time)}</span>`;
      } else {
        const mark = ev.status === 'error' ? '✗' : '✓';
        summary = `■ <span class="method">${escape(name)}</span>${callerSpan}  ${mark}` +
                  `  <span class="meta">${ev.duration_ms ?? '?'}ms</span>` +
                  `  <span class="meta">${escape(ev.time)}</span>`;
      }
      div.innerHTML = summary + `<div class="json">${escape(JSON.stringify(ev))}</div>`;

      $log.prepend(div);
      while ($log.childElementCount > MAX) $log.removeChild($log.lastChild);
    };

    function escape(s) {
      return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }
  </script>
</body>
</html>
