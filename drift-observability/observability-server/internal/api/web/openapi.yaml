openapi: 3.0.3
info:
  title: drift observability-server
  version: 0.2.0
  description: |
    Tails a shared JSONL file written by **driftdockerprofiler**-instrumented
    services and broadcasts events to `/live_logs` (SSE), snapshotting them
    at `/events` and `/events/all`. No auth — local/dev use only.

    ## Breaking change from 0.1.x

    The event schema changed completely. The previous version emitted one
    event per Python function call (the drift-python trace agent). This
    version emits **stack-sampling** events — one entry per unique call
    stack seen during each profile window:

      - `wall_trace` / `cpu_trace`  (per-trace mode, default)
      - `wall_profile` / `cpu_profile`  (bundle mode, one event per window)

    Old `qualname` / `params` / `duration_ms` / `status` fields are GONE.
    See the `Event` `oneOf` below.

servers:
  - url: /

paths:
  /health:
    get:
      summary: Liveness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /events:
    get:
      summary: Recent history of events (in-memory ring buffer)
      description: |
        Returns up to `HISTORY_CAP` (default 1000) most-recent events
        from the in-memory ring buffer. New events arriving while the
        request is in flight are NOT included.
      responses:
        '200':
          description: JSON array of event objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    post:
      summary: Publish one event (or a small batch)
      description: |
        Accepts events from a drift-instrumented service (the Python
        `driftdockerprofiler.sinks.HttpServerSink` is the reference
        publisher). The body MAY be:

          - a single JSON object: `{"type":"wall_trace", ...}`
          - a JSON array of objects: `[{...},{...},...]`
          - NDJSON: one object per `\n`-terminated line.

        Each accepted event is appended to the on-disk trace file
        (configured by `TRACE_PATH`). The file tailer picks the new
        lines up and broadcasts them to every `/live_logs` and
        `/realtime/v1/websocket` subscriber — there is exactly one
        fanout path regardless of whether the event arrived via POST
        or via a shared-volume file write.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/Event'
                - type: array
                  items: { $ref: '#/components/schemas/Event' }
          application/x-ndjson:
            schema:
              type: string
              description: 'One `Event` (see schema below) per `\n`-terminated line.'
      responses:
        '202':
          description: Accepted. Body reports how many events were stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: integer, example: 1 }
        '400':
          description: Malformed body (not JSON / unsupported shape).
        '500':
          description: Server failed to durably append the event.

  /events/all:
    get:
      summary: Every event from the on-disk trace file
      description: |
        Reads the trace file (configured by `TRACE_PATH`, default
        `/trace/events.log`) end-to-end and returns one JSON array
        containing every event ever written. Unlike `/events`, this
        is not bounded by the in-memory ring buffer. Returns `[]` if
        the file does not yet exist.
      responses:
        '200':
          description: JSON array of every event in the trace file
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

  /events/log:
    get:
      summary: Raw JSONL events file (download)
      description: |
        Streams the on-disk JSONL events file VERBATIM — one event per
        `\n`-terminated line, no commas, no array brackets. This is the
        canonical input for the desktop UI's `event_log` aggregator and
        for any pipe-oriented tool (`jq -c`, `awk`, …).

        Differs from `/events/all` in two ways:

          - **Format**: raw NDJSON, not a JSON array.
          - **Content-Disposition**: includes `attachment; filename="events.log"`
            so browsers offer a "save as" dialog.

        Returns 200 with an empty body when the file doesn't exist yet
        (no events written).
      responses:
        '200':
          description: Newline-delimited JSON, one event per line
          headers:
            Content-Disposition:
              schema: { type: string }
              description: '`attachment; filename="events.log"`'
          content:
            application/x-ndjson:
              schema:
                type: string
                description: 'One `Event` (see schema below) per `\n`-terminated line.'

  /live_logs:
    get:
      summary: SSE stream of new events
      description: |
        Each `data:` frame contains exactly one JSON event matching one
        of the variants below. Open [/live](/live) for a
        browser-friendly viewer.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /events/bulk:
    post:
      summary: Publish a batch as NDJSON
      description: |
        Sibling to `/events` with an unambiguous Content-Type contract.
        Body is `application/x-ndjson` — one JSON event per
        `\n`-terminated line, no array wrapping. Lines that aren't
        valid JSON are skipped and counted out of `accepted`.
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
      responses:
        '202':
          description: Accepted. Body reports how many lines were stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: integer }
        '500':
          description: Server failed to durably append a line.

  /channels/publish:
    post:
      summary: Publish a payload to a channel
      description: |
        First-class HTTP **publish** verb. The request body is a JSON
        value (any shape — object, array, string, number); the server
        fans it out to every subscriber of the named channel:

          - WebSocket sessions joined to `?topic=…` via `phx_join` —
            they receive a standard Phoenix `broadcast` envelope.
          - HTTP listeners on `/channels/subscribe?topic=…` — they
            receive the payload verbatim as one SSE `data:` line.

        With `?persist=1`, the payload is also appended to the on-disk
        trace file (so `/events/all` and `/events/log` see it). Off by
        default — publish is in-memory by nature.
      parameters:
        - in: query
          name: topic
          required: true
          schema: { type: string, example: 'realtime:drift-profiler-events' }
          description: Phoenix topic.
        - in: query
          name: persist
          required: false
          schema: { type: string, enum: ['0', '1'] }
          description: 'If `1`, also append the payload to the trace file.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Any JSON value.
      responses:
        '202':
          description: Accepted. Body reports the topic and subscriber count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: integer, example: 1 }
                  topic: { type: string }
                  subscribers: { type: integer }
        '400':
          description: Missing or empty topic, or body is not valid JSON.

  /channels/subscribe:
    get:
      summary: Subscribe to a channel (SSE)
      description: |
        First-class HTTP **subscribe** verb. Streams every payload
        published to `?topic=…` as Server-Sent Events. One `data:`
        line per payload. Unlike `/channels/live`, this endpoint
        delivers payloads only — no Phoenix envelopes, no
        joins/heartbeats.

        On connect, the topic's history ring (if any) is replayed
        first, then new publishes are streamed live. Periodic `: ka`
        keepalive comments are sent every 15 s so an idle channel
        keeps the connection alive through proxies.
      parameters:
        - in: query
          name: topic
          required: true
          schema: { type: string }
      responses:
        '200':
          description: SSE stream of payloads.
          content:
            text/event-stream:
              schema: { type: string }

  /channels:
    get:
      summary: List active channels and their subscriber counts
      description: |
        Returns a snapshot of every Phoenix topic currently joined by
        at least one WebSocket session. Keys are the full topic
        (`realtime:<channel>`); values are the count of sessions
        joined to that topic. Empty `{}` when no client is connected.
      responses:
        '200':
          description: Topic → subscriber count.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: integer }
                example: { 'realtime:drift-profiler-events': 2 }

  /channels/messages:
    get:
      summary: Recent Phoenix frames (ring buffer)
      description: |
        Returns the most-recent `CHANNEL_HISTORY_CAP` (default 500)
        wire-level Phoenix envelopes the broker has seen, in
        chronological order. Both directions (`in` / `out`) are
        included so you can see what the client sent and what the
        server replied with. Use `?topic=realtime:<channel>` to narrow
        to one channel.
      parameters:
        - in: query
          name: topic
          schema: { type: string, example: 'realtime:drift-profiler-events' }
          required: false
          description: Phoenix topic filter. Omit to include every topic.
      responses:
        '200':
          description: Array of Frame objects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChannelFrame' }

  /channels/live:
    get:
      summary: SSE stream of new Phoenix frames
      description: |
        Server-Sent Events stream of every Phoenix frame the broker
        processes after the request is opened. Existing ring contents
        are NOT replayed — call `/channels/messages` for a snapshot.
        Use `?topic=realtime:<channel>` to filter.
      parameters:
        - in: query
          name: topic
          schema: { type: string }
          required: false
      responses:
        '200':
          description: SSE stream of Frame objects.
          content:
            text/event-stream:
              schema: { type: string }

  /realtime/v1/websocket:
    get:
      summary: Phoenix-Channels-emulating WebSocket subscriber
      description: |
        Drop-in replacement for Supabase Realtime for the drift event
        stream. Implements the minimum Phoenix Channels v1.0.0 subset
        the drift-lab desktop UI uses:

          - inbound `phx_join` on `realtime:<channel>` → reply ok
          - inbound `heartbeat` on `phoenix` → reply ok
          - inbound `phx_leave` → reply ok, unsubscribe
          - outbound `broadcast` envelopes for each event the server
            received via POST or via the file tailer.

        Authentication is NOT enforced — `?apikey=…` is accepted and
        ignored. Intended for local / self-hosted use; put a proxy in
        front if you need access control.
      parameters:
        - in: query
          name: apikey
          schema: { type: string }
          required: false
          description: Accepted for compatibility, not validated.
        - in: query
          name: vsn
          schema: { type: string, example: '1.0.0' }
          required: false
      responses:
        '101':
          description: Switching Protocols — WebSocket upgrade succeeded.

components:
  schemas:
    # ----------------------------------------------------------------------
    # Top-level union: every event written by driftdockerprofiler is ONE
    # of these four shapes, discriminated by `type`.
    # ----------------------------------------------------------------------
    Event:
      oneOf:
        - $ref: '#/components/schemas/WallTraceEvent'
        - $ref: '#/components/schemas/CPUTraceEvent'
        - $ref: '#/components/schemas/WallProfileEvent'
        - $ref: '#/components/schemas/CPUProfileEvent'
        - $ref: '#/components/schemas/FunctionCallEvent'
      discriminator:
        propertyName: type
        mapping:
          wall_trace:    '#/components/schemas/WallTraceEvent'
          cpu_trace:     '#/components/schemas/CPUTraceEvent'
          wall_profile:  '#/components/schemas/WallProfileEvent'
          cpu_profile:   '#/components/schemas/CPUProfileEvent'
          function_call: '#/components/schemas/FunctionCallEvent'

    # ----------------------------------------------------------------------
    # Shared base — every event has these fields. Realized via allOf in
    # each variant so codegen tools produce flat structs.
    # ----------------------------------------------------------------------
    EventBase:
      type: object
      required:
        - type
        - time
        - service
        - pod
        - period_ns
        - duration_ns
        - cpu
        - memory_bytes
      properties:
        type:
          type: string
          description: Discriminator — see `Event.oneOf`.
        time:
          type: string
          format: date-time
          description: |
            ISO-8601 UTC at window close, microsecond precision, suffixed
            with `Z`. Example `2026-05-19T12:34:50.012345Z`.
        service:
          type: string
          description: Service name passed to `driftdockerprofiler.start(service=…)`.
        service_version:
          type: string
          nullable: true
          description: Optional version label (env `GAE_VERSION` / `K_REVISION`).
        pod:
          type: string
          description: '`$HOSTNAME` or `socket.gethostname()` — pod / host identifier.'
        period_ns:
          type: integer
          format: int64
          description: Sampling interval in nanoseconds (e.g. 10_000_000 = 10 ms).
        duration_ns:
          type: integer
          format: int64
          description: Profile-window length in nanoseconds (e.g. 10_000_000_000 = 10 s).
        cpu:
          type: number
          format: double
          description: 1-min system load average at window close (`os.getloadavg()[0]`).
        memory_bytes:
          type: integer
          format: int64
          description: |
            Process RSS at window close. Linux: read from `/proc/self/statm`
            second column × `SC_PAGE_SIZE`. macOS: `getrusage().ru_maxrss`.
        memory_peak_bytes:
          type: integer
          format: int64
          description: |
            Peak RSS observed since process start
            (`getrusage(RUSAGE_SELF).ru_maxrss`). Monotonic
            non-decreasing — catches transient spikes the current-RSS
            probe may have missed.

    # ----------------------------------------------------------------------
    # Per-trace mode — one line per unique call stack per window.
    # Cheap to tail, easy to grep, ~10–100 events per window.
    # ----------------------------------------------------------------------
    WallTraceEvent:
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, count, frames]
          properties:
            type:   { type: string, enum: [wall_trace] }
            count:
              type: integer
              format: int64
              description: |
                Ticks that hit this exact stack in this window. Wall ticks
                fire every `period_ns` regardless of whether the process
                is on-CPU — sleeping / idle time is included.
            frames:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/Frame' }
              description: Call stack, leaf-first.

    CPUTraceEvent:
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          required: [type, count, frames]
          properties:
            type:   { type: string, enum: [cpu_trace] }
            count:
              type: integer
              format: int64
              description: |
                Ticks that hit this exact stack in this window. CPU ticks
                fire only when the process is on-CPU (POSIX `SIGPROF` /
                `ITIMER_PROF`), so idle time is NOT counted.
            frames:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/Frame' }

    # ----------------------------------------------------------------------
    # Bundle mode — one line per window carrying the whole `Profile`.
    # Mirrors pprof's structure. All samples inlined.
    # ----------------------------------------------------------------------
    WallProfileEvent:
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - $ref: '#/components/schemas/ProfileBundleFields'
        - type: object
          required: [type, profile_type]
          properties:
            type:         { type: string, enum: [wall_profile] }
            profile_type: { type: string, enum: [wall] }

    CPUProfileEvent:
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - $ref: '#/components/schemas/ProfileBundleFields'
        - type: object
          required: [type, profile_type]
          properties:
            type:         { type: string, enum: [cpu_profile] }
            profile_type: { type: string, enum: [cpu] }

    ProfileBundleFields:
      type: object
      required: [time_ns, sample_type, samples]
      properties:
        time_ns:
          type: integer
          format: int64
          description: Window-end timestamp as ns int. Same instant as `time` (ISO).
        sample_type:
          type: array
          items: { $ref: '#/components/schemas/ValueType' }
          example:
            - { type: sample, unit: count }
            - { type: wall,   unit: nanoseconds }
          description: |
            pprof-style value-type vector. Element `[0]` always
            `(sample, count)`; element `[1]` is the profile-specific
            value type — `(wall, nanoseconds)` or `(cpu, nanoseconds)`.
        samples:
          type: array
          items: { $ref: '#/components/schemas/Sample' }
        default_sample_type:
          type: string
          nullable: true
        comment:
          type: array
          items: { type: string }

    # ----------------------------------------------------------------------
    # Sub-schemas
    # ----------------------------------------------------------------------
    Frame:
      type: object
      required: [name, file, line]
      properties:
        name: { type: string, example: create_order, description: 'Function name (`co_name`).' }
        file: { type: string, example: /app/app.py,  description: 'Source file (`co_filename`).' }
        line: { type: integer, example: 52,          description: 'Line currently executing (`f_lineno`).' }

    ValueType:
      type: object
      required: [type, unit]
      properties:
        type: { type: string, example: wall }
        unit: { type: string, example: nanoseconds }

    FunctionCallEvent:
      type: object
      description: |
        Deterministic-tracer event. One emitted per call of a function
        decorated with `@driftdockerprofiler.trace` in the Python agent.
        Catches every invocation regardless of duration — useful for
        methods too fast to be caught by `wall_trace`/`cpu_trace`
        (anything below ~one sample period of wall/CPU time).

        Sampler events and `function_call` events coexist in the same
        JSONL stream; consumers filter by `type`.
      required: [type, time, service, pod, qualname, duration_ns, status]
      properties:
        type: { type: string, enum: [function_call] }
        time: { type: string, format: date-time, description: 'ISO-8601 UTC, end of call.' }
        service: { type: string }
        service_version: { type: string, nullable: true }
        pod: { type: string }
        qualname:
          type: string
          example: 'orders.OrderService.create'
          description: 'Fully-qualified Python name (Python `__qualname__`).'
        file: { type: string, example: '/app/orders.py' }
        line: { type: integer, example: 14 }
        duration_ns:
          type: integer
          format: int64
          example: 3284
          description: 'Wall-time the call took, in nanoseconds.'
        status:
          type: string
          enum: [ok, error]
          description: '`error` if the function raised any exception.'

    ChannelFrame:
      type: object
      description: |
        One Phoenix-Channels envelope observed by the broker, plus
        metadata. The `frame` field carries the byte-for-byte JSON the
        broker put on the wire (or received from a client), so a
        consumer that already speaks Phoenix can replay the traffic
        without re-encoding.
      required: [topic, direction, event, time, frame]
      properties:
        topic:
          type: string
          example: 'realtime:drift-profiler-events'
          description: Phoenix topic — `realtime:<channel>` for joined channels, `phoenix` for heartbeats, empty for malformed inbound frames.
        direction:
          type: string
          enum: [in, out]
          description: |
            `in` — frame received from a WebSocket client.
            `out` — frame written by the server to a WebSocket client.
        event:
          type: string
          enum: [phx_join, phx_reply, phx_leave, heartbeat, broadcast, presence_state, system]
          example: broadcast
        time:
          type: string
          format: date-time
          description: 'ISO-8601 UTC when the broker observed the frame.'
        frame:
          type: object
          description: The raw Phoenix envelope (`{"topic":…,"event":…,"payload":…,"ref":…,"join_ref":…}`).

    Sample:
      type: object
      required: [count, value_ns, frames, labels]
      properties:
        count:
          type: integer
          format: int64
          description: Ticks that hit this stack.
        value_ns:
          type: integer
          format: int64
          description: '`count × period_ns` — total time attributed to this stack.'
        frames:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Frame' }
        labels:
          type: object
          additionalProperties: { type: string }
