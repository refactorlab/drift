<!doctype html>
<html>
<head>
  <title>drift observability-server</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: '/openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        layout: 'BaseLayout',
      });
    };
  </script>
  <div style="text-align:center;padding:1em;font-family:sans-serif">
    <a href="/live">→ live log viewer</a>
  </div>
</body>
</html>
