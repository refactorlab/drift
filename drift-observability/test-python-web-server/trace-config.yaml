service: test-python-web-server

# drift writes JSONL events to this path on the shared hostPath volume.
# The observability-server tails this file and streams events over SSE.
log_path: /trace/events.log

redact: [password, token, secret]

# Per-field toggles — all default true. Set false to drop the field from events.
include:
  pod: false
  service: false
  caller: true

methods:
  - orders.OrderService.create
  - orders.OrderService.charge
  - target: orders.OrderService.ship
    params: [order_id]
