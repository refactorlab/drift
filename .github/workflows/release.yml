name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build action
        working-directory: action
        run: |
          npm install
          npm run build

      - name: Verify dist/index.js is in sync
        run: |
          if ! git diff --quiet -- dist/index.js; then
            echo "::error::dist/index.js is out of sync with action/src — run 'cd action && npm run build' and commit before merging to main"
            exit 1
          fi

      - name: Compute next version + notes
        id: bump
        run: |
          set -euo pipefail

          last_tag=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1 || true)
          if [ -z "$last_tag" ]; then
            range="HEAD"
            prev="v0.0.0"
          else
            range="${last_tag}..HEAD"
            prev="$last_tag"
          fi

          commits=$(git log "$range" --no-merges --pretty=format:'%s%n%b%n--END--')
          if [ -z "$commits" ]; then
            echo "No new commits since $prev — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional-commit bump: BREAKING CHANGE / feat!: / fix!: → major,
          # feat: → minor, everything else → patch.
          bump="patch"
          while IFS= read -r line; do
            case "$line" in
              *"BREAKING CHANGE"*) bump="major"; break ;;
              feat\!:*|fix\!:*|refactor\!:*|perf\!:*) bump="major"; break ;;
              "feat("*"):"*|feat:*) [ "$bump" = "patch" ] && bump="minor" ;;
            esac
          done <<< "$commits"

          ver="${prev#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          major_alias="v${major}"

          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "## What's changed since ${prev}"
            echo
            git log "$range" --no-merges --pretty='- %s (%h)'
          } > "$notes_file"

          echo "skip=false"            >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag"      >> "$GITHUB_OUTPUT"
          echo "major_alias=$major_alias" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file"   >> "$GITHUB_OUTPUT"
          echo "bump=$bump"            >> "$GITHUB_OUTPUT"
          echo "Releasing $new_tag (bump=$bump, prev=$prev)"

      - name: Tag, move major alias, publish release
        if: steps.bump.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          MAJOR_ALIAS: ${{ steps.bump.outputs.major_alias }}
          NOTES_FILE: ${{ steps.bump.outputs.notes_file }}
        run: |
          set -euo pipefail
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          git tag -f "$MAJOR_ALIAS" "$NEW_TAG"
          git push -f origin "$MAJOR_ALIAS"
          gh release create "$NEW_TAG" --title "$NEW_TAG" --notes-file "$NOTES_FILE"
