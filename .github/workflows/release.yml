name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build action
        working-directory: action
        run: |
          npm install
          npm run build

      - name: Verify dist/index.js is up to date
        run: |
          if ! git diff --quiet -- dist/index.js; then
            echo "::error::dist/index.js out of sync with action/src — run 'cd action && npm run build' and commit"
            exit 1
          fi

      - name: Re-tag major version (e.g. v1)
        run: |
          tag=${GITHUB_REF##*/}
          major=${tag%%.*}
          git tag -f "$major" "$tag"
          git push -f origin "$major"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF##*/}" --generate-notes
