name: drift-static-profiler / release

# Releases the `drift-static-profiler` CLI INDEPENDENTLY of the desktop app.
#
# Model: RELEASE ON VERSION BUMP.
#   Bump `drift-static-profiler/Cargo.toml` `version` in your PR → merge to
#   main → this workflow derives the tag `drift-static-profiler-v<version>`,
#   and if that version isn't already released, it creates the tag + release
#   and publishes the cross-platform binaries. No version change ⇒ no-op.
#   (Manual override available via workflow_dispatch with an explicit tag.)
#
# The Drift GitHub Action (action.yml) auto-detects the newest release whose
# tag matches `drift-static-profiler-v*` (or `drift-lab-v*`) and has the
# binary asset — so a fresh CLI release is picked up automatically. Asset
# naming MUST match action/scripts/install-profiler.sh:
#     drift-static-profiler-<arch>-<os>.{tar.gz | zip}  (+ sibling .sha256)

on:
  push:
    branches: [main]
    paths:
      - 'drift-static-profiler/Cargo.toml'   # the version bump is the release signal
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (default: drift-static-profiler-v<Cargo.toml version>). Created on the current commit if missing.'
        required: false

# Serialize so two version bumps can't race on the same tag.
concurrency:
  group: drift-static-profiler-release
  cancel-in-progress: false

permissions:
  contents: write  # create the tag + release; upload-rust-binary-action attaches assets

jobs:
  # Resolve the tag from the Cargo.toml version (or the dispatch override),
  # then create the tag + empty release ONCE — but only if that version
  # hasn't been released yet. `skip=true` makes the whole build matrix a
  # no-op for pushes that didn't bump the version. taiki-e/upload-rust-
  # binary-action needs the Release to exist before it can upload to it.
  create-release:
    name: resolve + create release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag + create release if the version is new
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${OVERRIDE:-}" ]; then
            TAG="$OVERRIDE"
          else
            ver=$(grep -m1 '^version' drift-static-profiler/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            TAG="drift-static-profiler-v${ver}"
          fi
          export TAG
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "🏷  resolved tag: $TAG"

          # Already released? → skip the whole pipeline (version unchanged).
          if curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" >/dev/null 2>&1; then
            echo "✓ release $TAG already exists — nothing to do (bump the version to ship a new one)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Create the tag on the current commit (idempotent) ...
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "🏷  pushed tag $TAG"
          fi

          # ... and the (non-prerelease) Release so auto-detect treats it as latest.
          PAYLOAD=$(python3 -c "import json,os;print(json.dumps({'tag_name':os.environ['TAG'],'name':os.environ['TAG'],'draft':False,'prerelease':False}))")
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$PAYLOAD" >/dev/null
          echo "📦 created release $TAG"

  build:
    name: build / ${{ matrix.target }}
    needs: create-release
    if: needs.create-release.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only the targets the Drift Action actually runs on. Consumers
          # run on `ubuntu-latest` (x86_64 — see README) so x86_64-linux is
          # the only must-have; macOS is kept for native dev/`make` use. ARM
          # Linux is dropped (pg_query/libclang won't cross-compile, and the
          # action fail-soft skips the scan when no matching asset exists),
          # and Windows isn't a supported runner for this action.
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest  }
          - { target: x86_64-apple-darwin,       os: macos-latest   }
          - { target: aarch64-apple-darwin,      os: macos-latest   }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: drift-static-profiler
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # All three remaining targets build natively on their runner
      # (x86_64-linux on ubuntu, both macOS on macos-latest), so no
      # cross-linker setup is needed.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-static-profiler
          key: ${{ matrix.target }}

      # Builds, archives, generates `<archive>.sha256`, and uploads everything
      # to the GitHub Release created above. Asset naming follows
      # `drift-static-profiler-<target>.{tar.gz | zip}` — the format
      # install-profiler.sh downloads.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: drift-static-profiler
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          zip: windows
          checksum: sha256
          manifest-path: drift-static-profiler/Cargo.toml
          ref: refs/tags/${{ needs.create-release.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
