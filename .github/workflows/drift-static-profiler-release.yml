name: drift-static-profiler / release

# Releases the `drift-static-profiler` CLI INDEPENDENTLY of the desktop app.
#
# Model: RELEASE ON VERSION BUMP.
#   Bump `drift-static-profiler/Cargo.toml` `version` in your PR → merge to
#   main → this workflow derives the tag `drift-static-profiler-v<version>`,
#   and if that version isn't already released, it creates the tag + release
#   and publishes the cross-platform binaries. No version change ⇒ no-op.
#   (Manual override available via workflow_dispatch with an explicit tag.)
#
# The Drift GitHub Action (action.yml) auto-detects the newest release whose
# tag matches `drift-static-profiler-v*` and has the binary asset — so a
# fresh CLI release is picked up automatically. This is the SINGLE source of
# truth for that binary; the desktop `drift-lab-v*` releases no longer carry
# it (de-duplicated — see drift-lab-desktop-build.yml's publish job). Asset
# naming MUST match action/scripts/install-profiler.sh:
#     drift-static-profiler-<arch>-<os>.{tar.gz | zip}  (+ sibling .sha256)

on:
  push:
    branches: [main]
    paths:
      - 'drift-static-profiler/Cargo.toml'   # the version bump is the release signal
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (default: drift-static-profiler-v<Cargo.toml version>). Created on the current commit if missing.'
        required: false

# Serialize so two version bumps can't race on the same tag.
concurrency:
  group: drift-static-profiler-release
  cancel-in-progress: false

permissions:
  contents: write  # create the tag + release; upload-rust-binary-action attaches assets

jobs:
  # Resolve the tag from the Cargo.toml version (or the dispatch override),
  # then create the tag + empty release ONCE — but only if that version
  # hasn't been released yet. `skip=true` makes the whole build matrix a
  # no-op for pushes that didn't bump the version. taiki-e/upload-rust-
  # binary-action needs the Release to exist before it can upload to it.
  create-release:
    name: resolve + create release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag + create release if the version is new
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          OVERRIDE: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${OVERRIDE:-}" ]; then
            TAG="$OVERRIDE"
          else
            ver=$(grep -m1 '^version' drift-static-profiler/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            TAG="drift-static-profiler-v${ver}"
          fi
          export TAG
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "🏷  resolved tag: $TAG"

          # Already released? → skip the whole pipeline (version unchanged).
          if curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" >/dev/null 2>&1; then
            echo "✓ release $TAG already exists — nothing to do (bump the version to ship a new one)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Create the tag on the current commit (idempotent) ...
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "🏷  pushed tag $TAG"
          fi

          # ... and the (non-prerelease) Release so auto-detect treats it as latest.
          PAYLOAD=$(python3 -c "import json,os;print(json.dumps({'tag_name':os.environ['TAG'],'name':os.environ['TAG'],'draft':False,'prerelease':False}))")
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$PAYLOAD" >/dev/null
          echo "📦 created release $TAG"

  build:
    name: build / ${{ matrix.target }}
    needs: create-release
    if: needs.create-release.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # ONLY the target the Drift Action actually runs on. The action
          # resolves its binary from the consumer's runner, and consumers
          # run on `ubuntu-latest` (x86_64 — see README), so x86_64-linux is
          # the one and only asset that gets downloaded. macOS/Windows/ARM
          # are intentionally NOT built: no consumer runs the action there,
          # local dev compiles its own binary (profiler-local-bin), and the
          # action fail-soft skips the scan on any arch without a matching
          # asset — so dropping them costs nothing and keeps releases fast.
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest  }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: drift-static-profiler
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Single target, builds natively on ubuntu-latest — no cross-linker
      # setup needed.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-static-profiler
          key: ${{ matrix.target }}

      # Builds, archives, generates `<archive>.sha256`, and uploads everything
      # to the GitHub Release created above. Asset naming follows
      # `drift-static-profiler-<target>.{tar.gz | zip}` — the format
      # install-profiler.sh downloads.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: drift-static-profiler
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          zip: windows
          checksum: sha256
          manifest-path: drift-static-profiler/Cargo.toml
          ref: refs/tags/${{ needs.create-release.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build the scanner as a WASM module and upload it to the same release.
  #
  # Why here: the WASM is compiled directly from drift-static-profiler, so it
  # belongs alongside the native binary release. Hosting it on GitHub Releases
  # lets the Chrome extension (or any tool) point `scannerUrl` at the download
  # URL to pull the latest scanner without waiting for a Web Store review cycle.
  #
  # Assets uploaded:
  #   drift-static-profiler.wasm   — the wasm32-wasip1 binary (~22 MB)
  #   drift-scanner.meta.json      — {version, bytes, target} read by the extension
  build-wasm:
    name: build / wasm32-wasip1
    needs: create-release
    if: needs.create-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    env:
      # Keep in sync with drift-chrome-extension-release.yml so the wasi-sdk
      # cache key is shared across workflows on the same runner pool.
      WASI_SDK_VERSION: '24'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-static-profiler
          key: wasm32-wasip1

      - name: Cache wasi-sdk
        uses: actions/cache@v4
        with:
          path: ~/wasi-sdk
          key: wasi-sdk-${{ env.WASI_SDK_VERSION }}

      # build-wasm.sh is self-contained: it installs wasi-sdk on a cache miss,
      # compiles drift-static-profiler with --no-default-features for the wasm
      # target, and writes public/drift-static-profiler.wasm + drift-scanner.meta.json.
      - name: Build WASM scanner
        run: bash drift-chrome-extension/scripts/build-wasm.sh

      - name: Upload WASM assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail

          RELEASE_ID=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")

          upload_asset() {
            local file="$1" name="$2" mime="$3"
            curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: $mime" \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${name}" \
              >/dev/null
            echo "✓ uploaded $name ($(du -h "$file" | cut -f1))"
          }

          upload_asset drift-chrome-extension/public/drift-static-profiler.wasm \
            drift-static-profiler.wasm application/wasm
          upload_asset drift-chrome-extension/public/drift-scanner.meta.json \
            drift-scanner.meta.json application/json
