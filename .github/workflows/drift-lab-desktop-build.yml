name: drift-lab desktop / build

# PR-only validation that the desktop app compiles and bundles successfully on
# every supported platform. Artifacts are uploaded for inspection (7-day
# retention) but no GitHub Release is created here — that happens automatically
# on every push to main via drift-lab-desktop-release.yml.

on:
  pull_request:
    paths:
      - 'drift-lab/**'
      # drift-lab links against drift-static-profiler as a path dependency
      # (see drift-lab/src-tauri/Cargo.toml). A change in the profiler
      # crate must trigger the desktop build so we catch breakage at PR
      # time, not the next time someone touches drift-lab/.
      - 'drift-static-profiler/**'
      - '.github/workflows/drift-lab-desktop-build.yml'
  workflow_dispatch:

concurrency:
  group: drift-lab-desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary on macos-14 — covers Apple Silicon + Intel
          # in one leg, avoiding the macos-13 runner queue.
          - runner: macos-14
            label: macos-universal
            tauri_args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundle_dir: universal-apple-darwin/release/bundle
          - runner: ubuntu-22.04     # Tauri 2 needs libwebkit2gtk-4.1
            label: linux-x86_64
            tauri_args: ''
            rust_targets: x86_64-unknown-linux-gnu
            bundle_dir: release/bundle
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            build-essential \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: drift-lab/desktop-ui/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-lab/src-tauri -> target
          key: ${{ matrix.label }}

      - name: Cache cargo-tauri binary
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          # v3 invalidates caches that captured a wrong binary at this path.
          # Symptom of a poisoned cache: `cargo tauri build` fails in ~1s with
          # `error: unexpected argument 'tauri' found / Usage: rustup-init[EXE]`,
          # because cargo dispatched to `cargo-tauri` and found rustup-init's
          # clap parser instead of the real CLI.
          key: cargo-tauri-3-${{ runner.os }}-${{ runner.arch }}

      - name: Ensure rust toolchain and cargo-tauri are usable
        shell: bash
        run: |
          # ── Diagnose what's actually on PATH ───────────────────────────
          # Print this unconditionally so any future failure has the runner
          # state in the log without needing a re-run.
          echo "PATH=$PATH"
          echo "which cargo: $(command -v cargo || echo '<none>')"
          echo "which rustc: $(command -v rustc || echo '<none>')"
          echo "~/.cargo/bin contents:"
          ls -la "$HOME/.cargo/bin/" 2>/dev/null || echo "  <missing>"

          # ── Repair cargo if it's not actually cargo ────────────────────
          # We've seen runner images where ~/.cargo/bin/cargo (and other proxies)
          # are hardlinks to rustup-init instead of the rustup multi-call binary.
          # Symptom: any `cargo <subcommand>` fails with rustup-init's clap parser
          # ("unexpected argument 'install'", "unexpected argument 'tauri'", etc.).
          # rustup-init *does* accept --version and exits 0, so detect by checking
          # the output contains "cargo" (real cargo prints "cargo X.Y.Z (...)").
          if ! command -v cargo >/dev/null || ! cargo --version 2>&1 | grep -qi "^cargo "; then
            echo "::warning::cargo on PATH is broken or missing (got: $(cargo --version 2>&1 | head -1 || echo '<unrunnable>')) — reinstalling rust"
            # Wipe the poisoned bin dir entirely; rustup-init recreates the proxies.
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            # shellcheck disable=SC1091
            source "$HOME/.cargo/env"
            # Persist the repair into subsequent steps' PATH. Prepending (not
            # appending) so we beat any other cargo elsewhere on the runner.
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            echo "Repaired cargo: $(cargo --version)"
          fi

          # ── Ensure cargo-tauri itself is real ──────────────────────────
          # Same identity check applied to ~/.cargo/bin/cargo-tauri. A wipe of
          # ~/.cargo/bin above also removes any prior cargo-tauri, so the
          # install branch below covers both fresh-repair and ordinary
          # cache-miss paths.
          bin="$HOME/.cargo/bin/cargo-tauri"
          if [ -x "$bin" ] && "$bin" --version 2>&1 | grep -qi "tauri"; then
            echo "cargo-tauri OK: $("$bin" --version)"
          else
            if [ -e "$bin" ]; then
              echo "::warning::Cached binary at $bin is not cargo-tauri (got: $("$bin" --version 2>&1 | head -1 || echo '<unrunnable>')) — replacing"
            else
              echo "::notice::Installing cargo-tauri (cache miss)"
            fi
            rm -f "$bin"
            cargo install tauri-cli --version "^2.0" --locked
            "$bin" --version 2>&1 | grep -qi "tauri"
            echo "cargo-tauri installed: $("$bin" --version)"
          fi

      - name: Install frontend deps
        working-directory: drift-lab/desktop-ui
        run: npm ci

      - name: Build desktop app (release)
        working-directory: drift-lab
        run: cargo tauri build ${{ matrix.tauri_args }}

      - name: Upload macOS bundles
        if: startsWith(matrix.runner, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

      # Split into two single-path uploads so each artifact is flat.
      - name: Upload Linux .deb
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-deb
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/deb/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux .AppImage
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-appimage
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7
