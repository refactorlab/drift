name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  action:
    name: action / build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        working-directory: action
        run: npm install

      - name: Typecheck
        working-directory: action
        run: npm run typecheck

      - name: Test
        working-directory: action
        run: npm test

      - name: Build
        working-directory: action
        run: npm run build

      - name: Verify dist/index.js is in sync
        run: |
          if ! git diff --quiet -- dist/index.js; then
            echo "::error::dist/index.js is out of sync with action/src — run 'cd action && npm run build' and commit the result"
            git --no-pager diff --stat -- dist/index.js
            exit 1
          fi

  web-app:
    name: web-app / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        working-directory: web-app
        run: bun install --frozen-lockfile

      - name: Test
        working-directory: web-app
        run: bun test src/__tests__

  # ---------------------------------------------------------------------------
  # drift-lab / bump: decide the next drift-lab-v* tag.
  # Skipped on pull_request events; only runs on push to main + workflow_dispatch.
  # ---------------------------------------------------------------------------
  drift-lab-bump:
    name: drift-lab / compute version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialize so back-to-back main pushes can't race on git tag.
    concurrency:
      group: drift-lab-release
      cancel-in-progress: false
    outputs:
      skip:    ${{ steps.bump.outputs.skip }}
      tag:     ${{ steps.bump.outputs.tag }}
      prev:    ${{ steps.bump.outputs.prev }}
      version: ${{ steps.bump.outputs.version }}
      bump:    ${{ steps.bump.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next drift-lab version
        id: bump
        run: |
          set -euo pipefail

          last_tag=$(git tag --list 'drift-lab-v*.*.*' --sort=-v:refname | head -n 1 || true)
          if [ -z "$last_tag" ]; then
            range="HEAD"
            prev="drift-lab-v0.0.0"
          else
            range="${last_tag}..HEAD"
            prev="$last_tag"
          fi

          # Commits that touched drift-lab/ OR drift-static-profiler/ (the
          # path-dependency the desktop app links against) OR a workflow file
          # that affects the drift-lab pipeline count for a release. CI fixes
          # (e.g. publish-step bug fixes) need to ship a release too,
          # otherwise the "fix" is invisible until the next code change.
          relevant=$(git log "$range" --no-merges --pretty=format:'%H' -- \
            drift-lab/ \
            drift-static-profiler/ \
            .github/workflows/ci.yml \
            .github/workflows/drift-lab-desktop-build.yml \
            || true)
          if [ -z "$relevant" ]; then
            echo "No drift-lab-relevant commits since $prev — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional-commit bump:
          #   BREAKING CHANGE / feat!: / fix!: → major
          #   feat: → minor
          #   anything else → patch
          bump="patch"
          while IFS= read -r sha; do
            msg=$(git log -1 --format='%s%n%b' "$sha")
            if echo "$msg" | grep -qE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
              bump="major"; break
            elif echo "$msg" | grep -qE '^feat(\(.*\))?:'; then
              [ "$bump" = "patch" ] && bump="minor"
            fi
          done <<< "$relevant"

          ver="${prev#drift-lab-v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_version="${major}.${minor}.${patch}"
          new_tag="drift-lab-v${new_version}"

          {
            echo "skip=false"
            echo "tag=$new_tag"
            echo "prev=$prev"
            echo "version=$new_version"
            echo "bump=$bump"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Releasing $new_tag (bump=$bump, prev=$prev)"

  # ---------------------------------------------------------------------------
  # drift-lab / build: matrix build for macOS universal + Linux x86_64.
  # ---------------------------------------------------------------------------
  drift-lab-build:
    name: drift-lab / build / ${{ matrix.label }}
    needs: drift-lab-bump
    if: needs.drift-lab-bump.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos-universal
            tauri_args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundle_dir: universal-apple-darwin/release/bundle
          - runner: ubuntu-22.04
            label: linux-x86_64
            tauri_args: ''
            rust_targets: x86_64-unknown-linux-gnu
            bundle_dir: release/bundle
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            build-essential \
            file

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: drift-lab/desktop-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-lab/src-tauri -> target
          key: release-${{ matrix.label }}

      - name: Cache cargo-tauri binary
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-2-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-tauri (on cache miss)
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install frontend deps
        working-directory: drift-lab/desktop-ui
        run: npm ci

      - name: Build desktop app (release)
        working-directory: drift-lab
        env:
          # Ed25519 signing keypair for tauri-plugin-updater. Without these the
          # updater plugin still works at runtime but every download will fail
          # signature verification — so absence of the secret is a soft warning,
          # not a build failure (a release without sigs ships, but auto-update
          # won't accept it).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY not set — bundles will be unsigned and the in-app updater will reject them."
          fi
          cargo tauri build ${{ matrix.tauri_args }}

      - name: Upload macOS bundles (.dmg + .sig)
        if: startsWith(matrix.runner, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}
          path: |
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/dmg/*.dmg
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/macos/*.app.tar.gz
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux .deb
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-deb
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/deb/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux .AppImage (+ .sig + tar.gz updater bundle)
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-appimage
          path: |
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/appimage/*.AppImage
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/appimage/*.AppImage.tar.gz
            drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/appimage/*.AppImage.tar.gz.sig
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # drift-lab / publish: gather artifacts, tag, create GitHub Release.
  # ---------------------------------------------------------------------------
  drift-lab-publish:
    name: drift-lab / publish ${{ needs.drift-lab-bump.outputs.tag }}
    needs: [drift-lab-bump, drift-lab-build]
    if: needs.drift-lab-bump.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: drift-lab-*
          merge-multiple: true
          path: dist

      - name: List downloaded assets
        run: ls -laR dist/

      - name: Flatten artifacts
        run: |
          # download-artifact preserves subdirs from the upload path (e.g. appimage/, deb/).
          # Move every bundle file up to dist/ so gh release create gets flat paths.
          find dist -mindepth 2 -type f -exec mv -v {} dist/ \;
          find dist -mindepth 1 -type d -empty -delete

      - name: Build latest.json (updater manifest)
        env:
          NEW_TAG: ${{ needs.drift-lab-bump.outputs.tag }}
          VERSION: ${{ needs.drift-lab-bump.outputs.version }}
        run: |
          set -euo pipefail

          # Tauri's updater on macOS / Linux downloads a tar.gz of the bundle
          # signed with TAURI_SIGNING_PRIVATE_KEY. The .sig file is the entire
          # signature payload (single line, base64). We drop a `latest.json`
          # next to the bundles describing each platform's URL + signature.
          base="https://github.com/${{ github.repository }}/releases/download/${NEW_TAG}"

          # Helpers — first match for a glob, or empty.
          first() { ls -1 dist/$1 2>/dev/null | head -n1 || true; }
          read_sig() { [ -n "$1" ] && [ -f "$1" ] && cat "$1" || true; }

          mac_bundle="$(first '*.app.tar.gz')"
          mac_sig_file="$(first '*.app.tar.gz.sig')"
          linux_bundle="$(first '*.AppImage.tar.gz')"
          linux_sig_file="$(first '*.AppImage.tar.gz.sig')"

          mac_sig="$(read_sig "$mac_sig_file")"
          linux_sig="$(read_sig "$linux_sig_file")"

          if [ -z "$mac_sig" ] && [ -z "$linux_sig" ]; then
            echo "::warning::No updater signatures found — skipping latest.json (TAURI_SIGNING_PRIVATE_KEY likely unset). Bundles still ship; auto-update will report 'no update' instead of installing untrusted content."
            exit 0
          fi

          notes="See https://github.com/${{ github.repository }}/releases/tag/${NEW_TAG}"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Assemble platforms object. Unsigned legs are simply omitted.
          platforms="{}"
          if [ -n "$mac_sig" ] && [ -n "$mac_bundle" ]; then
            url="${base}/$(basename "$mac_bundle")"
            platforms=$(jq -n --arg sig "$mac_sig" --arg url "$url" \
              '{"darwin-x86_64": {signature: $sig, url: $url}, "darwin-aarch64": {signature: $sig, url: $url}}')
          fi
          if [ -n "$linux_sig" ] && [ -n "$linux_bundle" ]; then
            url="${base}/$(basename "$linux_bundle")"
            platforms=$(echo "$platforms" | jq --arg sig "$linux_sig" --arg url "$url" \
              '. + {"linux-x86_64": {signature: $sig, url: $url}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > dist/latest.json

          echo "Built latest.json:"
          cat dist/latest.json

      - name: Generate release notes
        id: notes
        env:
          NEW_TAG: ${{ needs.drift-lab-bump.outputs.tag }}
          PREV_TAG: ${{ needs.drift-lab-bump.outputs.prev }}
          BUMP: ${{ needs.drift-lab-bump.outputs.bump }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/notes.md"

          if [ "$PREV_TAG" = "drift-lab-v0.0.0" ] || ! git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            range="HEAD"
            prev_label="(initial release)"
          else
            range="${PREV_TAG}..HEAD"
            prev_label="${PREV_TAG}"
          fi

          {
            echo "## Drift Lab $NEW_TAG"
            echo
            echo "Built for **macOS** (Apple Silicon + Intel) and **Linux** (x86_64). Bump: \`$BUMP\`."
            echo
            echo "### Install"
            echo "- **macOS arm64** — \`Drift Lab_*_aarch64.dmg\`"
            echo "- **macOS Intel** — \`Drift Lab_*_x64.dmg\`"
            echo "- **Debian/Ubuntu** — \`sudo dpkg -i drift-lab_*_amd64.deb\`"
            echo "- **Other Linux** — \`chmod +x drift-lab_*.AppImage && ./drift-lab_*.AppImage\`"
            echo
            echo "### Changes since $prev_label"
            # Include drift-static-profiler commits — the desktop links it as
            # a path dep, so a profiler change really did ship in this build.
            git log "$range" --no-merges --pretty='- %s (%h)' \
              -- drift-lab/ drift-static-profiler/ | head -200
          } > "$notes_file"

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Tag and publish release
        env:
          GH_TOKEN:   ${{ github.token }}
          NEW_TAG:    ${{ needs.drift-lab-bump.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail

          # Bundles users download manually + the updater manifest + the
          # tar.gz updater bundles + their detached signatures. The plugin
          # fetches `latest.json` first, then the platform tar.gz it points
          # to. Manual installers (.dmg / .deb / .AppImage) stay too.
          mapfile -t files < <(find dist -maxdepth 1 -type f \
            \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \
            -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
            -o -name "latest.json" \))

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no bundle files found under dist/"
            ls -laR dist/ || true
            exit 1
          fi

          echo "Attaching ${#files[@]} bundle(s) to ${NEW_TAG}:"
          printf '  %s\n' "${files[@]}"

          # Idempotent tag push — re-runs after a partial failure won't error.
          if git ls-remote --exit-code --tags origin "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already on origin — skipping tag creation"
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

          # Idempotent release — reuse and overwrite partial assets via --clobber.
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists — refreshing assets"
            gh release upload "$NEW_TAG" "${files[@]}" --clobber
          else
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --notes-file "$NOTES_FILE" \
              "${files[@]}"
          fi
