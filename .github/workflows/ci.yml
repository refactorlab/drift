name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Per-job path filtering isn't native to Actions, so this job computes
  # which areas changed and the slower jobs gate on its outputs. Right now
  # only the Rust crate uses it; add more filters here as needed.
  changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      profiler: ${{ steps.filter.outputs.profiler }}
      chrome_ext: ${{ steps.filter.outputs.chrome_ext }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            profiler:
              - 'drift-static-profiler/**'
            chrome_ext:
              - 'drift-chrome-extension/**'

  # Compiles the crate (so newly added .rs files are actually built) and
  # runs the full test suite. Only runs when drift-static-profiler/** changed.
  #
  # Deliberately NOT gating on `cargo fmt --check` or `clippy -D warnings`:
  # the crate doesn't currently pass either under stable (rustfmt's evolving
  # `let ... else` style; ~130 clippy style lints in test code), so enforcing
  # them now would be pure red noise. Add them after a dedicated cleanup pass.
  profiler:
    name: profiler / build + test
    needs: changes
    if: needs.changes.outputs.profiler == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drift-static-profiler
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Same cache key strategy as the release workflow so the two share a warm
      # target/ where possible.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-static-profiler

      # `--locked` fails if Cargo.lock drifts from Cargo.toml — keeps the
      # committed lockfile honest (and matches the version-bump invariant the
      # release workflow relies on).
      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  # Builds the MV3 extension (so newly added src files actually compile) and
  # runs the vitest suite. This is the "build on every change" safety net; the
  # actual Web Store publish lives in drift-chrome-extension-release.yml and
  # only fires on main.
  #
  # Runs when the extension OR the profiler changed: the bundled scanner wasm is
  # compiled from drift-static-profiler, so a profiler change (especially the
  # version bump that the publish workflow will ship) must prove the wasm still
  # builds in the SAME PR — not surface later as a publish-on-main failure.
  chrome-ext:
    name: chrome-ext / build + test
    needs: changes
    if: needs.changes.outputs.chrome_ext == 'true' || needs.changes.outputs.profiler == 'true'
    runs-on: ubuntu-latest
    # Single-sourced wasi-sdk version: feeds BOTH the cache key below and
    # build-wasm.sh (inherited by the build step), so they can never drift.
    env:
      WASI_SDK_VERSION: '24'
    defaults:
      run:
        working-directory: drift-chrome-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: drift-chrome-extension/package-lock.json

      # `npm ci` installs the exact lockfile versions — reproducible builds and
      # a fail-loud guard if package-lock.json drifts from package.json.
      - name: Install
        run: npm ci

      # Build the scanner wasm so it's present for BOTH the package and the
      # tests. Without it, src/core/wasmScan.test.ts (`describeIf =
      # haveWasm ? describe : describe.skip`) silently skips — the flagship
      # live-scan integration would never actually run in CI.
      #
      # `scripts/build-wasm.sh` is the single source of truth for the build: it
      # adds the rustup wasm target (runners ship rustup) AND self-installs
      # wasi-sdk on a cold cache. The two cache steps are the only thing a shell
      # script can't own — they restore the cargo target/ and the ~100MB
      # wasi-sdk so the build is fast on a warm cache (shared with the release
      # workflow via the same keys).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-static-profiler
      - uses: actions/cache@v4
        with:
          path: ~/wasi-sdk
          key: wasi-sdk-${{ env.WASI_SDK_VERSION }}-${{ runner.os }}
      - name: Build scanner wasm
        run: npm run build:wasm

      # Build the STORE profile (DRIFT_STORE_BUILD=1) — the exact bytes that ship
      # to the Web Store. This DCEs the remote-scanner download path out of the
      # bundle (src/core/scannerDownload.ts), so CI validates the shippable
      # artifact, not the looser sideload build. `npm run build` already runs
      # `tsc --noEmit` before `vite build`, so this covers the type check too.
      # (The DEV/sideload path is exercised separately by the test step below —
      # vitest builds with the flag off.)
      - name: Build (store profile — what ships to the Web Store)
        run: npm run build
        env:
          DRIFT_STORE_BUILD: '1'

      # Gate: the packaged dist/ must contain a valid scanner wasm + meta.
      - name: Verify packaged assets
        run: npm run verify:assets

      # Gate: the store bundle must contain NO remote-scanner-download code
      # (MV3 forbids fetching + running remotely-hosted WASM).
      - name: Verify store build is MV3-clean
        run: npm run verify:store

      - name: Test
        run: npm test

  action:
    name: action / build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # `npm ci` (not `npm install`) installs the exact lockfile versions, so
      # esbuild — and therefore the bundle bytes — are reproducible. The
      # in-sync guard below depends on CI producing the same output as the
      # committed bundles.
      - name: Install
        working-directory: action
        run: npm ci

      - name: Typecheck
        working-directory: action
        run: npm run typecheck

      # Build before test: the e2e tests spawn `node dist/index.js`, so the
      # bundles have to exist on disk first. All three (index.js, ai-context.js,
      # ai-suggest.js) are COMMITTED — composite-action consumers run them
      # straight from the checkout of refactorlab/drift@<ref> — so this rebuild
      # must reproduce them exactly; the verify step below fails otherwise.
      - name: Build
        working-directory: action
        run: npm run build

      - name: Test
        working-directory: action
        run: npm test

      # Hard guard: every shipped bundle MUST be tracked AND match a fresh
      # build. An untracked bundle means a dist/ ignore rule crept back in and
      # consumers will hit MODULE_NOT_FOUND at runtime — fail loudly here
      # instead of letting them discover it. Keep this list in sync with the
      # `node dist/*.js` steps in action.yml and the build script in
      # action/package.json.
      - name: Verify committed dist/ bundles are tracked and in sync
        run: |
          bundles="dist/index.js dist/ai-context.js dist/ai-suggest.js dist/ai-infer-one.js"
          fail=0
          for f in $bundles; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error file=$f::$f is not tracked — composite-action consumers will hit MODULE_NOT_FOUND. Remove any dist/ ignore rule and commit it."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

          # shellcheck disable=SC2086
          if ! git diff --quiet -- $bundles; then
            echo "::error::dist/ bundles are out of sync with action/src — run 'cd action && npm run build' and commit the result"
            # shellcheck disable=SC2086
            git --no-pager diff --stat -- $bundles
            exit 1
          fi
          echo "✅ dist bundles are tracked and in sync: $bundles"

  web-app:
    name: web-app / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        working-directory: web-app
        run: bun install --frozen-lockfile

      - name: Test
        working-directory: web-app
        run: bun test src/__tests__
