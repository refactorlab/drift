name: drift-lab desktop / release

# Cuts a signed release of Drift Lab and emits the latest.json manifest the
# in-app updater consumes. Triggered by tag push (`drift-lab-v*`) or manual
# dispatch. The release is created as a DRAFT — a human reviews and clicks
# Publish, which is what makes /releases/latest/download/latest.json point
# at this build (GitHub serves /latest from the most recent published, not
# drafted, release).
#
# Bootstrap + key-management lives in drift-lab/UPDATER.md.
#
# ── Caching strategy ────────────────────────────────────────────────────────
# Five cache layers, mirroring drift-lab-desktop-build.yml so the same code
# compiles once and warms cache for both workflows (via shared-key):
#   1. apt packages              — awalsh128/cache-apt-pkgs-action@v1
#   2. npm registry (both UIs)   — actions/setup-node@v4 cache:npm with both
#                                  package-lock.json paths
#   3. static-profiler viewer dist — actions/cache@v4 keyed on viewer sources
#                                  (REQUIRED — tauri-action's beforeBuildCommand
#                                  only builds desktop-ui, not the viewer)
#   4. Rust target/ + ~/.cargo   — Swatinem/rust-cache@v2 shared-key with the
#                                  PR build (drift-lab-${{ matrix.label }})
#   5. cargo-tauri binary        — taiki-e/install-action (pre-built, ~10s
#                                  vs 5-10min for cargo install from source)

on:
  push:
    tags:
      - 'drift-lab-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)build for, e.g. drift-lab-v0.1.1'
        required: true
        type: string

concurrency:
  group: drift-lab-desktop-release-${{ github.ref }}
  cancel-in-progress: false  # never abort a release mid-flight

permissions:
  contents: write  # required for tauri-action to create the GitHub release

jobs:
  release:
    name: release / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos-universal
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - runner: ubuntu-22.04
            label: linux-x86_64
            args: ''
            rust_targets: x86_64-unknown-linux-gnu
          # Windows — temporarily disabled. Re-enable by uncommenting once
          # the windows signing/cert flow is sorted (Authenticode cert is
          # separate from the mac/linux ed25519 updater key).
          # - runner: windows-latest
          #   label: windows-x86_64
          #   args: ''
          #   rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── Cache layer 1: apt packages (Linux only) ──────────────────────
      # Includes jq for the latest.json mirror step further down.
      - name: Install Linux build deps (cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev pkg-config build-essential file jq
          version: 1.0

      - name: Install jq on macOS
        if: startsWith(matrix.runner, 'macos')
        run: brew list jq >/dev/null 2>&1 || brew install jq

      # ── Cache layer 2: npm registry (both UIs) ────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            drift-lab/desktop-ui/package-lock.json
            drift-static-profiler/viewer/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # ── Cache layer 4: Rust target/ + ~/.cargo ────────────────────────
      # shared-key matches drift-lab-desktop-build.yml so PR-warmed caches
      # are reusable by the release build on the same commit range.
      - name: Cache Rust target/
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-lab/src-tauri -> target
          shared-key: drift-lab-${{ matrix.label }}

      # ── Cache layer 5: cargo-tauri binary (pre-built) ─────────────────
      # tauri-action below uses `tauriScript: cargo tauri`, so cargo-tauri
      # must be on PATH. taiki-e/install-action drops a pre-built binary
      # in ~10s instead of `cargo install`-from-source (5-10min).
      - name: Install cargo-tauri (pre-built)
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.11.1

      - name: Install frontend deps
        working-directory: drift-lab/desktop-ui
        run: |
          set -e
          npm ci
          for pkg in react react-dom; do
            test -d "node_modules/$pkg" || {
              echo "::error::desktop-ui/node_modules/$pkg missing after npm ci — install broken or lockfile incomplete"
              exit 1
            }
          done

      # ── Cache layer 3: static-profiler viewer dist ────────────────────
      # CORRECTNESS FIX: previous versions of this workflow had no viewer
      # build step, so every release shipped the build.rs stub instead of
      # the real React SPA. tauri-action's beforeBuildCommand in
      # tauri.conf.json only builds drift-lab/desktop-ui — it does NOT
      # touch drift-static-profiler/viewer, which the Rust crate embeds
      # via rust-embed. Build it here, cache the result keyed on viewer
      # sources, and assert post-restore that we're not handing tauri
      # the stub.
      - name: Cache static-profiler viewer dist
        id: viewer-cache
        uses: actions/cache@v4
        with:
          path: drift-static-profiler/viewer/dist
          key: viewer-dist-${{ runner.os }}-${{ hashFiles('drift-static-profiler/viewer/package-lock.json', 'drift-static-profiler/viewer/src/**', 'drift-static-profiler/viewer/index.html', 'drift-static-profiler/viewer/vite.config.*', 'drift-static-profiler/viewer/tsconfig*.json') }}

      # `npm ci` is UNCONDITIONAL — desktop-ui/tsconfig.json `include`s
      # viewer/src/*.tsx files (the in-app dashboard imports them), so
      # desktop-ui's tsc -b needs viewer/node_modules every build. The
      # dist cache only stores viewer/dist, not node_modules.
      #
      # ⚠ DO NOT MOVE THIS STEP INSIDE THE `if: cache-hit != 'true'`
      # CONDITIONAL. That is what previously broke the build pipeline.
      - name: Install viewer deps (always — desktop-ui imports viewer/src/)
        working-directory: drift-static-profiler/viewer
        run: |
          set -e
          npm ci
          # Defensive guard: assert the bare imports desktop-ui's cross-
          # project tsc compile relies on actually landed. Turns any
          # future regression that skips npm ci on cache hits into an
          # explicit, actionable error.
          for pkg in react react-dom react-router-dom; do
            test -d "node_modules/$pkg" || {
              echo "::error::viewer/node_modules/$pkg missing after npm ci — install broken, lockfile incomplete, or this step was wrongly gated on a cache hit"
              exit 1
            }
          done

      - name: Build static-profiler viewer (cache miss only)
        if: steps.viewer-cache.outputs.cache-hit != 'true'
        working-directory: drift-static-profiler/viewer
        run: npm run build

      - name: Verify viewer dist (and not the build.rs stub)
        working-directory: drift-static-profiler/viewer
        run: |
          test -f dist/index.html || { echo "::error::viewer dist missing"; exit 1; }
          if grep -q '<!-- drift-lab build.rs stub -->' dist/index.html; then
            echo "::error::cached viewer dist is the build.rs stub — invalidate the cache"
            exit 1
          fi

      # Tell `drift-lab/scripts/build-cli.sh` (invoked from
      # tauri.conf.json's beforeBuildCommand) to produce a universal
      # `drift` CLI binary on macOS. Without this the script builds
      # for the host arch only (aarch64 on macos-14), the bundled
      # `Contents/Resources/drift` is single-arch, and Intel Macs
      # installing the universal `.app` end up with a CLI that errors
      # out at `bad CPU type in executable`. Linux runners ignore this
      # variable; Windows isn't in the matrix.
      - name: Enable universal CLI build on macOS
        if: startsWith(matrix.runner, 'macos')
        run: echo "DRIFT_BUILD_UNIVERSAL=1" >> "$GITHUB_ENV"

      # The actual build + sign + upload. tauri-action:
      #   • reads tauri.conf.json → bundle.createUpdaterArtifacts=true to know
      #     to emit .app.tar.gz / .AppImage.tar.gz updater bundles
      #   • signs with TAURI_SIGNING_PRIVATE_KEY (writes .sig next to each)
      #   • creates a draft GitHub Release named after the tag
      #   • uploads bundles + .sig files + a per-platform latest.json fragment
      #
      # `uploadUpdaterJson` defaults to true; we set it explicitly so a future
      # reader doesn't have to memorise the default.
      - name: Build, sign, and draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: drift-lab
          # Our layout has package.json in drift-lab/desktop-ui/ (not at
          # projectPath), so tauri-action's default `npm run tauri` would fail
          # to find a script. `cargo tauri` works because we pre-installed
          # cargo-tauri above via taiki-e/install-action. beforeBuildCommand
          # in tauri.conf.json handles the desktop-ui build via
          # `npm --prefix ../desktop-ui run build`. The static-profiler viewer
          # is built earlier in this job (the previous steps).
          tauriScript: cargo tauri
          tagName: drift-lab-v__VERSION__
          releaseName: 'Drift Lab v__VERSION__'
          releaseBody: |
            See assets below. Auto-update will roll out to existing installs
            within ~60 seconds of clicking *Publish* on this draft.

            Bootstrap docs: [drift-lab/UPDATER.md](https://github.com/refactorlab/drift/blob/main/drift-lab/UPDATER.md)
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

      # Assert the bundled `drift` CLI is actually inside the artifact
      # and (on mac) is a universal Mach-O. Failing here is louder than
      # discovering the omission after a user installs the DMG.
      - name: Verify drift CLI bundled (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: |
          set -euo pipefail
          APP="drift-lab/src-tauri/target/universal-apple-darwin/release/bundle/macos/Drift Lab.app"
          DRIFT="$APP/Contents/Resources/drift"
          if [ ! -f "$DRIFT" ]; then
            echo "::error::drift CLI missing from bundle: expected at $DRIFT"
            find "drift-lab/src-tauri/target/universal-apple-darwin/release/bundle" -name drift -print || true
            exit 1
          fi
          echo "::notice::drift CLI bundled at $DRIFT"
          file "$DRIFT"
          # Both arches present? Without this, Intel Macs installing
          # the universal .app would hit "bad CPU type in executable".
          if ! lipo -info "$DRIFT" 2>/dev/null | grep -q "x86_64"; then
            echo "::error::bundled drift CLI is NOT a universal binary — Intel Macs will fail"
            lipo -info "$DRIFT" || true
            exit 1
          fi
          if ! lipo -info "$DRIFT" 2>/dev/null | grep -q "arm64"; then
            echo "::error::bundled drift CLI missing arm64 slice"
            lipo -info "$DRIFT" || true
            exit 1
          fi
          # Quick smoke: --help must exit 0 (rules out the build.rs
          # placeholder, which exits 1).
          "$DRIFT" --help > /dev/null
          echo "::notice::drift CLI verified universal + --help works"
      - name: Verify drift CLI bundled (Linux .deb)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          DEB=$(find drift-lab/src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)
          if [ -z "$DEB" ]; then
            echo "::error::no .deb artifact found"
            find drift-lab/src-tauri/target/release/bundle -maxdepth 3 -type f | head -50
            exit 1
          fi
          echo "::notice::checking $DEB"
          if ! dpkg-deb -c "$DEB" | grep -E '/usr/lib/drift-lab/resources/drift$'; then
            echo "::error::drift CLI missing from .deb — bundle.resources wiring broken"
            dpkg-deb -c "$DEB" | grep -i drift || true
            exit 1
          fi
          echo "::notice::drift CLI present in .deb"

      # NOTE: drift-static-profiler standalone CLI is now built + uploaded
      # by drift-lab-desktop-build.yml's `build-static-profiler` job (single
      # source of truth, runs once on a dedicated Linux job — see comments
      # there). Removed from this workflow to avoid building the same binary
      # twice and racing on `gh release upload` for the same tag.

      # Post-process latest.json on the draft release. Two fixes:
      #
      # 1. Mirror the macOS universal entry to darwin-x86_64. tauri-action only
      #    writes the host runner's triple; on macos-14 that's darwin-aarch64.
      #    The universal `.app.tar.gz` is valid for Intel too, so without this
      #    Intel Macs never see the update.
      #
      # 2. Rewrite asset URLs so spaces in the filename become dots. tauri-action
      #    builds the bundle locally as "Drift Lab.app.tar.gz" (with the space
      #    from productName), but on upload GitHub Releases sanitises filenames —
      #    spaces become dots, so the stored asset is "Drift.Lab.app.tar.gz".
      #    The URL tauri-action writes into latest.json uses the pre-sanitisation
      #    name, so the updater hits a 404 on download. We apply the same
      #    transform here that GitHub applies on upload (last path segment only,
      #    so we don't accidentally touch the host/path). Signatures are over
      #    bundle bytes, not URLs, so this is safe.
      #
      # Idempotent: if darwin-x86_64 already exists it's left alone, and URLs
      # without spaces pass through unchanged.
      - name: Patch latest.json (mirror darwin entry + fix asset URLs)
        if: startsWith(matrix.runner, 'macos')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          # Find the latest.json asset on the draft release.
          asset_json=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/releases/${RELEASE_ID}/assets")
          asset_id=$(echo "$asset_json" | jq -r '.[] | select(.name=="latest.json") | .id')
          if [ -z "$asset_id" ] || [ "$asset_id" = "null" ]; then
            echo "::warning::latest.json not found on release ${RELEASE_ID} — skipping patch"
            exit 0
          fi
          # Download → patch → re-upload.
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${repo}/releases/assets/${asset_id}" \
            -o latest.json
          echo "--- before ---" && cat latest.json
          jq '
            # 1. Mirror darwin-aarch64 → darwin-x86_64 if missing.
            (if .platforms["darwin-aarch64"] and (.platforms["darwin-x86_64"] | not)
             then .platforms["darwin-x86_64"] = .platforms["darwin-aarch64"]
             else . end)
            # 2. Rewrite spaces → dots in the filename portion of each url.
            | .platforms |= with_entries(
                .value.url |= (
                  (split("/") | (.[-1] |= gsub(" "; "."))) | join("/")
                )
              )
          ' latest.json > latest.patched.json
          echo "--- after ---" && cat latest.patched.json
          # Delete the old asset then upload the patched one (GitHub doesn't
          # allow PUT-replace on release assets).
          curl -fsSL -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${repo}/releases/assets/${asset_id}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.patched.json \
            "https://uploads.github.com/repos/${repo}/releases/${RELEASE_ID}/assets?name=latest.json"
          echo "::notice::latest.json patched (mirror + url fix)"
