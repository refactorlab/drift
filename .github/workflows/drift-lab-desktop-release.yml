name: drift-lab desktop / release

# Every commit landing on main that touches drift-lab/ auto-tags + publishes a
# GitHub Release with installable bundles for macOS (Apple Silicon + Intel) and
# Linux (x86_64). Version bumps are conventional-commit driven and scoped to
# commits that actually touched drift-lab/ since the previous drift-lab tag.
#
# Tag scheme: drift-lab-v<MAJOR>.<MINOR>.<PATCH>

on:
  push:
    branches: [main]
    paths:
      - 'drift-lab/**'
      - '.github/workflows/drift-lab-desktop-release.yml'
  workflow_dispatch:

permissions:
  contents: write     # required to push tags + create releases

# Serialize releases so back-to-back main pushes can't race on git tag.
concurrency:
  group: drift-lab-desktop-release
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # bump: decide the next drift-lab-v* tag (or skip if no relevant commits).
  # -------------------------------------------------------------------------
  bump:
    name: compute version
    runs-on: ubuntu-latest
    outputs:
      skip:    ${{ steps.bump.outputs.skip }}
      tag:     ${{ steps.bump.outputs.tag }}
      prev:    ${{ steps.bump.outputs.prev }}
      version: ${{ steps.bump.outputs.version }}
      bump:    ${{ steps.bump.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # need full history to look up the last tag

      - name: Compute next drift-lab version
        id: bump
        run: |
          set -euo pipefail

          last_tag=$(git tag --list 'drift-lab-v*.*.*' --sort=-v:refname | head -n 1 || true)
          if [ -z "$last_tag" ]; then
            range="HEAD"
            prev="drift-lab-v0.0.0"
          else
            range="${last_tag}..HEAD"
            prev="$last_tag"
          fi

          # Only commits that actually touched drift-lab/ count for a release.
          relevant=$(git log "$range" --no-merges --pretty=format:'%H' -- drift-lab/ || true)
          if [ -z "$relevant" ]; then
            echo "No drift-lab commits since $prev — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional-commit bump:
          #   BREAKING CHANGE / feat!: / fix!: → major
          #   feat: → minor
          #   anything else → patch (so every drift-lab commit ships *something*)
          bump="patch"
          while IFS= read -r sha; do
            msg=$(git log -1 --format='%s%n%b' "$sha")
            if echo "$msg" | grep -qE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
              bump="major"; break
            elif echo "$msg" | grep -qE '^feat(\(.*\))?:'; then
              [ "$bump" = "patch" ] && bump="minor"
            fi
          done <<< "$relevant"

          ver="${prev#drift-lab-v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_version="${major}.${minor}.${patch}"
          new_tag="drift-lab-v${new_version}"

          {
            echo "skip=false"
            echo "tag=$new_tag"
            echo "prev=$prev"
            echo "version=$new_version"
            echo "bump=$bump"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Releasing $new_tag (bump=$bump, prev=$prev)"

  # -------------------------------------------------------------------------
  # build: matrix build for mac arm + intel + linux. Only runs if bump didn't skip.
  # -------------------------------------------------------------------------
  build:
    name: build / ${{ matrix.label }}
    needs: bump
    if: needs.bump.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary — single .dmg runs on both Apple Silicon and
          # Intel. Avoids the macos-13 runner queue (30-90+ min on busy days).
          - runner: macos-14
            label: macos-universal
            tauri_args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundle_dir: universal-apple-darwin/release/bundle
          - runner: ubuntu-22.04
            label: linux-x86_64
            tauri_args: ''
            rust_targets: x86_64-unknown-linux-gnu
            bundle_dir: release/bundle
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            build-essential \
            file

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: drift-lab/desktop-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-lab/src-tauri -> target
          key: release-${{ matrix.label }}

      - name: Cache cargo-tauri binary
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-2-${{ runner.os }}-${{ runner.arch }}

      - name: Install cargo-tauri (on cache miss)
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install frontend deps
        working-directory: drift-lab/desktop-ui
        run: npm ci

      - name: Build desktop app (release)
        working-directory: drift-lab
        run: cargo tauri build ${{ matrix.tauri_args }}

      # Per-runner uploads — keeps `if-no-files-found: error` honest on each leg.
      - name: Upload macOS bundles
        if: startsWith(matrix.runner, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

      # Two separate uploads so each artifact is FLAT (no preserved subdirs).
      # When upload-artifact has multiple paths, it preserves the LCA-relative
      # directory structure; that's what produced `dist/deb/` + `dist/appimage/`
      # subfolders in the previous broken run. Single-path uploads keep the
      # downloaded structure flat, which makes `gh release` happy regardless
      # of how the publish step enumerates files.
      - name: Upload Linux .deb
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-deb
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/deb/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux .AppImage
        if: matrix.runner == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: drift-lab-${{ matrix.label }}-appimage
          path: drift-lab/src-tauri/target/${{ matrix.bundle_dir }}/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------------------
  # publish: gather artifacts, generate release notes, tag, publish release.
  # -------------------------------------------------------------------------
  publish:
    name: publish ${{ needs.bump.outputs.tag }}
    needs: [bump, build]
    if: needs.bump.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: drift-lab-*
          merge-multiple: true
          path: dist

      - name: List downloaded assets
        run: ls -la dist/

      - name: Generate release notes
        id: notes
        env:
          NEW_TAG: ${{ needs.bump.outputs.tag }}
          PREV_TAG: ${{ needs.bump.outputs.prev }}
          BUMP: ${{ needs.bump.outputs.bump }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/notes.md"

          if [ "$PREV_TAG" = "drift-lab-v0.0.0" ] || ! git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            range="HEAD"
            prev_label="(initial release)"
          else
            range="${PREV_TAG}..HEAD"
            prev_label="${PREV_TAG}"
          fi

          {
            echo "## Drift Lab $NEW_TAG"
            echo
            echo "Built for **macOS** (Apple Silicon + Intel) and **Linux** (x86_64). Bump: \`$BUMP\`."
            echo
            echo "### Install"
            echo "- **macOS arm64** — \`Drift Lab_*_aarch64.dmg\`"
            echo "- **macOS Intel** — \`Drift Lab_*_x64.dmg\`"
            echo "- **Debian/Ubuntu** — \`sudo dpkg -i drift-lab_*_amd64.deb\`"
            echo "- **Other Linux** — \`chmod +x drift-lab_*.AppImage && ./drift-lab_*.AppImage\`"
            echo
            echo "### Changes since $prev_label"
            git log "$range" --no-merges --pretty='- %s (%h)' -- drift-lab/ | head -200
          } > "$notes_file"

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Tag and publish release
        env:
          GH_TOKEN:   ${{ github.token }}
          NEW_TAG:    ${{ needs.bump.outputs.tag }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          set -euo pipefail

          # upload-artifact preserves directory structure under the least common
          # ancestor of the input paths. The Linux artifact's `deb/` and
          # `appimage/` subdirs survive into dist/. Use `find` instead of
          # `dist/*` so we enumerate files (not directories), and use a bash
          # array so filenames containing spaces (e.g. "Drift Lab_*.dmg")
          # survive intact.
          mapfile -t files < <(find dist -type f \
            \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \))

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no bundle files found under dist/"
            ls -laR dist/ || true
            exit 1
          fi

          echo "Attaching ${#files[@]} bundle(s) to ${NEW_TAG}:"
          printf '  %s\n' "${files[@]}"

          # Idempotent tag push — re-runs after a partial failure shouldn't error.
          if git ls-remote --exit-code --tags origin "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already on origin — skipping tag creation"
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

          # Idempotent release — if a prior run created the release but failed
          # mid-upload, reuse it and overwrite any partial assets via --clobber.
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists — refreshing assets"
            gh release upload "$NEW_TAG" "${files[@]}" --clobber
          else
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --notes-file "$NOTES_FILE" \
              "${files[@]}"
          fi
