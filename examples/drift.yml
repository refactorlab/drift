# Drop this file at .github/workflows/drift.yml in any repo.
#
# On every pull_request event Andy will:
#   1. Auto-install the latest `drift-static-profiler` release (cached
#      across runs via $RUNNER_TOOL_CACHE).
#   2. Run `scan-pr` against the diff to produce a structured JSON
#      report (pr_scope + pr_review + code_suggestions).
#   3. Post a sticky overview comment on the PR (one per PR, overwritten
#      on each push — identified by a hidden marker).
#   4. Create a "Drift / PR review" check run summarising the verdict.
#   5. Post inline review-comments with one-click `Apply suggestion`
#      for any code-suggestion that clears the quality bar
#      (≥ 0.75 confidence, category A/B/C, at least one reference link).
#
# Zero config required — see the optional `with:` block below for tuning.

name: Drift

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Three permissions are required:
#   - contents: read         actions/checkout
#   - pull-requests: write   issues.createComment / pulls.createReview
#   - checks: write          checks.create
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The scanner diffs head against base; full history is needed
          # so `git diff $BASE..$HEAD` resolves on first-commit PRs.
          fetch-depth: 0

      # Minimal — auto-detects the latest profiler release and uses
      # the workflow's GITHUB_TOKEN for API auth.
      - uses: refactorlab/drift@main   # pin to a release tag for stability

      # ──────────────────────────────────────────────────────────────
      # Optional overrides (uncomment any you need):
      #
      # - uses: refactorlab/drift@main
      #   with:
      #     # Pin to a specific profiler release instead of auto-detecting.
      #     profiler-release-tag: 'drift-static-profiler-v0.6.0'
      #
      #     # Verbose scanner tracing (DRIFT_LOG=info,drift_static_profiler=debug).
      #     debug: 'true'
      #
      #     # Disable progress bars in CI logs (default: 'true').
      #     progress: 'false'
      #
      #     # Use a fine-grained PAT instead of the default GITHUB_TOKEN
      #     # (e.g. to post under a bot account). The token needs:
      #     #   - Pull requests: Read+Write
      #     #   - Checks:        Write
      #     #   - Contents:      Read
      #     github-token: ${{ secrets.DRIFT_PR_TOKEN }}
      #
      #     # Spoken-summary audio (Kokoro TTS, offline). Default 'true'.
      #     # Set 'false' to skip the 🔊 Listen link entirely.
      #     audio-summary: 'true'
      #
      #     # Voice for the spoken summary. Default af_heart (American female,
      #     # A-grade). Pick any Kokoro voice — for example:
      #     #   af_heart  af_bella  af_sarah  af_nicole  af_sky     (US female)
      #     #   am_michael am_adam  am_fenrir am_onyx    am_echo    (US male)
      #     #   bf_emma   bf_isabella                               (UK female)
      #     #   bm_george bm_lewis                                  (UK male)
      #     # (per-run override from a PR comment: `/drift tts-voice=am_michael`)
      #     tts-voice: 'am_michael'
