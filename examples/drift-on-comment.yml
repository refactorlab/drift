# Drop this file at .github/workflows/drift-on-comment.yml — it's the
# manual-re-run companion to examples/drift.yml.
#
# `start-on-pr-comment` is ADDITIVE: it ENABLES /drift comments without
# disabling the normal pull_request flow. This file keeps the two
# concerns isolated for clarity, but you can also collapse them into
# ONE workflow by listing both triggers and passing the flag — the
# action handles each event correctly:
#
#     # .github/workflows/drift.yml (single-file additive setup)
#     on:
#       pull_request: { types: [opened, synchronize, reopened] }
#       issue_comment: { types: [created] }
#     permissions: { contents: read, pull-requests: write, checks: write,
#                    models: read, issues: write }
#     jobs.drift:
#       if: github.event_name != 'issue_comment' || (… security gate …)
#       runs-on: ubuntu-latest
#       steps:
#         - uses: refactorlab/drift@main
#           with: { start-on-pr-comment: true }
#
# The split here is the safe default: an `if:` mistake in the unified
# form could let drive-by commenters trigger Drift, while the
# split-file form puts the security gate at the workflow boundary where
# it can't be bypassed.
#
# Once installed, any repo OWNER / MEMBER / COLLABORATOR can re-run Drift
# on a PR by posting a `/drift` comment, optionally with overrides:
#
#     /drift
#     /drift debug=true
#     /drift ai-suggestions=false audio-summary=false
#     /drift ai-model=openai/gpt-5
#
# Use `/drift issue` to ALSO open (or refresh) a GitHub Issue tracking
# this PR's findings — one issue per PR, deduplicated by a hidden marker.
#
#     /drift issue
#     /drift issue ai-model=openai/gpt-5
#
# A multi-line YAML form is also accepted:
#
#     /drift
#     ```yaml
#     debug: true
#     ai-model: openai/gpt-5
#     fail-threshold: 0
#     ```
#
# UX: the action drops a 👀 reaction as its first step once the runner
# starts (typically 10-30 s after the comment), then 🚀 on success, 👎
# on failure, or 😕 on a closed/merged PR. The sticky PR-overview comment
# is UPDATED in place (no duplicates) — same STICKY_MARKER as the auto
# run.
#
# EVERYTHING ELSE — the parser, REST PR resolution, fork-safe
# checkout-by-SHA, the reactions — is handled by the action itself when
# `start-on-pr-comment: true`. This workflow is just the trigger surface
# + security gate.
#
# Security model — gated on three things in concert:
#   1. github.event.issue.pull_request != null   → ignore plain issue comments
#   2. author_association ∈ {OWNER, MEMBER, COLLABORATOR}
#                                                → drive-by commenters get nothing
#   3. comment.user.type != 'Bot'                → defends against Drift
#                                                  ever triggering itself

name: Drift / on comment

on:
  issue_comment:
    types: [created]

# Same scopes as examples/drift.yml plus issues:write for the reactions.
permissions:
  contents: read
  pull-requests: write
  checks: write
  models: read
  issues: write

# Only collide on PR # when the comment is the command. Passive
# (non-/drift) comments fall into a per-run group so an unrelated comment
# can never cancel a real Drift run mid-flight.
concurrency:
  group: >-
    drift-comment-${{ github.event.issue.number }}-${{
      startsWith(github.event.comment.body, '/drift')
      && 'cmd' || format('passive-{0}', github.run_id) }}
  cancel-in-progress: true

jobs:
  drift:
    if: >-
      github.event.issue.pull_request != null &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.comment.author_association) &&
      startsWith(github.event.comment.body, '/drift') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: refactorlab/drift@main   # pin to a release tag in real use
        with:
          start-on-pr-comment: true
